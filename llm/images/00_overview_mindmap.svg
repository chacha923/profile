<text x="553.4" y="686.0" fill="#ea580c" font-size="17" font-weight="700">能力：生成器</text>
<line x1="824.7" y1="648.0" x2="971.2" y2="648.0" stroke="#ea580c" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="640.0" fill="#1f2937" font-size="17" font-weight="400">输出一串 token</text>
<line x1="824.7" y1="694.0" x2="1045.0" y2="694.0" stroke="#ea580c" stroke-width="2.4" stroke-linecap="round"/>
