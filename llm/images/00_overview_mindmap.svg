<text x="834.7" y="732.0" fill="#1f2937" font-size="17" font-weight="400">问答·总结·代码·Agent</text>
<line x1="543.4" y1="855.0" x2="734.1" y2="855.0" stroke="#059669" stroke-width="2.4" stroke-linecap="round"/>
<text x="553.4" y="847.0" fill="#059669" font-size="17" font-weight="700">推理：逐 token 生成</text>
