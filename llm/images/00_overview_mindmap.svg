<text x="254.2" y="632.0" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">LLM 理论型技术点 · 以传统模型作对比锚</text>
<line x1="543.4" y1="96.0" x2="650.1" y2="96.0" stroke="#7c3aed" stroke-width="2.4" stroke-linecap="round"/>
<text x="553.4" y="88.0" fill="#7c3aed" font-size="17" font-weight="700">定位与边界</text>
<line x1="824.7" y1="50.0" x2="1108.2" y2="50.0" stroke="#7c3aed" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="42.0" fill="#1f2937" font-size="17" font-weight="400">出发点是 LLM，传统模型只作对比</text>
<line x1="824.7" y1="96.0" x2="1094.3" y2="96.0" stroke="#7c3aed" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="88.0" fill="#1f2937" font-size="17" font-weight="400">LLM 仍是 DNN，不脱离神经网络</text>
<line x1="824.7" y1="142.0" x2="1070.1" y2="142.0" stroke="#7c3aed" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="134.0" fill="#1f2937" font-size="17" font-weight="400">理论型：不假装做过内核优化</text>
<line x1="543.4" y1="257.0" x2="653.5" y2="257.0" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round"/>
<text x="553.4" y="249.0" fill="#2563eb" font-size="17" font-weight="700">LLM 是什么</text>
<line x1="824.7" y1="188.0" x2="1115.0" y2="188.0" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="180.0" fill="#1f2937" font-size="17" font-weight="400">Transformer 为主的超大基础模型</text>
<line x1="824.7" y1="234.0" x2="1081.4" y2="234.0" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="226.0" fill="#1f2937" font-size="17" font-weight="400">海量自监督预训练 + 指令对齐</text>
<line x1="824.7" y1="280.0" x2="1052.8" y2="280.0" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="272.0" fill="#1f2937" font-size="17" font-weight="400">权重仍是训练结果，非独有</text>
<line x1="824.7" y1="326.0" x2="1057.9" y2="326.0" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="318.0" fill="#1f2937" font-size="17" font-weight="400">开放权重 ≠ 开源 ≠ 可商用</text>
<line x1="543.4" y1="418.0" x2="720.1" y2="418.0" stroke="#0891b2" stroke-width="2.4" stroke-linecap="round"/>
<text x="553.4" y="410.0" fill="#0891b2" font-size="17" font-weight="700">架构：Transformer</text>
<line x1="824.7" y1="372.0" x2="1074.2" y2="372.0" stroke="#0891b2" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="364.0" fill="#1f2937" font-size="17" font-weight="400">self-attention 建模上下文</text>
<line x1="824.7" y1="418.0" x2="1111.6" y2="418.0" stroke="#0891b2" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="410.0" fill="#1f2937" font-size="17" font-weight="400">锚点：CNN 局部、DNN 吃固定特征</text>
<line x1="824.7" y1="464.0" x2="1029.3" y2="464.0" stroke="#0891b2" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="456.0" fill="#1f2937" font-size="17" font-weight="400">长距离依赖 + 并行训练</text>
<line x1="543.4" y1="556.0" x2="749.7" y2="556.0" stroke="#dc2626" stroke-width="2.4" stroke-linecap="round"/>
<text x="553.4" y="548.0" fill="#dc2626" font-size="17" font-weight="700">训练：预训练→SFT→对齐</text>
<line x1="824.7" y1="510.0" x2="1050.1" y2="510.0" stroke="#dc2626" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="502.0" fill="#1f2937" font-size="17" font-weight="400">预测下一个 token 自监督</text>
<line x1="824.7" y1="556.0" x2="1070.1" y2="556.0" stroke="#dc2626" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="548.0" fill="#1f2937" font-size="17" font-weight="400">锚点：传统先定义任务再训练</text>
<line x1="824.7" y1="602.0" x2="1035.5" y2="602.0" stroke="#dc2626" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="594.0" fill="#1f2937" font-size="17" font-weight="400">一个基础模型适配多任务</text>
