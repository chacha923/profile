<text x="834.7" y="778.0" fill="#1f2937" font-size="17" font-weight="400">prefill / decode / KV cache</text>
<line x1="824.7" y1="832.0" x2="1054.2" y2="832.0" stroke="#059669" stroke-width="2.4" stroke-linecap="round"/>
<text x="834.7" y="824.0" fill="#1f2937" font-size="17" font-weight="400">TTFT / TPOT / tokens·s</text>
