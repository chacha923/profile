<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 14px; font-weight: 700; }
    .sub { font-size: 12px; fill: #4b5563; }
    .small { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arrow-rx" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ca8a04"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600.0" y="42" text-anchor="middle" class="title">和 moss-compose 项目的安全连接</text>
  <rect x="80" y="110" width="190" height="76" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="175.0" y="135" text-anchor="middle" class="label">moss-compose</text>
  <text x="175.0" y="158" text-anchor="middle" class="sub">Agent / Workflow</text>
  <text x="175.0" y="176" text-anchor="middle" class="sub">业务逻辑部署</text>
  <rect x="350" y="110" width="190" height="76" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="445.0" y="135" text-anchor="middle" class="label">统一 AI 网关</text>
  <text x="445.0" y="158" text-anchor="middle" class="sub">Higress</text>
  <text x="445.0" y="176" text-anchor="middle" class="sub">模型调用入口</text>
  <rect x="620" y="110" width="190" height="76" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="715.0" y="135" text-anchor="middle" class="label">限流治理</text>
  <text x="715.0" y="158" text-anchor="middle" class="sub">consumer / service</text>
  <text x="715.0" y="176" text-anchor="middle" class="sub">token_per_minute</text>
  <rect x="890" y="110" width="190" height="76" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="985.0" y="135" text-anchor="middle" class="label">成本治理</text>
  <text x="985.0" y="158" text-anchor="middle" class="sub">token usage</text>
  <text x="985.0" y="176" text-anchor="middle" class="sub">按模型归因</text>
  <rect x="180" y="330" width="210" height="80" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="285.0" y="355" text-anchor="middle" class="label">我可以安全说</text>
  <text x="285.0" y="378" text-anchor="middle" class="sub">业务走统一网关</text>
  <text x="285.0" y="396" text-anchor="middle" class="sub">理解限流计费链路</text>
  <rect x="500" y="330" width="210" height="80" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="605.0" y="355" text-anchor="middle" class="label">不能夸大</text>
  <text x="605.0" y="378" text-anchor="middle" class="sub">不是网关作者</text>
  <text x="605.0" y="396" text-anchor="middle" class="sub">不说主导 Higress 插件</text>
  <rect x="820" y="330" width="220" height="80" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="930.0" y="355" text-anchor="middle" class="label">可演进方向</text>
  <text x="930.0" y="378" text-anchor="middle" class="sub">应用级 quota</text>
  <text x="930.0" y="396" text-anchor="middle" class="sub">成本预算 / 告警</text>
  <rect x="490" y="540" width="230" height="80" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="605.0" y="565" text-anchor="middle" class="label">面试连接点</text>
  <text x="605.0" y="588" text-anchor="middle" class="sub">Agent 平台生产化</text>
  <text x="605.0" y="606" text-anchor="middle" class="sub">权限 + 成本 + 观测</text>
  <path d="M 270,148 L 350,148" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 540,148 L 620,148" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 810,148 L 890,148" stroke="#ea580c" stroke-width="2.2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 175,186 L 175,250 L 285,250 L 285,330" stroke="#0d9488" stroke-width="2.2" fill="none" marker-end="url(#arrow-teal)"/>
  <path d="M 715,186 L 715,250 L 605,250 L 605,330" stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M 985,186 L 985,250 L 930,250 L 930,330" stroke="#9333ea" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 605,410 L 605,540" stroke="#ea580c" stroke-width="2.2" fill="none" marker-end="url(#arrow-orange)"/>
</svg>
