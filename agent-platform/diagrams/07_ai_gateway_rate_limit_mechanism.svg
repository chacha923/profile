<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 14px; font-weight: 700; }
    .sub { font-size: 12px; fill: #4b5563; }
    .small { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arrow-rx" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ca8a04"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600.0" y="42" text-anchor="middle" class="title">Token 限流机制：网关内拦截和响应后扣减</text>
  <rect x="80" y="100" width="170" height="70" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="165.0" y="125" text-anchor="middle" class="label">请求进入</text>
  <text x="165.0" y="148" text-anchor="middle" class="sub">Consumer / Header</text>
  <text x="165.0" y="166" text-anchor="middle" class="sub">Route / Model</text>
  <rect x="310" y="100" width="170" height="70" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="395.0" y="125" text-anchor="middle" class="label">提取限流 Key</text>
  <text x="395.0" y="148" text-anchor="middle" class="sub">consumer</text>
  <text x="395.0" y="166" text-anchor="middle" class="sub">header / param / IP</text>
  <rect x="540" y="100" width="170" height="70" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="625.0" y="125" text-anchor="middle" class="label">Redis 固定窗口</text>
  <text x="625.0" y="148" text-anchor="middle" class="sub">当前 token 计数</text>
  <text x="625.0" y="166" text-anchor="middle" class="sub">窗口阈值</text>
  <polygon points="825,95.0 905.0,135 825,175.0 745.0,135" fill="#fef2f2" stroke="#fecaca" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="825" y="131" text-anchor="middle" class="label">超过阈值?</text>
  <text x="825" y="151" text-anchor="middle" class="sub">token_per_minute</text>
  <rect x="1010" y="100" width="140" height="70" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1080.0" y="125" text-anchor="middle" class="label">429 返回</text>
  <text x="1080.0" y="148" text-anchor="middle" class="sub">Too Many Requests</text>
  <rect x="540" y="300" width="170" height="70" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="625.0" y="325" text-anchor="middle" class="label">允许转发</text>
  <text x="625.0" y="348" text-anchor="middle" class="sub">进入 ai-proxy</text>
  <text x="625.0" y="366" text-anchor="middle" class="sub">调用上游模型</text>
  <rect x="310" y="500" width="190" height="70" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="405.0" y="525" text-anchor="middle" class="label">响应结束</text>
  <text x="405.0" y="548" text-anchor="middle" class="sub">解析 usage</text>
  <text x="405.0" y="566" text-anchor="middle" class="sub">stream / non-stream</text>
  <rect x="540" y="500" width="190" height="70" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="635.0" y="525" text-anchor="middle" class="label">更新计数</text>
  <text x="635.0" y="548" text-anchor="middle" class="sub">input + output</text>
  <text x="635.0" y="566" text-anchor="middle" class="sub">写 Redis</text>
  <rect x="790" y="500" width="190" height="70" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="885.0" y="525" text-anchor="middle" class="label">返回业务</text>
  <text x="885.0" y="548" text-anchor="middle" class="sub">携带响应</text>
  <text x="885.0" y="566" text-anchor="middle" class="sub">指标已落地</text>
  <path d="M 250,135 L 310,135" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 480,135 L 540,135" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 710,135 L 745,135" stroke="#ea580c" stroke-width="2.2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 905,135 L 1010,135" stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arrow-rx)"/>
  <rect x="930.5" y="112.0" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
  <text x="957.5" y="127.0" text-anchor="middle" class="small">是</text>
  <path d="M 825,175 L 825,250 L 625,250 L 625,300" stroke="#9333ea" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="598.0" y="269" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
  <text x="625" y="284" text-anchor="middle" class="small">否</text>
  <path d="M 540,370 L 405,370 L 405,500" stroke="#0d9488" stroke-width="2.2" fill="none" marker-end="url(#arrow-teal)"/>
  <rect x="375.0" y="469" width="60" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
  <text x="405" y="484" text-anchor="middle" class="small">usage</text>
  <path d="M 500,535 L 540,535" stroke="#ea580c" stroke-width="2.2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 730,535 L 790,535" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
</svg>
