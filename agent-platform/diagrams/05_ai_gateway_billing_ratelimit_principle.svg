<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 14px; font-weight: 700; }
    .sub { font-size: 12px; fill: #4b5563; }
    .small { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arrow-rx" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ca8a04"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600.0" y="42" text-anchor="middle" class="title">AI 网关计费与限流原理模型</text>
  <rect x="60" y="95" width="170" height="70" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="145.0" y="120" text-anchor="middle" class="label">moss-compose / 业务</text>
  <text x="145.0" y="143" text-anchor="middle" class="sub">统一走 AI 网关</text>
  <text x="145.0" y="161" text-anchor="middle" class="sub">携带 service / model</text>
  <rect x="280" y="95" width="160" height="70" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="360.0" y="120" text-anchor="middle" class="label">Higress Gateway</text>
  <text x="360.0" y="143" text-anchor="middle" class="sub">Envoy + WASM</text>
  <text x="360.0" y="161" text-anchor="middle" class="sub">统一入口</text>
  <rect x="500" y="82" width="160" height="64" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="580.0" y="107" text-anchor="middle" class="label">basic-auth</text>
  <text x="580.0" y="130" text-anchor="middle" class="sub">Consumer 识别</text>
  <polygon points="710,79.0 785.0,114 710,149.0 635.0,114" fill="#fef2f2" stroke="#fecaca" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="710" y="110" text-anchor="middle" class="label">token 限流</text>
  <text x="710" y="130" text-anchor="middle" class="sub">Redis 固定窗口</text>
  <rect x="910" y="95" width="170" height="70" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="995.0" y="120" text-anchor="middle" class="label">ai-proxy</text>
  <text x="995.0" y="143" text-anchor="middle" class="sub">协议转换</text>
  <text x="995.0" y="161" text-anchor="middle" class="sub">模型路由</text>
  <rect x="910" y="230" width="170" height="70" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="995.0" y="255" text-anchor="middle" class="label">上游模型服务</text>
  <text x="995.0" y="278" text-anchor="middle" class="sub">Doubao / Qwen</text>
  <text x="995.0" y="296" text-anchor="middle" class="sub">Qianfan 等</text>
  <rect x="500" y="230" width="180" height="70" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="590.0" y="255" text-anchor="middle" class="label">ai-statistics</text>
  <text x="590.0" y="278" text-anchor="middle" class="sub">提取 usage</text>
  <text x="590.0" y="296" text-anchor="middle" class="sub">写 metric / log</text>
  <rect x="270" y="345" width="190" height="70" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="365.0" y="370" text-anchor="middle" class="label">/stats/prometheus</text>
  <text x="365.0" y="393" text-anchor="middle" class="sub">Envoy 暴露指标</text>
  <text x="365.0" y="411" text-anchor="middle" class="sub">Prometheus 抓取</text>
  <rect x="520" y="345" width="190" height="70" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="615.0" y="370" text-anchor="middle" class="label">VictoriaMetrics</text>
  <text x="615.0" y="393" text-anchor="middle" class="sub">长期存储</text>
  <text x="615.0" y="411" text-anchor="middle" class="sub">PromQL 查询</text>
  <rect x="770" y="345" width="210" height="70" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="875.0" y="370" text-anchor="middle" class="label">Metric Extender</text>
  <text x="875.0" y="393" text-anchor="middle" class="sub">拉取 token 指标</text>
  <text x="875.0" y="411" text-anchor="middle" class="sub">计算成本</text>
  <rect x="520" y="500" width="210" height="75" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="625.0" y="525" text-anchor="middle" class="label">成本指标</text>
  <text x="625.0" y="548" text-anchor="middle" class="sub">input / output / cached</text>
  <text x="625.0" y="566" text-anchor="middle" class="sub">total_cost</text>
  <rect x="800" y="500" width="210" height="75" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="905.0" y="525" text-anchor="middle" class="label">看板 / 报表</text>
  <text x="905.0" y="548" text-anchor="middle" class="sub">按 service / model</text>
  <text x="905.0" y="566" text-anchor="middle" class="sub">consumer / route 归因</text>
  <path d="M 230,130 L 280,130" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="228.0" y="107.0" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
  <text x="255.0" y="122.0" text-anchor="middle" class="small">请求</text>
  <path d="M 440,130 L 500,114" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 660,114 L 635,114" stroke="#ea580c" stroke-width="2.2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 785,114 L 910,130" stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arrow-rx)"/>
  <rect x="817.5" y="99.0" width="60" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
  <text x="847.5" y="114.0" text-anchor="middle" class="small">allow</text>
  <path d="M 995,165 L 995,230" stroke="#9333ea" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="968.0" y="174.5" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
  <text x="995.0" y="189.5" text-anchor="middle" class="small">转发</text>
  <path d="M 910,265 L 680,265" stroke="#0d9488" stroke-width="2.2" fill="none" marker-end="url(#arrow-teal)"/>
  <rect x="765.0" y="242.0" width="60" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
  <text x="795.0" y="257.0" text-anchor="middle" class="small">usage</text>
  <path d="M 500,265 L 360,265 L 360,345" stroke="#0d9488" stroke-width="2.2" fill="none" marker-end="url(#arrow-teal)"/>
  <rect x="324.0" y="314" width="72" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
  <text x="360" y="329" text-anchor="middle" class="small">metric</text>
  <path d="M 460,380 L 520,380" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 710,380 L 770,380" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 875,415 L 625,500" stroke="#ea580c" stroke-width="2.2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="723.0" y="434.5" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
  <text x="750.0" y="449.5" text-anchor="middle" class="small">成本</text>
  <path d="M 730,538 L 800,538" stroke="#9333ea" stroke-width="2.2" fill="none" marker-end="url(#arrow-purple)"/>
</svg>
