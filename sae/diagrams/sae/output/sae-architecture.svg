<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <defs>
    <style>
      text {
        font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif;
      }
      .title { font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 15px; font-weight: 500; fill: #64748b; }
      .layer-label { font-size: 16px; font-weight: 700; fill: #334155; }
      .layer-note { font-size: 12px; font-weight: 500; fill: #94a3b8; }
      .card-title { font-size: 18px; font-weight: 700; fill: #111827; }
      .card-sub { font-size: 12px; font-weight: 500; fill: #64748b; }
      .card-type { font-size: 12px; font-weight: 700; fill: #94a3b8; letter-spacing: 0.08em; }
      .mini-title { font-size: 15px; font-weight: 700; fill: #111827; }
      .mini-sub { font-size: 11px; font-weight: 500; fill: #64748b; }
      .arrow-label { font-size: 12px; font-weight: 600; fill: #475569; }
      .legend { font-size: 12px; font-weight: 500; fill: #64748b; }
      .footnote { font-size: 12px; font-weight: 500; fill: #94a3b8; }
    </style>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>

    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#f97316"/>
    </marker>

    <linearGradient id="consoleFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="apiFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="asyncFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1040" fill="#ffffff"/>

  <text x="800" y="58" text-anchor="middle" class="title">SAE 应用交付与运行治理架构图</text>
  <text x="800" y="86" text-anchor="middle" class="subtitle">从入口请求到 SAE Console 编排、sae-api 资源契约、Watcher 状态回写与多集群运行底座</text>

  <!-- Layer backgrounds -->
  <rect x="64" y="118" width="1472" height="150" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
  <rect x="64" y="300" width="1472" height="210" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
  <rect x="64" y="542" width="1472" height="188" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
  <rect x="64" y="762" width="1472" height="205" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>

  <text x="92" y="148" class="layer-label">入口层</text>
  <text x="92" y="172" class="layer-note">产品页面、自动化、代码事件和运维工具进入统一控制面</text>
  <text x="92" y="330" class="layer-label">sae-console 同步控制面</text>
  <text x="92" y="354" class="layer-note">HTTP 请求、鉴权审计、业务校验、发布编排和资源读写</text>
  <text x="92" y="572" class="layer-label">资源契约与异步状态面</text>
  <text x="92" y="596" class="layer-note">CRD/controller 契约、事件监听、状态回写、定时补偿</text>
  <text x="92" y="792" class="layer-label">多集群运行底座</text>
  <text x="92" y="816" class="layer-note">Kubernetes、SAE CRD、Rollouts、Tekton、日志指标与通知承载真实运行态</text>

  <!-- Entry cards -->
  <g filter="url(#softShadow)">
    <rect x="235" y="154" width="220" height="82" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="345" y="181" text-anchor="middle" class="card-type">PRODUCT</text>
    <text x="345" y="207" text-anchor="middle" class="card-title">sae-fe 控制台</text>
    <text x="345" y="229" text-anchor="middle" class="card-sub">应用、发布、日志、排障</text>

    <rect x="505" y="154" width="230" height="82" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="620" y="181" text-anchor="middle" class="card-type">AUTOMATION</text>
    <text x="620" y="207" text-anchor="middle" class="card-title">OpenAPI / MCP</text>
    <text x="620" y="229" text-anchor="middle" class="card-sub">Agent 查询与批量操作</text>

    <rect x="785" y="154" width="230" height="82" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="900" y="181" text-anchor="middle" class="card-type">EVENT</text>
    <text x="900" y="207" text-anchor="middle" class="card-title">GitLab / Webhook</text>
    <text x="900" y="229" text-anchor="middle" class="card-sub">分支、Tag、Commit 触发</text>

    <rect x="1065" y="154" width="220" height="82" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="1175" y="181" text-anchor="middle" class="card-type">OPS CLI</text>
    <text x="1175" y="207" text-anchor="middle" class="card-title">saectl / 工具</text>
    <text x="1175" y="229" text-anchor="middle" class="card-sub">集群纳管、辅助批处理</text>
  </g>

  <!-- Console layer -->
  <g filter="url(#shadow)">
    <rect x="150" y="370" width="240" height="96" rx="10" fill="url(#consoleFill)" stroke="#2563eb" stroke-width="2.4"/>
    <rect x="158" y="378" width="224" height="80" rx="8" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
    <text x="270" y="399" text-anchor="middle" class="card-type">HTTP API</text>
    <text x="270" y="426" text-anchor="middle" class="card-title">console main</text>
    <text x="270" y="448" text-anchor="middle" class="card-sub">Gin / CAS / Audit / OTel</text>

    <rect x="470" y="370" width="260" height="96" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="600" y="399" text-anchor="middle" class="card-type">DOMAIN</text>
    <text x="600" y="426" text-anchor="middle" class="card-title">业务 Controllers</text>
    <text x="600" y="448" text-anchor="middle" class="card-sub">app / rollout / pipeline / workload</text>

    <rect x="810" y="370" width="270" height="96" rx="10" fill="#faf5ff" stroke="#9333ea" stroke-width="2"/>
    <text x="945" y="399" text-anchor="middle" class="card-type">ORCHESTRATION SDK</text>
    <text x="945" y="426" text-anchor="middle" class="card-title">pkg/sae 编排层</text>
    <text x="945" y="448" text-anchor="middle" class="card-sub">ClusterManager / Verber / Pipeline</text>

    <rect x="1160" y="370" width="250" height="96" rx="10" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2"/>
    <text x="1285" y="399" text-anchor="middle" class="card-type">QUERY</text>
    <text x="1285" y="426" text-anchor="middle" class="card-title">workload / dashboard</text>
    <text x="1285" y="448" text-anchor="middle" class="card-sub">Pod / Log / Event / WebShell</text>
  </g>

  <!-- Contract and async layer -->
  <g filter="url(#shadow)">
    <rect x="165" y="618" width="300" height="88" rx="10" fill="url(#apiFill)" stroke="#16a34a" stroke-width="2.4"/>
    <text x="315" y="644" text-anchor="middle" class="card-type">CRD CONTRACT</text>
    <text x="315" y="670" text-anchor="middle" class="card-title">sae-api</text>
    <text x="315" y="692" text-anchor="middle" class="card-sub">Application / Cluster / clientset / controller</text>

    <rect x="555" y="618" width="245" height="88" rx="10" fill="url(#asyncFill)" stroke="#9333ea" stroke-width="2.4"/>
    <text x="678" y="644" text-anchor="middle" class="card-type">ASYNC WATCH</text>
    <text x="678" y="670" text-anchor="middle" class="card-title">watcher</text>
    <text x="678" y="692" text-anchor="middle" class="card-sub">Event / Replicas / PipelineRun</text>

    <rect x="890" y="618" width="210" height="88" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="995" y="644" text-anchor="middle" class="card-type">BATCH</text>
    <text x="995" y="670" text-anchor="middle" class="card-title">saejob</text>
    <text x="995" y="692" text-anchor="middle" class="card-sub">recheck / sync / repair</text>

    <g>
      <ellipse cx="1235" cy="628" rx="84" ry="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <rect x="1151" y="628" width="168" height="52" fill="#dcfce7" stroke="none"/>
      <line x1="1151" y1="628" x2="1151" y2="680" stroke="#16a34a" stroke-width="2"/>
      <line x1="1319" y1="628" x2="1319" y2="680" stroke="#16a34a" stroke-width="2"/>
      <ellipse cx="1235" cy="680" rx="84" ry="20" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
      <text x="1235" y="653" text-anchor="middle" class="card-title">MySQL</text>
      <text x="1235" y="675" text-anchor="middle" class="card-sub">应用 / 发布 / 事件 / 构建历史</text>
    </g>

    <rect x="1370" y="616" width="120" height="92" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="1430" y="644" text-anchor="middle" class="card-type">CACHE</text>
    <text x="1430" y="670" text-anchor="middle" class="card-title">Redis</text>
    <text x="1430" y="692" text-anchor="middle" class="card-sub">缓存 / 会话</text>
  </g>

  <!-- Runtime layer cards -->
  <g filter="url(#softShadow)">
    <rect x="150" y="842" width="230" height="90" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="265" y="870" text-anchor="middle" class="card-type">MULTI CLUSTER</text>
    <text x="265" y="897" text-anchor="middle" class="card-title">Kubernetes</text>
    <text x="265" y="919" text-anchor="middle" class="card-sub">prod / gray / qa / algorithm</text>

    <rect x="455" y="842" width="220" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="565" y="870" text-anchor="middle" class="card-type">SAE CRD</text>
    <text x="565" y="897" text-anchor="middle" class="card-title">Application / Cluster</text>
    <text x="565" y="919" text-anchor="middle" class="card-sub">期望态与集群契约</text>

    <rect x="750" y="842" width="220" height="90" rx="10" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2"/>
    <text x="860" y="870" text-anchor="middle" class="card-type">WORKLOAD</text>
    <text x="860" y="897" text-anchor="middle" class="card-title">Deployment / HPA</text>
    <text x="860" y="919" text-anchor="middle" class="card-sub">Pod / Service / Ingress</text>

    <rect x="1045" y="842" width="190" height="90" rx="10" fill="#faf5ff" stroke="#9333ea" stroke-width="2"/>
    <text x="1140" y="870" text-anchor="middle" class="card-type">ROLLOUT</text>
    <text x="1140" y="897" text-anchor="middle" class="card-title">Rollout CR</text>
    <text x="1140" y="919" text-anchor="middle" class="card-sub">灰度 / 回滚 / 放量</text>

    <rect x="1300" y="842" width="170" height="90" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="1385" y="870" text-anchor="middle" class="card-type">BUILD</text>
    <text x="1385" y="897" text-anchor="middle" class="card-title">Tekton</text>
    <text x="1385" y="919" text-anchor="middle" class="card-sub">PipelineRun / TaskRun</text>
  </g>

  <!-- Entry bus -->
  <path d="M345 236 L345 266 L270 266 L270 370" fill="none" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <path d="M620 236 L620 266 L270 266" fill="none" stroke="#2563eb" stroke-width="2.4"/>
  <path d="M900 236 L900 282 L600 282 L600 370" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrow-orange)"/>
  <path d="M1175 236 L1175 282 L600 282" fill="none" stroke="#f97316" stroke-width="2.4"/>
  <rect x="428" y="249" width="116" height="24" rx="12" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="486" y="266" text-anchor="middle" class="arrow-label">入口汇聚</text>

  <!-- Console sync flow -->
  <path d="M390 418 L470 418" fill="none" stroke="#2563eb" stroke-width="2.6" marker-end="url(#arrow-blue)"/>
  <path d="M730 418 L810 418" fill="none" stroke="#2563eb" stroke-width="2.6" marker-end="url(#arrow-blue)"/>
  <path d="M1080 418 L1160 418" fill="none" stroke="#2563eb" stroke-width="2.6" marker-end="url(#arrow-blue)"/>
  <text x="430" y="407" text-anchor="middle" class="arrow-label">路由</text>
  <text x="770" y="407" text-anchor="middle" class="arrow-label">编排</text>
  <text x="1120" y="407" text-anchor="middle" class="arrow-label">查询</text>

  <!-- State writes -->
  <path d="M600 466 L600 530 L1235 530 L1235 608" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrow-green)"/>
  <path d="M270 466 L270 530 L1430 530 L1430 616" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrow-green)"/>
  <text x="910" y="522" text-anchor="middle" class="arrow-label">业务状态 / 缓存</text>

  <!-- Resource writes from pkg/sae -->
  <path d="M945 466 L945 538 L510 538 L510 812 L565 812 L565 842" fill="none" stroke="#16a34a" stroke-width="2.8" marker-end="url(#arrow-green)"/>
  <path d="M945 466 L945 550 L1140 550 L1140 842" fill="none" stroke="#16a34a" stroke-width="2.8" marker-end="url(#arrow-green)"/>
  <path d="M945 466 L945 562 L1515 562 L1515 820 L1385 820 L1385 842" fill="none" stroke="#16a34a" stroke-width="2.8" marker-end="url(#arrow-green)"/>
  <text x="691" y="553" text-anchor="middle" class="arrow-label">Create / Patch Application</text>
  <text x="1047" y="545" text-anchor="middle" class="arrow-label">Rollout 操作</text>
  <text x="1247" y="557" text-anchor="middle" class="arrow-label">触发构建</text>

  <!-- sae-api reconcile -->
  <path d="M315 706 L315 790 L565 790 L565 842" fill="none" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <path d="M465 662 L510 662 L510 748 L860 748 L860 842" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrow-green)"/>
  <text x="442" y="784" text-anchor="middle" class="arrow-label">watch CRD</text>
  <text x="684" y="740" text-anchor="middle" class="arrow-label">reconcile 工作负载</text>

  <!-- Runtime relationship -->
  <path d="M380 887 L455 887" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow-blue)" opacity="0.55"/>
  <path d="M675 887 L750 887" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow-blue)" opacity="0.55"/>
  <path d="M970 887 L1045 887" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow-blue)" opacity="0.55"/>

  <!-- Async feedback -->
  <path d="M860 842 L860 780 L678 780 L678 706" fill="none" stroke="#9333ea" stroke-width="2.4" stroke-dasharray="7 6" marker-end="url(#arrow-purple)"/>
  <path d="M1140 842 L1140 770 L720 770 L720 706" fill="none" stroke="#9333ea" stroke-width="2.4" stroke-dasharray="7 6" marker-end="url(#arrow-purple)"/>
  <path d="M1385 842 L1385 758 L762 758 L762 706" fill="none" stroke="#9333ea" stroke-width="2.4" stroke-dasharray="7 6" marker-end="url(#arrow-purple)"/>
  <path d="M800 662 L835 662 L835 596 L1151 596 L1151 662" fill="none" stroke="#9333ea" stroke-width="2.4" stroke-dasharray="7 6" marker-end="url(#arrow-purple)"/>
  <path d="M995 706 L995 778 L265 778 L265 842" fill="none" stroke="#9333ea" stroke-width="2.4" stroke-dasharray="7 6" marker-end="url(#arrow-purple)"/>
  <text x="1005" y="752" text-anchor="middle" class="arrow-label">watch / notify / cleanup</text>
  <text x="508" y="770" text-anchor="middle" class="arrow-label">定时重检</text>

  <!-- Legend -->
  <g transform="translate(92 990)">
    <line x1="0" y1="0" x2="42" y2="0" stroke="#2563eb" stroke-width="2.6" marker-end="url(#arrow-blue)"/>
    <text x="52" y="4" class="legend">同步请求 / 控制动作</text>
    <line x1="210" y1="0" x2="252" y2="0" stroke="#16a34a" stroke-width="2.6" marker-end="url(#arrow-green)"/>
    <text x="262" y="4" class="legend">资源写入 / 期望态</text>
    <line x1="420" y1="0" x2="462" y2="0" stroke="#9333ea" stroke-width="2.6" stroke-dasharray="7 6" marker-end="url(#arrow-purple)"/>
    <text x="472" y="4" class="legend">异步 watch / 状态回写</text>
    <line x1="650" y1="0" x2="692" y2="0" stroke="#f97316" stroke-width="2.6" marker-end="url(#arrow-orange)"/>
    <text x="702" y="4" class="legend">外部事件 / 工具触发</text>
  </g>

  <text x="1508" y="1000" text-anchor="end" class="footnote">fireworks-tech-graph style: flat architecture, no mermaid</text>
</svg>
