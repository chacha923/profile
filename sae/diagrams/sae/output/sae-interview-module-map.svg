  <path d="M1032 870 C1000 795 1030 765 1085 700" stroke="#f97316" stroke-width="2.4" stroke-dasharray="7 5" fill="none" marker-end="url(#arrow-orange)"/>

  <rect x="70" y="1002" width="1460" height="34" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <g transform="translate(96,1013)">
    <line x1="0" y1="8" x2="42" y2="8" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
    <text x="52" y="12" class="legend">同步请求与编排</text>
    <line x1="190" y1="8" x2="232" y2="8" stroke="#9333ea" stroke-width="2.4" marker-end="url(#arrow-purple)"/>
    <text x="242" y="12" class="legend">异步监听与通知</text>
    <line x1="390" y1="8" x2="432" y2="8" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrow-green)"/>
    <text x="442" y="12" class="legend">状态回写与查询</text>
    <line x1="600" y1="8" x2="642" y2="8" stroke="#f97316" stroke-width="2.4" stroke-dasharray="7 5" marker-end="url(#arrow-orange)"/>
    <text x="652" y="12" class="legend">补偿、治理、外部事件</text>
  </g>
