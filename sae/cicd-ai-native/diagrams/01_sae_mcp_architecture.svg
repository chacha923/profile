<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" width="1120" height="720">
  <style>text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; }</style>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
  </defs>
  <rect width="1120" height="720" fill="#ffffff"/>
  <text x="560" y="38" font-size="19" fill="#111827" text-anchor="middle" font-weight="600">SAE CICD 能力 Agent 化 —— 总体架构</text>
  <text x="560" y="62" font-size="12" fill="#6b7280" text-anchor="middle">关键：Agent 没有特权后门，和人类入口复用同一套 Controller + 权限 + 审计</text>
  <rect x="120" y="90" width="380" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="310" y="120" font-size="14" fill="#1d4ed8" text-anchor="middle" font-weight="600">人类调用方</text>
  <text x="310" y="146" font-size="11.5" fill="#374151" text-anchor="middle">控制台 / OpenAPI</text>
  <rect x="620" y="90" width="380" height="80" rx="10" fill="#faf5ff" stroke="#9333ea" stroke-width="2"/>
  <text x="810" y="120" font-size="14" fill="#7c3aed" text-anchor="middle" font-weight="600">Agent 调用方</text>
  <text x="810" y="146" font-size="11.5" fill="#374151" text-anchor="middle">Moss-Compose / Claude Code（MCP Client）</text>
  <rect x="80" y="210" width="960" height="150" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="560" y="236" font-size="14.5" fill="#334155" text-anchor="middle" font-weight="600">sae-console 统一控制面（双入口，单治理）</text>
  <rect x="120" y="252" width="380" height="90" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="310" y="278" font-size="12.5" fill="#1d4ed8" text-anchor="middle" font-weight="600">人类入口</text>
  <text x="310" y="302" font-size="11" fill="#374151" text-anchor="middle">CAS 鉴权 + 权限校验 + 操作审计</text>
  <text x="310" y="324" font-size="11" fill="#6b7280" text-anchor="middle">页面 / OpenAPI 路由</text>
  <rect x="620" y="252" width="380" height="90" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="810" y="276" font-size="12.5" fill="#7c3aed" text-anchor="middle" font-weight="600">Agent 入口 /mcp/v1</text>
  <text x="810" y="298" font-size="11" fill="#374151" text-anchor="middle">McpAuth：加密 token 绑定真实用户身份</text>
  <text x="810" y="320" font-size="11" fill="#374151" text-anchor="middle">+ Resource 权限中间件（mcp 维度）</text>
  <line x1="310" y1="170" x2="310" y2="250" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="810" y1="170" x2="810" y2="250" stroke="#9333ea" stroke-width="2" marker-end="url(#ap)"/>
  <text x="560" y="305" font-size="11" fill="#16a34a" text-anchor="middle" font-weight="600">↓ 收敛到同一套 ↓</text>
  <rect x="80" y="400" width="960" height="120" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="560" y="426" font-size="14.5" fill="#15803d" text-anchor="middle" font-weight="600">同一套业务 Controller（同一权限 + 同一审计，复用不另起后门）</text>
  <rect x="120" y="448" width="280" height="58" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="260" y="472" font-size="12.5" fill="#111827" text-anchor="middle" font-weight="600">application Controller</text>
  <text x="260" y="494" font-size="10" fill="#6b7280" text-anchor="middle">list / queryAppInfo / getPods / batchUpdateImage</text>
  <rect x="420" y="448" width="280" height="58" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="560" y="472" font-size="12.5" fill="#111827" text-anchor="middle" font-weight="600">pipeline Controller</text>
  <text x="560" y="494" font-size="10" fill="#6b7280" text-anchor="middle">trigger / check / getCommit</text>
  <rect x="720" y="448" width="280" height="58" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="860" y="472" font-size="12.5" fill="#111827" text-anchor="middle" font-weight="600">rollout Controller</text>
  <text x="860" y="494" font-size="10" fill="#6b7280" text-anchor="middle">getRolloutInfo / promoteRollout / abortRollout</text>
  <line x1="310" y1="342" x2="310" y2="398" stroke="#16a34a" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="810" y1="342" x2="810" y2="398" stroke="#16a34a" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="80" y="560" width="960" height="110" rx="12" fill="#f9fafb" stroke="#9ca3af" stroke-width="2"/>
  <text x="560" y="586" font-size="14" fill="#4b5563" text-anchor="middle" font-weight="600">底座（复用，不自研）</text>
  <rect x="140" y="604" width="200" height="48" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="240" y="633" font-size="12" fill="#374151" text-anchor="middle">Kubernetes</text>
  <rect x="355" y="604" width="200" height="48" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="455" y="633" font-size="12" fill="#374151" text-anchor="middle">Tekton 构建</text>
  <rect x="570" y="604" width="200" height="48" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="670" y="633" font-size="12" fill="#374151" text-anchor="middle">Argo / 内部 Rollouts</text>
  <rect x="785" y="604" width="200" height="48" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="885" y="633" font-size="12" fill="#374151" text-anchor="middle">GitLab / Harbor</text>
  <line x1="560" y1="520" x2="560" y2="558" stroke="#16a34a" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="80" y="688" width="14" height="11" rx="2" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="100" y="698" font-size="11" fill="#6b7280" text-anchor="start">Agent 链路（新增的受控工具入口）</text>
  <rect x="360" y="688" width="14" height="11" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="698" font-size="11" fill="#6b7280" text-anchor="start">真实做过：MCP 入口 + 身份绑定 + 复用 Controller</text>
</svg>