<text x="40.0" y="92.0" text-anchor="start" fill="#64748b" font-size="19" font-weight="400">第一步永远是同时看 GPU_UTIL + 功耗 + 显存 + 吞吐/P99，再分叉；命令只是手段，关键是每步看什么、异常说明什么</text>
