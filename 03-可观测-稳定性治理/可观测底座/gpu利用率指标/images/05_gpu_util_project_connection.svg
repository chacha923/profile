<text x="2176.2" y="614.0" text-anchor="middle" fill="#1f2937" font-size="19" font-weight="400">成本治理榜单</text>
<rect x="50.0" y="690.0" width="2400.0" height="80.0" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="74.0" y="724.0" text-anchor="start" fill="#c2410c" font-size="22" font-weight="700">经验边界</text>
<text x="1310.0" y="720.0" text-anchor="middle" fill="#9a3412" font-size="19" font-weight="400">采集 / 观测 / 看板 / 画像 = 平台可观测与治理范围内的真实工作；推理引擎内部 (KV cache / 动态批 / 量化) 与 NCCL 细节 = 对标理解，不夸大为自研</text>
<text x="1310.0" y="744.0" text-anchor="middle" fill="#9a3412" font-size="19" font-weight="400">低利用率规则只用于筛选与给建议，在线推理服务不能脱离业务 SLA 与峰值流量直接强制回收</text>
