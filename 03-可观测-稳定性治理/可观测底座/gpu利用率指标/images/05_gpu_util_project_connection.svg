<text x="50.0" y="92.0" text-anchor="start" fill="#64748b" font-size="19" font-weight="400">目标不是把 GPU 打满，而是把『分配 vs 真实利用』讲清，输出规格推荐、准入与分时弹性，按 SLA 做成本治理</text>
