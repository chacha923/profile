<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1080" width="920" height="1080">
  <defs>
    <marker id="m-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="m-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
    <marker id="m-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
    <marker id="m-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6b7280"/></marker>
  </defs>
  <style>text{font-family:'Helvetica Neue',Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:20px;font-weight:700;fill:#111827}.n{font-size:14px;font-weight:600;fill:#111827}.s{font-size:12px;fill:#6b7280}.lbl{font-size:11px;font-weight:600;fill:#111827}</style>
  <rect width="920" height="1080" fill="#ffffff"/>
  <text x="460" y="42" text-anchor="middle" class="title">告警抖动抑制（STORM-FLAP）流程</text>
  <text x="460" y="66" text-anchor="middle" class="s">AlarmRepositoryImpl.aggregateEvent · 与发送侧限流关系示意</text>
  <rect x="24" y="88" width="872" height="658" rx="12" fill="none" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="40" y="112" class="s">聚合阶段</text>
  <rect x="330" y="128" width="260" height="56" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="460" y="154" text-anchor="middle" class="n">新告警到达</text>
  <text x="460" y="172" text-anchor="middle" class="s">同一 fingerprint</text>
  <polygon points="460,208 590,258 460,308 330,258" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="460" y="248" text-anchor="middle" class="n">存在 active 事件？</text>
  <text x="460" y="264" text-anchor="middle" class="s">status ∈ {firing, acked}</text>
  <rect x="640" y="208" width="248" height="100" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="764" y="238" text-anchor="middle" class="n">命中 active</text>
  <text x="764" y="258" text-anchor="middle" class="s">未静默：alert_count + 1 …</text>
  <text x="764" y="278" text-anchor="middle" class="s">已静默：suppressed_count + 1</text>
  <polygon points="460,354 610,408 460,462 310,408" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="460" y="394" text-anchor="middle" class="n">抖动抑制开启？</text>
  <text x="460" y="412" text-anchor="middle" class="s">stormEnabled &amp;&amp; flapSuppressMinutes &gt; 0</text>
  <polygon points="460,494 630,548 460,602 290,548" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <text x="460" y="534" text-anchor="middle" class="n">窗口内存在已结束事件？</text>
  <text x="460" y="552" text-anchor="middle" class="s">resolved/closed + recover_count &gt; 0</text>
  <rect x="56" y="628" width="248" height="96" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="180" y="662" text-anchor="middle" class="n">创建新聚合事件</text>
  <text x="180" y="682" text-anchor="middle" class="s">insertWithRetry，生成 event_no</text>
  <text x="180" y="700" text-anchor="middle" class="s">无 reopen 目标或未开抑制</text>
  <rect x="616" y="628" width="272" height="96" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="752" y="662" text-anchor="middle" class="n">reopenEvent</text>
  <text x="752" y="682" text-anchor="middle" class="s">复用原记录，status → firing</text>
  <text x="752" y="700" text-anchor="middle" class="s">更新 content / level / 计数</text>
  <line x1="460" y1="184" x2="460" y2="208" stroke="#2563eb" stroke-width="2" marker-end="url(#m-blue)"/>
  <path d="M 590 258 L 640 258" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#m-green)"/>
  <rect x="604" y="238" width="28" height="18" rx="3" fill="#ffffff" opacity="0.95"/><text x="618" y="251" text-anchor="middle" class="lbl">是</text>
  <line x1="460" y1="308" x2="460" y2="354" stroke="#dc2626" stroke-width="2" marker-end="url(#m-red)"/>
  <rect x="472" y="320" width="28" height="18" rx="3" fill="#ffffff" opacity="0.95"/><text x="486" y="333" text-anchor="middle" class="lbl">否</text>
  <path d="M 310 408 L 180 408 L 180 628" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#m-red)"/>
  <rect x="220" y="392" width="28" height="18" rx="3" fill="#ffffff" opacity="0.95"/><text x="234" y="405" text-anchor="middle" class="lbl">否</text>
  <line x1="460" y1="462" x2="460" y2="494" stroke="#2563eb" stroke-width="2" marker-end="url(#m-blue)"/>
  <rect x="472" y="472" width="28" height="18" rx="3" fill="#ffffff" opacity="0.95"/><text x="486" y="485" text-anchor="middle" class="lbl">是</text>
  <path d="M 630 548 L 752 548 L 752 628" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#m-green)"/>
  <rect x="678" y="528" width="28" height="18" rx="3" fill="#ffffff" opacity="0.95"/><text x="692" y="541" text-anchor="middle" class="lbl">是</text>
  <path d="M 460 602 L 460 612 L 320 612 L 320 628" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#m-red)"/>
  <rect x="472" y="596" width="28" height="18" rx="3" fill="#ffffff" opacity="0.95"/><text x="486" y="609" text-anchor="middle" class="lbl">否</text>
  <rect x="24" y="768" width="872" height="292" rx="12" fill="none" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="40" y="792" class="s">发送阶段（独立调用链）</text>
  <rect x="120" y="820" width="680" height="112" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="460" y="852" text-anchor="middle" class="n">AlertNotifySender · NotifyRateLimiter</text>
  <text x="460" y="876" text-anchor="middle" class="s">按 chatId / receiver 等维度滑动窗口；超限写 alarm_notify_record（success=false）</text>
  <text x="460" y="898" text-anchor="middle" class="s">与聚合 reopen/新建正交：aggregateEvent 完成后由通知链路触发</text>
  <line x1="460" y1="724" x2="460" y2="800" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#m-gray)"/>
  <text x="472" y="758" class="s">聚合结果 → Spring Event → 发送</text>
  <g transform="translate(40, 1020)">
    <text x="0" y="0" class="s">图例</text>
    <line x1="0" y1="18" x2="36" y2="18" stroke="#2563eb" stroke-width="2" marker-end="url(#m-blue)"/><text x="44" y="22" class="s">主路径</text>
    <line x1="120" y1="18" x2="156" y2="18" stroke="#16a34a" stroke-width="2" marker-end="url(#m-green)"/><text x="164" y="22" class="s">复用/更新</text>
    <line x1="260" y1="18" x2="296" y2="18" stroke="#dc2626" stroke-width="2" marker-end="url(#m-red)"/><text x="304" y="22" class="s">新建分支</text>
  </g>
</svg>