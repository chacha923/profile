<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #111827; }
    .phase { font-size: 15px; font-weight: 700; fill: #111827; }
    .sub { font-size: 12px; fill: #4b5563; }
    .small { font-size: 11px; fill: #6b7280; }
    .date { font-size: 12px; font-weight: 700; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#ffffff"/>
  <text x="40" y="44" class="title">Soul-Bigeyes 替换老告警网关分阶段切换时间线</text>
  <text x="40" y="70" class="small">原则：先验证数据闭环，再部门级灰度，最后全量接管。切换顺序优先避免重复通知，必要时接受短窗口漏发并通过落库追溯。</text>

  <line x1="86" y1="160" x2="1110" y2="160" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <g transform="translate(70,112)">
    <circle cx="0" cy="48" r="12" fill="#2563eb"/>
    <text x="-10" y="24" class="date">T0</text>
    <rect x="-36" y="86" width="220" height="152" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="-16" y="116" class="phase">验证期</text>
    <text x="-16" y="140" class="sub">老网关：原逻辑不动</text>
    <text x="-16" y="162" class="sub">老网关：新增 MQ 双写</text>
    <text x="-16" y="184" class="sub">Bigeyes：test-mode=true</text>
    <text x="-16" y="206" class="sub">通知：测试群/测试号码</text>
  </g>

  <g transform="translate(330,112)">
    <circle cx="0" cy="48" r="12" fill="#16a34a"/>
    <text x="-18" y="24" class="date">T+1</text>
    <rect x="-46" y="86" width="240" height="152" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="-24" y="116" class="phase">首部门灰度</text>
    <text x="-24" y="140" class="sub">先停老网关该部门通知</text>
    <text x="-24" y="162" class="sub">再开启 Bigeyes enabled</text>
    <text x="-24" y="184" class="sub">观察 alarm_notify_record</text>
    <text x="-24" y="206" class="sub">建议从 infra 开始</text>
  </g>

  <g transform="translate(620,112)">
    <circle cx="0" cy="48" r="12" fill="#f59e0b"/>
    <text x="-18" y="24" class="date">T+2</text>
    <rect x="-54" y="86" width="258" height="152" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="-30" y="116" class="phase">批量扩部门</text>
    <text x="-30" y="140" class="sub">每批保持配置镜像</text>
    <text x="-30" y="162" class="sub">migrated = enabled</text>
    <text x="-30" y="184" class="sub">按部门确认飞书/短信/电话</text>
    <text x="-30" y="206" class="sub">异常按反向顺序回滚</text>
  </g>

  <g transform="translate(930,112)">
    <circle cx="0" cy="48" r="12" fill="#dc2626"/>
    <text x="-18" y="24" class="date">T+3</text>
    <rect x="-62" y="86" width="260" height="152" rx="12" fill="#fef2f2" stroke="#fecaca"/>
    <text x="-38" y="116" class="phase">全量接管</text>
    <text x="-38" y="140" class="sub">Bigeyes：gray-enabled=false</text>
    <text x="-38" y="162" class="sub">老网关：notify-disabled=true</text>
    <text x="-38" y="184" class="sub">老网关只保留发 MQ</text>
    <text x="-38" y="206" class="sub">稳定后下线旧通知代码</text>
  </g>

  <rect x="70" y="390" width="1060" height="82" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="94" y="418" class="phase">配置镜像规则</text>
  <text x="94" y="444" class="sub">老网关 alert.gateway.migrated-departments = Bigeyes notify.gray.enabled-departments</text>
  <text x="94" y="466" class="sub">上线：先让老网关停发该部门，再让 Bigeyes 接管。回滚：先恢复老网关，再关闭 Bigeyes 对该部门通知。</text>
</svg>
