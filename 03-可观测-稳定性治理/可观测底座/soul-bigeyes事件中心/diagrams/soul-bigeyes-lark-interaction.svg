      <line x1="55" y1="42" x2="55" y2="520"/><line x1="220" y1="42" x2="220" y2="520"/><line x1="405" y1="42" x2="405" y2="520"/><line x1="610" y1="42" x2="610" y2="520"/><line x1="815" y1="42" x2="815" y2="520"/><line x1="1000" y1="42" x2="1000" y2="520"/>
    </g>
    <line x1="55" y1="88" x2="220" y2="88" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/><text x="138" y="80" text-anchor="middle" class="msg">点击 ack/mute/误报/拉群</text>
    <line x1="220" y1="134" x2="405" y2="134" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/><text x="312" y="126" text-anchor="middle" class="msg">P2CardActionTrigger</text>
    <rect x="388" y="146" width="34" height="86" rx="4" fill="#ede9fe" stroke="#c4b5fd"/>
    <line x1="405" y1="178" x2="610" y2="178" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/><text x="508" y="170" text-anchor="middle" class="msg">key -> LarkCallback 分发</text>
    <rect x="593" y="190" width="34" height="142" rx="4" fill="#fed7aa" stroke="#fdba74"/>
    <line x1="610" y1="226" x2="815" y2="226" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/><text x="712" y="218" text-anchor="middle" class="msg">ack/mute/positive/falsePositive</text>
