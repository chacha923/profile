<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" width="1180" height="660">
  <style>text{font-family:'Helvetica Neue',Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:22px;font-weight:700;fill:#111827}.head{font-size:14px;font-weight:700;fill:#111827}.msg{font-size:12px;fill:#374151}.note{font-size:11px;fill:#6b7280}</style>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker><marker id="green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker></defs>
  <rect width="1180" height="660" fill="#fff"/>
