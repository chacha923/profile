<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" width="1280" height="620">
  <style>text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; }</style>
  <defs>
    <marker id="b" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#9ca3af"/></marker>
  </defs>
  <rect width="1280" height="620" fill="#ffffff"/>
  <text x="640" y="34" font-size="19" fill="#111827" text-anchor="middle" font-weight="600">阿里云在 AIOps 各环节已 skill 化盘点（来自 alibabacloud-aiops-skills 仓库）</text>
  <text x="640" y="57" font-size="12" fill="#6b7280" text-anchor="middle">绿=已成体系 · 蓝=已覆盖 · 橙=部分/工具化 · 灰=偏薄或未单独 skill 化（自研/算法空间）</text>

  <!-- entry band -->
  <rect x="30" y="76" width="1220" height="44" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="50" y="103" font-size="12.5" fill="#7c3aed" font-weight="600">运维问答 / Agent 入口：</text>
  <text x="225" y="103" font-size="11.5" fill="#374151">STAROps Chat（自然语言根因 / APM / 链路问答）· 各 DB Copilot（RDS / PolarDB / ADB）作为子域入口</text>

  <!-- 6 stage columns, y 140..470 -->
  <!-- col1 观测告警 -->
  <rect x="30" y="140" width="190" height="330" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="125" y="166" font-size="13.5" fill="#1d4ed8" text-anchor="middle" font-weight="600">观测 · 告警</text>
  <rect x="42" y="180" width="166" height="38" rx="5" fill="#ffffff" stroke="#bfdbfe"/><text x="125" y="204" font-size="10.5" fill="#374151" text-anchor="middle">CMS 监控/告警规则</text>
  <rect x="42" y="224" width="166" height="38" rx="5" fill="#ffffff" stroke="#bfdbfe"/><text x="125" y="248" font-size="10.5" fill="#374151" text-anchor="middle">SLS 日志查询/索引</text>
  <rect x="42" y="268" width="166" height="38" rx="5" fill="#ffffff" stroke="#bfdbfe"/><text x="125" y="292" font-size="10.5" fill="#374151" text-anchor="middle">EMAS APM 查询</text>
  <rect x="42" y="312" width="166" height="38" rx="5" fill="#ffffff" stroke="#bfdbfe"/><text x="125" y="336" font-size="10.5" fill="#374151" text-anchor="middle">EBS 磁盘指标分析</text>
  <rect x="42" y="424" width="166" height="32" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="125" y="445" font-size="10.5" fill="#1d4ed8" text-anchor="middle" font-weight="600">已覆盖</text>

  <!-- col2 巡检发现 -->
  <rect x="234" y="140" width="190" height="330" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <text x="329" y="166" font-size="13.5" fill="#15803d" text-anchor="middle" font-weight="600">巡检 · 发现</text>
  <rect x="246" y="180" width="166" height="44" rx="5" fill="#ffffff" stroke="#86efac"/><text x="329" y="207" font-size="10.5" fill="#374151" text-anchor="middle">ECS 健康巡检</text>
  <rect x="246" y="230" width="166" height="44" rx="5" fill="#ffffff" stroke="#86efac"/><text x="329" y="257" font-size="10.5" fill="#374151" text-anchor="middle">Alinux SysOM 巡检</text>
  <rect x="246" y="280" width="166" height="44" rx="5" fill="#ffffff" stroke="#86efac"/><text x="329" y="307" font-size="10.5" fill="#374151" text-anchor="middle">ECS 诊断 / 宕机诊断</text>
  <rect x="246" y="424" width="166" height="32" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="329" y="445" font-size="10.5" fill="#15803d" text-anchor="middle" font-weight="600">Playbook 化</text>

