<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" width="1080" height="700">
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .sub { font-size: 13px; fill: #6b7280; }
    .h { font-size: 15px; font-weight: 700; fill: #111827; }
    .t { font-size: 12.5px; fill: #374151; }
    .s { font-size: 11.5px; fill: #6b7280; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .green { fill: #ecfdf5; stroke: #86efac; }
    .blue { fill: #eff6ff; stroke: #93c5fd; }
    .amber { fill: #fffbeb; stroke: #fcd34d; }
    .cyan { fill: #ecfeff; stroke: #67e8f9; }
    .violet { fill: #f5f3ff; stroke: #c4b5fd; }
  </style>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1080" height="700" fill="#ffffff"/>
  <text x="540" y="40" text-anchor="middle" class="title">Agent 推理范式对比</text>
  <text x="540" y="66" text-anchor="middle" class="sub">RCA 该用哪种？看任务是"边走边查"还是"先规划再执行"，以及要不要自我反思</text>

  <rect x="40" y="95" width="320" height="280" rx="8" class="box blue"/>
  <text x="200" y="123" text-anchor="middle" class="h">ReAct（边推理边行动）</text>
  <rect x="90" y="140" width="220" height="34" rx="6" class="box green"/>
  <text x="200" y="162" text-anchor="middle" class="t">Thought 想下一步查什么</text>
  <rect x="90" y="186" width="220" height="34" rx="6" class="box amber"/>
  <text x="200" y="208" text-anchor="middle" class="t">Action 调用工具取证</text>
  <rect x="90" y="232" width="220" height="34" rx="6" class="box cyan"/>
  <text x="200" y="254" text-anchor="middle" class="t">Observation 看结果</text>
  <path d="M200 174 L200 186" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M200 220 L200 232" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M310 249 C350 230 350 175 215 158" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <text x="335" y="205" class="s">循环</text>
  <text x="60" y="300" class="s">✓ 适合探索式排障、步数不定</text>
  <text x="60" y="322" class="s">✓ 每步都有证据，可解释</text>
  <text x="60" y="346" class="s">✗ 可能绕路、步数多、成本高</text>
  <text x="60" y="368" class="s">RCA 默认范式</text>

  <rect x="380" y="95" width="320" height="280" rx="8" class="box violet"/>
  <text x="540" y="123" text-anchor="middle" class="h">Plan-and-Execute</text>
  <rect x="430" y="140" width="220" height="40" rx="6" class="box blue"/>
  <text x="540" y="165" text-anchor="middle" class="t">Planner 先列完整计划</text>
  <rect x="430" y="196" width="100" height="34" rx="6" class="box amber"/>
  <text x="480" y="218" text-anchor="middle" class="s">步骤1</text>
  <rect x="550" y="196" width="100" height="34" rx="6" class="box amber"/>
  <text x="600" y="218" text-anchor="middle" class="s">步骤2</text>
  <rect x="430" y="244" width="220" height="34" rx="6" class="box green"/>
  <text x="540" y="266" text-anchor="middle" class="t">Executor 按计划执行</text>
  <path d="M540 180 L540 196" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M540 230 L540 244" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="400" y="300" class="s">✓ 步骤可控、可并行、可审计</text>
  <text x="400" y="322" class="s">✓ 适合流程相对固定的诊断</text>
  <text x="400" y="346" class="s">✗ 计划僵化，环境变了要重规划</text>
  <text x="400" y="368" class="s">告警分诊编排常用</text>

  <rect x="720" y="95" width="320" height="280" rx="8" class="box amber"/>
  <text x="880" y="123" text-anchor="middle" class="h">Reflexion（自我反思）</text>
  <rect x="770" y="140" width="220" height="34" rx="6" class="box blue"/>
  <text x="880" y="162" text-anchor="middle" class="t">执行一轮(ReAct/Plan)</text>
  <rect x="770" y="186" width="220" height="34" rx="6" class="box cyan"/>
  <text x="880" y="208" text-anchor="middle" class="t">自评：结论有证据吗</text>
  <rect x="770" y="232" width="220" height="34" rx="6" class="box green"/>
  <text x="880" y="254" text-anchor="middle" class="t">反思 → 补查 → 修正</text>
  <path d="M880 174 L880 186" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M880 220 L880 232" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M990 249 C1030 220 1020 165 895 158" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <text x="740" y="300" class="s">✓ 减少"看似合理但无证据"</text>
  <text x="740" y="322" class="s">✓ 适合质量要求高的 RCA</text>
  <text x="740" y="346" class="s">✗ 更慢更贵，要设反思上限</text>
  <text x="740" y="368" class="s">叠加在前两者之上</text>

  <rect x="80" y="405" width="920" height="120" rx="8" class="box green"/>
  <text x="110" y="433" class="h">RCA 实战组合（我会怎么用）</text>
  <text x="110" y="458" class="s">· 主干用 ReAct：排障步数不定、要边查边判断，每步留证据；</text>
  <text x="110" y="480" class="s">· 外层套 Plan：先按告警类别分诊出固定 Phase（上下文→画像→取证→归因→报告），保证不漏关键步骤；</text>
  <text x="110" y="502" class="s">· 关键结论前加一次 Reflexion：自检"是否有反证、是否该输出 Unknown"，但设最大反思轮数控成本。</text>

  <rect x="80" y="545" width="920" height="130" rx="8" class="box violet"/>
  <text x="110" y="573" class="h">面试落点</text>
  <text x="110" y="598" class="s">· 能说清三种范式的适用边界，比只会说"用了 LangChain"高级得多；</text>
  <text x="110" y="620" class="s">· 强调 RCA 不是越自由越好：固定 Phase 防漏 + ReAct 防僵化 + Reflexion 防幻觉，是工程化的平衡；</text>
  <text x="110" y="642" class="s">· 范式选择本质是"自主性 vs 可控性 vs 成本"的三角权衡，没有银弹；</text>
  <text x="110" y="664" class="s">· ToT/Graph 等更复杂范式在 RCA 里收益有限，优先简单可控。</text>
</svg>
