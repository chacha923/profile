<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" width="1080" height="700">
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .sub { font-size: 13px; fill: #6b7280; }
    .h { font-size: 15px; font-weight: 700; fill: #111827; }
    .t { font-size: 12.5px; fill: #374151; }
    .s { font-size: 11.5px; fill: #6b7280; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .green { fill: #ecfdf5; stroke: #86efac; }
    .blue { fill: #eff6ff; stroke: #93c5fd; }
    .amber { fill: #fffbeb; stroke: #fcd34d; }
    .cyan { fill: #ecfeff; stroke: #67e8f9; }
    .violet { fill: #f5f3ff; stroke: #c4b5fd; }
    .red { fill: #fef2f2; stroke: #fca5a5; }
  </style>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1080" height="700" fill="#ffffff"/>
  <text x="540" y="40" text-anchor="middle" class="title">PagerDuty 核心机制拆解</text>
  <text x="540" y="66" text-anchor="middle" class="sub">本质是"事件路由 + on-call 排班 + 升级策略"三件套，保证告警一定有人接、接不到会升级</text>

  <rect x="40" y="95" width="200" height="70" rx="8" class="box blue"/>
  <text x="140" y="123" text-anchor="middle" class="h">Integration / Service</text>
  <text x="140" y="146" text-anchor="middle" class="s">监控源接入 → 事件入口</text>

  <rect x="300" y="95" width="220" height="70" rx="8" class="box cyan"/>
  <text x="410" y="120" text-anchor="middle" class="h">Event Rules</text>
  <text x="410" y="143" text-anchor="middle" class="s">去重 / 抑制 / 富化 / 分组</text>
  <text x="410" y="160" text-anchor="middle" class="s">降噪：多告警 → 一个 Incident</text>

  <rect x="580" y="95" width="200" height="70" rx="8" class="box amber"/>
  <text x="680" y="120" text-anchor="middle" class="h">Escalation Policy</text>
  <text x="680" y="143" text-anchor="middle" class="s">升级策略：几分钟没 ack</text>
  <text x="680" y="160" text-anchor="middle" class="s">就升到下一级</text>

  <rect x="840" y="95" width="200" height="70" rx="8" class="box green"/>
  <text x="940" y="120" text-anchor="middle" class="h">On-call Schedule</text>
  <text x="940" y="143" text-anchor="middle" class="s">轮班排期 → 当前谁值班</text>
  <text x="940" y="160" text-anchor="middle" class="s">解析出真实的人</text>

  <path d="M240 130 L300 130" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M520 130 L580 130" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M780 130 L840 130" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="380" y="220" width="320" height="60" rx="8" class="box violet"/>
  <text x="540" y="245" text-anchor="middle" class="h">Incident（事件对象）</text>
  <text x="540" y="266" text-anchor="middle" class="s">状态机：Triggered → Acknowledged → Resolved</text>
  <path d="M410 165 L520 218" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="120" y="330" width="220" height="180" rx="8" class="box amber"/>
  <text x="230" y="358" text-anchor="middle" class="h">升级阶梯（核心保障）</text>
  <rect x="150" y="375" width="160" height="34" rx="6" class="box green"/>
  <text x="230" y="397" text-anchor="middle" class="s">L1 主 on-call</text>
  <rect x="150" y="420" width="160" height="34" rx="6" class="box cyan"/>
  <text x="230" y="442" text-anchor="middle" class="s">L2 备 on-call</text>
  <rect x="150" y="465" width="160" height="34" rx="6" class="box red"/>
  <text x="230" y="487" text-anchor="middle" class="s">L3 主管 / 团队</text>
  <path d="M230 409 L230 420" stroke="#dc2626" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M230 454 L230 465" stroke="#dc2626" stroke-width="2" marker-end="url(#arr)"/>
  <text x="325" y="445" class="s">超时未 ack</text>
  <text x="325" y="462" class="s">自动升级</text>

  <rect x="400" y="330" width="290" height="180" rx="8" class="box blue"/>
  <text x="545" y="358" text-anchor="middle" class="h">多通道触达</text>
  <text x="420" y="384" class="s">· Push / 电话 / SMS / IM / 邮件</text>
  <text x="420" y="406" class="s">· 重复提醒直到 ack</text>
  <text x="420" y="428" class="s">· 保证"叫得醒"——半夜也能触达</text>
  <text x="420" y="450" class="s">· 减少"告警发了但没人看"</text>
  <text x="420" y="478" class="s">关键价值：告警一定有人接，</text>
  <text x="420" y="498" class="s">接不到会自动找到下一个人。</text>

  <rect x="710" y="330" width="290" height="180" rx="8" class="box violet"/>
  <text x="855" y="358" text-anchor="middle" class="h">协同与扩展</text>
  <text x="730" y="384" class="s">· ChatOps：IM 里 ack/升级/拉人</text>
  <text x="730" y="406" class="s">· Stakeholder 通报 / 状态页</text>
  <text x="730" y="428" class="s">· Runbook 自动附在事件上</text>
  <text x="730" y="450" class="s">· Webhook 触发自动化动作</text>
  <text x="730" y="472" class="s">· 复盘报告自动生成时间线</text>
  <text x="730" y="498" class="s">· 全程可计时、可审计</text>

  <rect x="60" y="535" width="940" height="135" rx="8" class="box green"/>
  <text x="90" y="563" class="h">面试落点：为什么 PagerDuty 值得参考</text>
  <text x="90" y="588" class="s">· 它把"谁该被叫、几分钟没人接怎么办、怎么不漏不重"做成了确定性的流程引擎，这是协同处置的地基；</text>
  <text x="90" y="610" class="s">· 三件套：Event Rules（降噪分组）+ On-call Schedule（排班解析到人）+ Escalation Policy（超时升级）；</text>
  <text x="90" y="632" class="s">· 国内对标：Opsgenie、夜莺/Grafana OnCall（开源）、FireHydrant / incident.io（偏事件协同与复盘）；</text>
  <text x="90" y="654" class="s">· 落地时不必全抄，先把"告警一定有人接 + 超时自动升级 + 一个事件聚合多告警"三条做扎实。</text>
</svg>
