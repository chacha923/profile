<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 1080" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<defs><marker id="ar" markerWidth="13" markerHeight="13" refX="9" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#64748b"/></marker></defs>
<rect x="0" y="0" width="2200" height="1080" fill="#ffffff"/>
<text x="1100" y="58" text-anchor="middle" fill="#0f172a" font-size="32" font-weight="800">防幻觉四层 · 把 LLM 约束成证据驱动的排障系统</text>
<polygon points="220,150 1980,150 1837,300 364,300" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
<text x="1100" y="194" text-anchor="middle" fill="#2563eb" font-size="26" font-weight="800">第一层 · 只读工具取证</text>
<text x="1100" y="218" text-anchor="middle" fill="#334155" font-size="19">所有工具只读：k8s/Prometheus/日志/事件/变更/节点池</text>
<text x="1100" y="245" text-anchor="middle" fill="#334155" font-size="19">模型只能拿真实数据，不能动线上；空结果也是合法返回</text>
<line x1="1100" y1="300" x2="1100" y2="322" stroke="#94a3b8" stroke-width="3.5" marker-end="url(#ar)"/>
<polygon points="364,324 1837,324 1693,474 507,474" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
<text x="1100" y="368" text-anchor="middle" fill="#0891b2" font-size="26" font-weight="800">第二层 · 知识库案例逐项验证</text>
<text x="1100" y="392" text-anchor="middle" fill="#334155" font-size="19">对照飞书「故障案例分析」自上而下逐项验证故障现象</text>
<text x="1100" y="419" text-anchor="middle" fill="#334155" font-size="19">每项要「时间→现象→证据」；全通过才认根因，否则未找到根因</text>
<line x1="1100" y1="474" x2="1100" y2="496" stroke="#94a3b8" stroke-width="3.5" marker-end="url(#ar)"/>
<polygon points="507,498 1693,498 1550,648 650,648" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
<text x="1100" y="542" text-anchor="middle" fill="#7c3aed" font-size="26" font-weight="800">第三层 · 12项否决式质检</text>
<text x="1100" y="566" text-anchor="middle" fill="#334155" font-size="19">terminate 前过 OBSERVER_PROMPT 12项检查</text>
<text x="1100" y="593" text-anchor="middle" fill="#334155" font-size="19">不确定表述/条件结论/数据溯源/工具名/虚构路径…任一不过禁结束</text>
<line x1="1100" y1="648" x2="1100" y2="670" stroke="#94a3b8" stroke-width="3.5" marker-end="url(#ar)"/>
<polygon points="650,672 1550,672 1407,822 794,822" fill="#f0fdf4" stroke="#059669" stroke-width="3"/>
<text x="1100" y="716" text-anchor="middle" fill="#059669" font-size="26" font-weight="800">第四层 · 确定性与脱敏</text>
<text x="1100" y="740" text-anchor="middle" fill="#334155" font-size="19">temperature=0 降输出抖动，诊断可复现</text>
<text x="1100" y="767" text-anchor="middle" fill="#334155" font-size="19">报告剔除工具名与 kubectl 命令，面向研发只给可执行动作</text>
<text x="120" y="190" fill="#dc2626" font-size="23" font-weight="800">幻觉空间大</text>
<text x="120" y="218" fill="#94a3b8" font-size="18">模型自由发挥</text>
<rect x="610" y="876" width="980" height="86" rx="14" fill="#dcfce7" stroke="#059669" stroke-width="3"/>
<text x="1100" y="916" text-anchor="middle" fill="#059669" font-size="26" font-weight="800">证据驱动 · 受控 · 可质检的根因报告</text>
<text x="1100" y="946" text-anchor="middle" fill="#475569" font-size="19">匹配不上 → 「未找到根因」，宁可不答也不猜（错误根因比没有更危险）</text>
</svg>