<text x="922.0" y="446.0" text-anchor="start" fill="#334155" font-size="16" font-weight="400">· 验证：是否依赖 AlreadyExists 当成功</text>
<text x="922.0" y="480.0" text-anchor="start" fill="#334155" font-size="16" font-weight="400">· 是否设了 owner reference</text>
<text x="922.0" y="514.0" text-anchor="start" fill="#334155" font-size="16" font-weight="400">· reconcile 是否每轮重算正确</text>
<rect x="900.0" y="602.0" width="400.0" height="96.0" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
