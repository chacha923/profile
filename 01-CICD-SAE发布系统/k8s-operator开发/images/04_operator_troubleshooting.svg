<text x="502.0" y="446.0" text-anchor="start" fill="#334155" font-size="16" font-weight="400">· 验证：控制器 error 日志</text>
<text x="502.0" y="480.0" text-anchor="start" fill="#334155" font-size="16" font-weight="400">· kubectl get deploy/svc/ingress</text>
<text x="502.0" y="514.0" text-anchor="start" fill="#334155" font-size="16" font-weight="400">· 查命名冲突 / namespace / RBAC 不足</text>
