<text x="880.0" y="1010.0" text-anchor="middle" fill="#065f46" font-size="18" font-weight="400">多数问题落在「reconcile 幂等」与「CR → 子资源 → 网关 三层对账」；优化方向：CreateOrUpdate/SSA、owner reference 级联、副作用失败 requeue 而非只 log</text>
