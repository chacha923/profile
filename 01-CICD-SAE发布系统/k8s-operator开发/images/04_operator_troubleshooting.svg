<text x="260.0" y="140.0" text-anchor="middle" fill="#2563eb" font-size="18" font-weight="700">症状</text>
<text x="260.0" y="174.0" text-anchor="middle" fill="#1f2937" font-size="19" font-weight="700">CR 提交但子资源没出现</text>
<rect x="60.0" y="240.0" width="400.0" height="90.0" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
<text x="82.0" y="270.0" text-anchor="start" fill="#2563eb" font-size="16" font-weight="700">假设</text>
<text x="290.0" y="270.0" text-anchor="middle" fill="#334155" font-size="16" font-weight="400">假设1 控制器没收到事件/没跑</text>
<text x="260.0" y="300.0" text-anchor="middle" fill="#334155" font-size="16" font-weight="400">假设2 reconcile 进来就 return</text>
<rect x="60.0" y="380.0" width="400.0" height="172.0" rx="12" fill="#f8fafc" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,4"/>
<text x="260.0" y="414.0" text-anchor="middle" fill="#2563eb" font-size="18" font-weight="700">验证 / 看指标</text>
<text x="82.0" y="446.0" text-anchor="start" fill="#334155" font-size="16" font-weight="400">· 验证：get application -o yaml 看 CR 在否</text>
<text x="82.0" y="480.0" text-anchor="start" fill="#334155" font-size="16" font-weight="400">· 控制器日志有无该 key、SetupWithManager 注册</text>
<text x="82.0" y="514.0" text-anchor="start" fill="#334155" font-size="16" font-weight="400">· spec 关键字段 WorkloadRef/Image 是否齐</text>
