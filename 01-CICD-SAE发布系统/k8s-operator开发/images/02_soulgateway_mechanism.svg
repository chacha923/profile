<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 1020" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1320" height="1020" fill="#ffffff"/>
<defs>
<marker id="ar" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#475569"/></marker>
<marker id="arb" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/></marker>
<marker id="arg" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#059669"/></marker>
<marker id="arr" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#dc2626"/></marker>
</defs>
<text x="660.0" y="50" fill="#0f172a" font-size="30" font-weight="700" text-anchor="middle">SetWeight 下发 与 VerifyWeight 三段式对账</text>
<rect x="70" y="84" width="540" height="46" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="340.0" y="114" fill="#ea580c" font-size="22" font-weight="700" text-anchor="middle">SetWeight：声明期望权重并一次性下发</text>
<rect x="70" y="150" width="540" height="56" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="340.0" y="184" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">从 StableIngress GetCached 取 Ingress</text>
<line x1="340.0" y1="206" x2="340.0" y2="230" stroke="#ea580c" stroke-width="2.6" marker-end="url(#ar)"/>
<rect x="70" y="230" width="540" height="56" rx="10" fill="#fef3c7" stroke="#ea580c" stroke-width="2"/>
<text x="340.0" y="264" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">Status.Canary.Weights==nil → return</text>
<line x1="340.0" y1="286" x2="340.0" y2="310" stroke="#ea580c" stroke-width="2.6" marker-end="url(#ar)"/>
<rect x="70" y="310" width="540" height="76" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="340.0" y="340" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">解析 stable/canary 两 Service 的 Ready Pod</text>
<text x="340.0" y="366" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">→ 网关节点(IP:Port)</text>
<line x1="340.0" y1="386" x2="340.0" y2="410" stroke="#ea580c" stroke-width="2.6" marker-end="url(#ar)"/>
<rect x="70" y="410" width="540" height="76" rx="10" fill="#ffe4e6" stroke="#ea580c" stroke-width="2"/>
<text x="340.0" y="440" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">特判 desiredWeight==0 且 canary 非空</text>
<text x="340.0" y="466" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">→ stableNodes = canaryNodes（全量回切）</text>
<line x1="340.0" y1="486" x2="340.0" y2="510" stroke="#ea580c" stroke-width="2.6" marker-end="url(#ar)"/>
<rect x="70" y="510" width="540" height="56" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="340.0" y="544" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">组装 stable.Weight=100-w / canary.Weight=w</text>
<line x1="340.0" y1="566" x2="340.0" y2="590" stroke="#ea580c" stroke-width="2.6" marker-end="url(#ar)"/>
<rect x="70" y="590" width="540" height="56" rx="10" fill="#fee2e2" stroke="#ea580c" stroke-width="2"/>
<text x="340.0" y="624" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">空保护：stable 节点为空 → warn+return</text>
<line x1="340.0" y1="646" x2="340.0" y2="670" stroke="#ea580c" stroke-width="2.6" marker-end="url(#ar)"/>
<rect x="70" y="670" width="540" height="56" rx="10" fill="#dcfce7" stroke="#ea580c" stroke-width="2"/>
<text x="340.0" y="704" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">POST /cloud/flowControl 下发 CANARY 策略</text>
<rect x="710" y="84" width="540" height="46" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="980.0" y="114" fill="#dc2626" font-size="22" font-weight="700" text-anchor="middle">VerifyWeight：确认实际并多轮对账收敛</text>
<rect x="710" y="150" width="540" height="76" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="980.0" y="180" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">GET /cloud/flowControl/get 拉网关实际</text>
<text x="980.0" y="206" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">stable/canary 节点；任一 nil → verified=false</text>
<line x1="980.0" y1="226" x2="980.0" y2="250" stroke="#dc2626" stroke-width="2.6" marker-end="url(#arr)"/>
<rect x="710" y="250" width="540" height="56" rx="10" fill="#dcfce7" stroke="#dc2626" stroke-width="2"/>
<text x="980.0" y="284" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">快路径：节点数+权重都相等 → verified=true</text>
<line x1="980.0" y1="306" x2="980.0" y2="330" stroke="#dc2626" stroke-width="2.6" marker-end="url(#arr)"/>
<rect x="710" y="330" width="540" height="76" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="980.0" y="360" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">慢路径①：stableNodes 按 pod-template-hash</text>
<text x="980.0" y="386" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">过滤版本，网关缺的 → go UpNode(stable)</text>
<line x1="980.0" y1="406" x2="980.0" y2="430" stroke="#dc2626" stroke-width="2.6" marker-end="url(#arr)"/>
<rect x="710" y="430" width="540" height="76" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="980.0" y="460" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">慢路径②：canaryNodes 同理，仅 w!=0 时</text>
<text x="980.0" y="486" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">→ go UpNode(canary)</text>
<line x1="980.0" y1="506" x2="980.0" y2="530" stroke="#dc2626" stroke-width="2.6" marker-end="url(#arr)"/>
<rect x="710" y="530" width="540" height="76" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="980.0" y="560" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">慢路径③：网关多余节点(不在应有集合)</text>
<text x="980.0" y="586" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">→ DownNode 摘除</text>
<line x1="980.0" y1="606" x2="980.0" y2="630" stroke="#dc2626" stroke-width="2.6" marker-end="url(#arr)"/>
<rect x="710" y="630" width="540" height="76" rx="10" fill="#fde68a" stroke="#dc2626" stroke-width="2"/>
<text x="980.0" y="660" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">本轮返回 verified=false，下轮再验</text>
<text x="980.0" y="686" fill="#1f2937" font-size="19" font-weight="600" text-anchor="middle">→ 直到快路径命中</text>
<path d="M 1250 690 C 1320 690 1320 170 1250 170" fill="none" stroke="#dc2626" stroke-width="2.4" stroke-dasharray="6,4" marker-end="url(#arr)"/>
<text x="1328" y="450.0" fill="#dc2626" font-size="18" font-weight="700" text-anchor="middle">多轮收敛</text>
</svg>