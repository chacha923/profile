<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1120" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1680" height="1120" fill="#ffffff"/>
<defs>
<marker id="ar" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L11,4 L0,8 Z" fill="#475569"/></marker>
<marker id="arb" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L11,4 L0,8 Z" fill="#2563eb"/></marker>
<marker id="arg" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L11,4 L0,8 Z" fill="#059669"/></marker>
<marker id="aro" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L11,4 L0,8 Z" fill="#ea580c"/></marker>
</defs>
<text x="840.0" y="56.0" text-anchor="middle" fill="#0f172a" font-size="32" font-weight="700">Application Reconcile 调和循环 + status conditions 状态机</text>
<rect x="70.0" y="90.0" width="1540.0" height="470.0" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
<text x="96.0" y="128.0" text-anchor="start" fill="#334155" font-size="23" font-weight="700">调和循环（每次事件/变更触发，写成「看当前 status 决定下一步」）</text>
<rect x="110.0" y="160.0" width="250.0" height="90.0" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="235.0" y="198.2" text-anchor="middle" fill="#1f2937" font-size="20" font-weight="400">事件触发</text>
<text x="235.0" y="226.2" text-anchor="middle" fill="#1f2937" font-size="20" font-weight="400">apiserver Watch</text>
<rect x="430.0" y="160.0" width="260.0" height="90.0" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="560.0" y="198.2" text-anchor="middle" fill="#1f2937" font-size="20" font-weight="400">Get(CR)</text>
<text x="560.0" y="226.2" text-anchor="middle" fill="#1f2937" font-size="20" font-weight="400">读当前 Application</text>
<rect x="760.0" y="150.0" width="300.0" height="110.0" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="910.0" y="193.0" text-anchor="middle" fill="#ea580c" font-size="21" font-weight="700">IsNotFound ?</text>
<text x="910.0" y="228.0" text-anchor="middle" fill="#9a3412" font-size="18" font-weight="400">对象已删 → 直接返回(GC)</text>
<rect x="1130.0" y="150.0" width="420.0" height="110.0" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="1340.0" y="193.0" text-anchor="middle" fill="#ea580c" font-size="21" font-weight="700">看 status conditions 阶段</text>
<text x="1340.0" y="228.0" text-anchor="middle" fill="#9a3412" font-size="18" font-weight="400">决定本轮该做什么副作用</text>
<path d="M 360.0,205.0 L 430.0,205.0" fill="none" stroke="#2563eb" stroke-width="3.0" marker-end="url(#arb)"/>
<path d="M 690.0,205.0 L 760.0,205.0" fill="none" stroke="#2563eb" stroke-width="3.0" marker-end="url(#arb)"/>
<path d="M 1060.0,205.0 L 1130.0,205.0" fill="none" stroke="#ea580c" stroke-width="3.0" marker-end="url(#aro)"/>
<rect x="110.0" y="330.0" width="420.0" height="100.0" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
<text x="320.0" y="373.3" text-anchor="middle" fill="#1f2937" font-size="19" font-weight="400">conditions 为空 + WorkloadRef 有</text>
<text x="320.0" y="400.3" text-anchor="middle" fill="#1f2937" font-size="19" font-weight="400">→ 打 Progressing，Status().Update 返回</text>
<rect x="560.0" y="330.0" width="460.0" height="100.0" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
<text x="790.0" y="373.3" text-anchor="middle" fill="#1f2937" font-size="19" font-weight="400">hasProgressing 且未 Available</text>
<text x="790.0" y="400.3" text-anchor="middle" fill="#1f2937" font-size="19" font-weight="400">→ 建 Deployment / Service / Ingress</text>
<rect x="1050.0" y="330.0" width="500.0" height="100.0" rx="12" fill="#ffffff" stroke="#059669" stroke-width="2"/>
<text x="1300.0" y="373.3" text-anchor="middle" fill="#1f2937" font-size="19" font-weight="400">创建返回 nil 或 AlreadyExists</text>
<text x="1300.0" y="400.3" text-anchor="middle" fill="#1f2937" font-size="19" font-weight="400">→ 回写 Available（幂等护栏）</text>
<path d="M 1340.0,260.0 L 320.0,330.0" fill="none" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#ar)"/>
<path d="M 530.0,380.0 L 560.0,380.0" fill="none" stroke="#475569" stroke-width="2.6" marker-end="url(#ar)"/>
<path d="M 1020.0,380.0 L 1050.0,380.0" fill="none" stroke="#475569" stroke-width="2.6" marker-end="url(#ar)"/>
<rect x="110.0" y="460.0" width="1440.0" height="72.0" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2" stroke-dasharray="5,4"/>
<text x="830.0" y="504.0" text-anchor="middle" fill="#334155" font-size="19" font-weight="600">ctrl.Result{} 完成等下次触发  ·  {RequeueAfter:d} 等异步资源就绪  ·  return err 带退避重试  →  下一轮从中间状态接着跑（幂等关键）</text>
<rect x="70.0" y="600.0" width="1540.0" height="420.0" rx="16" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
<text x="96.0" y="640.0" text-anchor="start" fill="#0891b2" font-size="23" font-weight="700">status conditions 状态机（status 子资源单独 Update，与 spec 写分离）</text>
<circle cx="170" cy="760" r="14" fill="#0f172a"/>
<text x="170.0" y="815.0" text-anchor="middle" fill="#334155" font-size="19" font-weight="600">CR 提交</text>
<rect x="300.0" y="710.0" width="250.0" height="100.0" rx="16" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="425.0" y="755.0" text-anchor="middle" fill="#7c3aed" font-size="22" font-weight="700">Progressing</text>
<rect x="690.0" y="710.0" width="290.0" height="100.0" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="835.0" y="748.0" text-anchor="middle" fill="#dc2626" font-size="22" font-weight="700">建子资源中</text>
<text x="835.0" y="782.0" text-anchor="middle" fill="#9a3412" font-size="17" font-weight="400">Deploy/Svc/Ingress</text>
<rect x="1120.0" y="710.0" width="250.0" height="100.0" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="1245.0" y="755.0" text-anchor="middle" fill="#059669" font-size="22" font-weight="700">Available</text>
<path d="M 184.0,760.0 L 300.0,760.0" fill="none" stroke="#475569" stroke-width="2.8" marker-end="url(#ar)"/>
<path d="M 550.0,760.0 L 690.0,760.0" fill="none" stroke="#475569" stroke-width="2.8" marker-end="url(#ar)"/>
<path d="M 980.0,760.0 L 1120.0,760.0" fill="none" stroke="#059669" stroke-width="2.8" marker-end="url(#arg)"/>
<rect x="598.7" y="729.2" width="42.6" height="22.0" rx="5" fill="#ffffff" opacity="0.95"/>
<text x="620.0" y="747.1" text-anchor="middle" fill="#475569" font-size="16" font-weight="600">打点</text>
<rect x="1020.5" y="729.2" width="59.0" height="22.0" rx="5" fill="#ffffff" opacity="0.95"/>
<text x="1050.0" y="747.1" text-anchor="middle" fill="#059669" font-size="16" font-weight="600">建成功</text>
<rect x="690.0" y="870.0" width="290.0" height="90.0" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
<text x="835.0" y="910.0" text-anchor="middle" fill="#d97706" font-size="20" font-weight="700">ReplicaFailure</text>
<text x="835.0" y="940.0" text-anchor="middle" fill="#92400e" font-size="17" font-weight="400">Pod 创建失败旁路</text>
<path d="M 835.0,810.0 L 835.0,870.0" fill="none" stroke="#d97706" stroke-width="2.4" marker-end="url(#ar)" stroke-dasharray="5,4"/>
<rect x="1120.0" y="840.0" width="430.0" height="120.0" rx="12" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,4"/>
<text x="1335.0" y="876.0" text-anchor="middle" fill="#0f766e" font-size="19" font-weight="700">状态互斥</text>
<text x="1335.0" y="908.0" text-anchor="middle" fill="#115e59" font-size="17" font-weight="400">hasApplicationProgressing 先判 Available</text>
<text x="1335.0" y="936.0" text-anchor="middle" fill="#115e59" font-size="17" font-weight="400">已可用就不再 progressing，避免重复副作用</text>
</svg>