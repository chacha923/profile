  <rect width="1440" height="980" fill="#ffffff"/>
  <text x="720" y="42" text-anchor="middle" class="title">search_service 服务拓扑排查流程</text>
  <text x="720" y="66" text-anchor="middle" class="subtitle">按 domain.py 的逻辑从域名反推 Ingress / HTTPRoute / Service，再识别贝联 externalName / staticAddress 迁移链路</text>
