<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .label { font-size: 15px; font-weight: 700; }
    .small { font-size: 12px; fill: #4b5563; }
    .tiny { font-size: 11px; fill: #6b7280; }
    .lane-title { font-size: 13px; font-weight: 700; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#111827" flood-opacity="0.10"/></filter>
  </defs>
  <rect width="1200" height="720" fill="#ffffff"/>
  <text class="title" x="600" y="42" text-anchor="middle">面试讲解模型：四层 + 两条链路</text>
  <text class="subtitle" x="600" y="66" text-anchor="middle">不要从代码入口背起，先用架构语言解释它解决什么问题，再补实现要点。</text>
  <g filter="url(#shadow)">
    <rect x="430" y="95" width="340" height="70" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="454" cy="119" r="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="454" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">1</text>
    <text class="label" x="478" y="125">一句话定位</text>
    <text class="small" x="478" y="147">Kubernetes Gateway API 驱动的 Envoy 控制面，生成 xDS 管理多组 Envoy 数据面。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="230" width="240" height="105" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <circle cx="94" cy="254" r="14" fill="#fed7aa" stroke="#fdba74" stroke-width="1"/>
    <text x="94" y="259" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">A</text>
    <text class="label" x="118" y="260">1. 配置抽象层</text>
    <text class="small" x="118" y="282">Gateway / HTTPRoute</text>
    <text class="small" x="118" y="299">Service / EndpointSlice</text>
    <text class="small" x="118" y="316">Http2Rpc / Auth 注解</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="350" y="230" width="240" height="105" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
    <circle cx="374" cy="254" r="14" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="374" y="259" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">B</text>
    <text class="label" x="398" y="260">2. 控制面编排层</text>
    <text class="small" x="398" y="282">watch + reconcile</text>
    <text class="small" x="398" y="299">校验状态</text>
    <text class="small" x="398" y="316">创建 Envoy Deployment</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="630" y="230" width="240" height="105" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
    <circle cx="654" cy="254" r="14" fill="#ccfbf1" stroke="#5eead4" stroke-width="1"/>
    <text x="654" y="259" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">C</text>
    <text class="label" x="678" y="260">3. xDS 生成层</text>
    <text class="small" x="678" y="282">translator 生成</text>
    <text class="small" x="678" y="299">LDS/RDS/CDS/EDS/SDS</text>
    <text class="small" x="678" y="316">版本与增量推送</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="910" y="230" width="220" height="105" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <circle cx="934" cy="254" r="14" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="934" y="259" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">D</text>
    <text class="label" x="958" y="260">4. 数据面执行层</text>
    <text class="small" x="958" y="282">Envoy 承接流量</text>
    <text class="small" x="958" y="299">HTTP/HTTPS</text>
    <text class="small" x="958" y="316">RPC/Auth</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="180" y="430" width="330" height="82" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="204" cy="454" r="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="204" y="459" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">H</text>
    <text class="label" x="228" y="460">主 HTTP/HTTPS 链路</text>
    <text class="small" x="228" y="482">envoy-gateway 控制面 -&gt; envoy-default-eg 数据面 -&gt; 业务 Service</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="690" y="430" width="330" height="82" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
    <circle cx="714" cy="454" r="14" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="714" y="459" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">R</text>
    <text class="label" x="738" y="460">RPC/Auth 链路</text>
    <text class="small" x="738" y="482">prod-envoy-gateway-rpc 控制面 -&gt; envoy-soul-auth-rpc 数据面 -&gt; RPC/Auth 后端</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="590" width="230" height="62" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
    <text class="label" x="88" y="620">亮点</text>
    <text class="small" x="88" y="642">控制面/数据面分离</text>
    <text class="small" x="88" y="659">声明式配置到 xDS</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="350" y="590" width="230" height="62" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
    <text class="label" x="368" y="620">稳定性</text>
    <text class="small" x="368" y="642">leader election</text>
    <text class="small" x="368" y="659">ready gate</text>
    <text class="small" x="368" y="676">debounce</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="630" y="590" width="230" height="62" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
    <text class="label" x="648" y="620">可观测</text>
    <text class="small" x="648" y="642">admin API</text>
    <text class="small" x="648" y="659">metrics</text>
    <text class="small" x="648" y="676">connection/version</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="910" y="590" width="220" height="62" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
    <text class="label" x="928" y="620">边界</text>
    <text class="small" x="928" y="642">测试/遗留数据面</text>
    <text class="small" x="928" y="659">0 副本服务不算主链路</text>
  </g>
  <line x1="600" y1="165" x2="190" y2="230" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <line x1="600" y1="165" x2="470" y2="230" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <line x1="600" y1="165" x2="750" y2="230" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <line x1="600" y1="165" x2="1020" y2="230" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <line x1="310" y1="282" x2="350" y2="282" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="590" y1="282" x2="630" y2="282" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="870" y1="282" x2="910" y2="282" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 520 335 C 450 365 370 390 345 430" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="403.0" y="372" width="54" height="20" rx="5" fill="#ffffff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="430" y="386" text-anchor="middle">主入口</text>
  <path d="M 780 335 C 825 370 855 392 855 430" fill="none" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="797.0" y="372" width="76" height="20" rx="5" fill="#ffffff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="835" y="386" text-anchor="middle">RPC/Auth</text>
  <line x1="345" y1="512" x2="185" y2="590" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <line x1="345" y1="512" x2="465" y2="590" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <line x1="855" y1="512" x2="745" y2="590" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <line x1="855" y1="512" x2="1020" y2="590" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <g transform="translate(58,690)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/><text class="tiny" x="44" y="4">主 HTTP/HTTPS</text>
    <line x1="170" y1="0" x2="204" y2="0" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/><text class="tiny" x="214" y="4">RPC/Auth</text>
    <line x1="310" y1="0" x2="344" y2="0" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/><text class="tiny" x="354" y="4">讲解展开</text>
  </g>
</svg>