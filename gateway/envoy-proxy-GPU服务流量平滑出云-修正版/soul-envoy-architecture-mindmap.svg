<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600" width="1600" height="1600">
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif;
      fill: #111827;
    }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 16px; fill: #6b7280; }
    .branch-title { font-size: 18px; font-weight: 700; }
    .branch-sub { font-size: 12px; fill: #6b7280; }
    .leaf { font-size: 14px; font-weight: 600; }
    .leaf-sub { font-size: 11px; fill: #6b7280; }
    .note { font-size: 13px; fill: #374151; }
    .hub { fill: #111827; stroke: #374151; stroke-width: 2; }
    .hub-text { fill: #ffffff; font-size: 24px; font-weight: 700; }
    .hub-sub { fill: #d1d5db; font-size: 14px; }
    .branch { fill: #ffffff; stroke-width: 2; }
    .leaf-box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.2; }
    .curve { fill: none; stroke-width: 4; stroke-linecap: round; opacity: 0.88; }
  </style>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="1600" fill="#ffffff"/>
  <text x="800" y="54" text-anchor="middle" class="title">Soul Envoy Gateway 架构记忆图</text>
  <text x="800" y="82" text-anchor="middle" class="subtitle">一句话记忆：K8s 资源进控制面生成 xDS，ACK edge Envoy 执行南北向和东西向流量治理</text>

  <!-- Curved branches -->
  <path class="curve" stroke="#2563eb" d="M800 525 C770 400, 700 300, 650 195"/>
  <path class="curve" stroke="#16a34a" d="M855 525 C970 410, 1045 315, 1118 220"/>
  <path class="curve" stroke="#dc2626" d="M895 560 C1040 515, 1160 490, 1280 455"/>
  <path class="curve" stroke="#9333ea" d="M865 600 C980 710, 1060 800, 1140 910"/>
  <path class="curve" stroke="#ea580c" d="M770 625 C720 735, 680 820, 630 930"/>
  <path class="curve" stroke="#0891b2" d="M725 600 C575 705, 440 775, 270 845"/>
  <path class="curve" stroke="#4f46e5" d="M710 550 C550 510, 390 475, 220 440"/>
  <path class="curve" stroke="#64748b" d="M745 515 C560 385, 405 275, 245 170"/>

  <!-- Center hub -->
  <g filter="url(#shadow)">
    <rect x="635" y="465" width="330" height="170" rx="24" class="hub"/>
    <text x="800" y="525" text-anchor="middle" class="hub-text">Soul Envoy</text>
    <text x="800" y="555" text-anchor="middle" class="hub-text">Gateway</text>
    <text x="800" y="590" text-anchor="middle" class="hub-sub">控制面生成 xDS</text>
    <text x="800" y="614" text-anchor="middle" class="hub-sub">数据面执行流量</text>
  </g>

  <!-- Branch: Control plane -->
  <g filter="url(#shadow)">
    <rect x="515" y="118" width="270" height="88" rx="14" class="branch" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="650" y="152" text-anchor="middle" class="branch-title">控制面</text>
    <text x="650" y="178" text-anchor="middle" class="branch-sub">watch 资源，生成配置</text>
  </g>
  <g>
    <rect x="430" y="228" width="190" height="44" rx="10" class="leaf-box"/><text x="525" y="256" text-anchor="middle" class="leaf">cmd/server</text>
    <rect x="650" y="228" width="230" height="44" rx="10" class="leaf-box"/><text x="765" y="256" text-anchor="middle" class="leaf">provider/kubernetes</text>
    <rect x="430" y="288" width="190" height="44" rx="10" class="leaf-box"/><text x="525" y="316" text-anchor="middle" class="leaf">GatewayController</text>
    <rect x="650" y="288" width="230" height="44" rx="10" class="leaf-box"/><text x="765" y="316" text-anchor="middle" class="leaf">HTTPRoute Reconciler</text>
  </g>

  <!-- Branch: xDS -->
  <g filter="url(#shadow)">
    <rect x="990" y="142" width="260" height="88" rx="14" class="branch" fill="#f0fdf4" stroke="#86efac"/>
    <text x="1120" y="176" text-anchor="middle" class="branch-title">xDS / IR</text>
    <text x="1120" y="202" text-anchor="middle" class="branch-sub">把声明式资源变成 Envoy 配置</text>
  </g>
  <g>
    <rect x="975" y="258" width="230" height="44" rx="10" class="leaf-box"/><text x="1090" y="286" text-anchor="middle" class="leaf">Ingress / HTTPRoute → IR</text>
    <rect x="1230" y="258" width="170" height="44" rx="10" class="leaf-box"/><text x="1315" y="286" text-anchor="middle" class="leaf">LDS / RDS</text>
    <rect x="975" y="318" width="210" height="44" rx="10" class="leaf-box"/><text x="1080" y="346" text-anchor="middle" class="leaf">CDS / EDS / SDS</text>
    <rect x="1210" y="318" width="190" height="44" rx="10" class="leaf-box"/><text x="1305" y="346" text-anchor="middle" class="leaf">ACK / NACK</text>
  </g>

  <!-- Branch: North-south -->
  <g filter="url(#shadow)">
    <rect x="1240" y="400" width="270" height="88" rx="14" class="branch" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="1375" y="434" text-anchor="middle" class="branch-title">南北向</text>
    <text x="1375" y="460" text-anchor="middle" class="branch-sub">外部流量进入集群</text>
  </g>
  <g>
    <rect x="1250" y="515" width="220" height="44" rx="10" class="leaf-box"/><text x="1360" y="543" text-anchor="middle" class="leaf">Client / LB / DNS</text>
    <rect x="1250" y="575" width="220" height="44" rx="10" class="leaf-box"/><text x="1360" y="603" text-anchor="middle" class="leaf">Gateway / HTTPRoute</text>
    <rect x="1250" y="635" width="220" height="44" rx="10" class="leaf-box"/><text x="1360" y="663" text-anchor="middle" class="leaf">Envoy edge</text>
    <rect x="1250" y="695" width="220" height="44" rx="10" class="leaf-box"/><text x="1360" y="723" text-anchor="middle" class="leaf">Service / Pod</text>
  </g>

  <!-- Branch: East-west -->
  <g filter="url(#shadow)">
    <rect x="1010" y="888" width="270" height="88" rx="14" class="branch" fill="#faf5ff" stroke="#c4b5fd"/>
    <text x="1145" y="922" text-anchor="middle" class="branch-title">东西向</text>
    <text x="1145" y="948" text-anchor="middle" class="branch-sub">服务间调用和出云 backend</text>
  </g>
  <g>
    <rect x="1000" y="765" width="210" height="44" rx="10" class="leaf-box"/><text x="1105" y="793" text-anchor="middle" class="leaf">CPU → GPU 调用</text>
    <rect x="1235" y="765" width="220" height="44" rx="10" class="leaf-box"/><text x="1345" y="793" text-anchor="middle" class="leaf">内部域名 / Mesh</text>
    <rect x="1000" y="825" width="210" height="44" rx="10" class="leaf-box"/><text x="1105" y="853" text-anchor="middle" class="leaf">ExternalName</text>
    <rect x="1235" y="825" width="220" height="44" rx="10" class="leaf-box"/><text x="1345" y="853" text-anchor="middle" class="leaf">贝联 STRICT_DNS</text>
  </g>

  <!-- Branch: Data plane -->
  <g filter="url(#shadow)">
    <rect x="505" y="910" width="270" height="88" rx="14" class="branch" fill="#fff7ed" stroke="#fdba74"/>
    <text x="640" y="944" text-anchor="middle" class="branch-title">数据面</text>
    <text x="640" y="970" text-anchor="middle" class="branch-sub">ACK edge Envoy 执行请求转发</text>
  </g>
  <g>
    <rect x="390" y="785" width="210" height="44" rx="10" class="leaf-box"/><text x="495" y="813" text-anchor="middle" class="leaf">PodTemplate</text>
    <rect x="625" y="785" width="210" height="44" rx="10" class="leaf-box"/><text x="730" y="813" text-anchor="middle" class="leaf">Deployment</text>
    <rect x="390" y="845" width="210" height="44" rx="10" class="leaf-box"/><text x="495" y="873" text-anchor="middle" class="leaf">nodeSelector=edge</text>
    <rect x="625" y="845" width="245" height="44" rx="10" class="leaf-box"/><text x="748" y="873" text-anchor="middle" class="leaf">bootstrap xDS:18000</text>
  </g>

  <!-- Branch: K8s resources -->
  <g filter="url(#shadow)">
    <rect x="115" y="800" width="270" height="88" rx="14" class="branch" fill="#f0fdfa" stroke="#67e8f9"/>
    <text x="250" y="834" text-anchor="middle" class="branch-title">K8s 资源入口</text>
    <text x="250" y="860" text-anchor="middle" class="branch-sub">所有配置都要落成对象</text>
  </g>
  <g>
    <rect x="110" y="655" width="170" height="44" rx="10" class="leaf-box"/><text x="195" y="683" text-anchor="middle" class="leaf">Gateway</text>
    <rect x="305" y="655" width="170" height="44" rx="10" class="leaf-box"/><text x="390" y="683" text-anchor="middle" class="leaf">HTTPRoute</text>
    <rect x="110" y="715" width="170" height="44" rx="10" class="leaf-box"/><text x="195" y="743" text-anchor="middle" class="leaf">Service</text>
    <rect x="305" y="715" width="190" height="44" rx="10" class="leaf-box"/><text x="400" y="743" text-anchor="middle" class="leaf">EndpointSlice</text>
  </g>

  <!-- Branch: Operations -->
  <g filter="url(#shadow)">
    <rect x="70" y="395" width="285" height="88" rx="14" class="branch" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="212" y="429" text-anchor="middle" class="branch-title">运维排障</text>
    <text x="212" y="455" text-anchor="middle" class="branch-sub">先入口，再配置，再 upstream</text>
  </g>
  <g>
    <rect x="80" y="510" width="180" height="44" rx="10" class="leaf-box"/><text x="170" y="538" text-anchor="middle" class="leaf">HTTPRoute status</text>
    <rect x="285" y="510" width="160" height="44" rx="10" class="leaf-box"/><text x="365" y="538" text-anchor="middle" class="leaf">access log</text>
    <rect x="80" y="570" width="180" height="44" rx="10" class="leaf-box"/><text x="170" y="598" text-anchor="middle" class="leaf">config_dump</text>
    <rect x="285" y="570" width="160" height="44" rx="10" class="leaf-box"/><text x="365" y="598" text-anchor="middle" class="leaf">xDS metrics</text>
  </g>

  <!-- Branch: mnemonic -->
  <g filter="url(#shadow)">
    <rect x="105" y="125" width="280" height="90" rx="14" class="branch" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="245" y="158" text-anchor="middle" class="branch-title">记忆口诀</text>
    <text x="245" y="184" text-anchor="middle" class="branch-sub">一心，两面，四流，五查</text>
  </g>
  <g>
    <rect x="95" y="245" width="230" height="40" rx="10" class="leaf-box"/><text x="210" y="270" text-anchor="middle" class="leaf">一心：控制面 xDS</text>
    <rect x="95" y="300" width="230" height="40" rx="10" class="leaf-box"/><text x="210" y="325" text-anchor="middle" class="leaf">两面：南北 + 东西</text>
    <rect x="95" y="355" width="230" height="40" rx="10" class="leaf-box"/><text x="210" y="380" text-anchor="middle" class="leaf">四流：请求/配置/发现/回滚</text>
  </g>

  <!-- Bottom memory strip -->
  <g>
    <rect x="455" y="1028" width="690" height="42" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="800" y="1054" text-anchor="middle" class="note">背诵主线：K8s 对象 → 控制面翻译 → xDS 下发 → ACK edge Envoy → Service / EndpointSlice / ExternalName backend</text>
  </g>
</svg>
