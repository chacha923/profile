<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 1020" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<rect width="1760" height="1020" fill="#ffffff"/>
<text x="40" y="50" fill="#0f172a" font-size="30.7" font-weight="700">训练 / 推理框架排查 一页速查卡（SRE）</text>
<rect x="40" y="68" width="22" height="16" rx="3" fill="#2563eb"/>
<text x="70" y="82" fill="#334155" font-size="17.7">平台侧·SRE 直接处理</text>
<rect x="340" y="68" width="22" height="16" rx="3" fill="#d97706"/>
<text x="370" y="82" fill="#334155" font-size="17.7">框架层·SRE 配合判断</text>
<rect x="640" y="68" width="22" height="16" rx="3" fill="#dc2626"/>
<text x="670" y="82" fill="#334155" font-size="17.7">业务侧·甩回业务</text>
<rect x="40" y="108" width="820" height="44" rx="10" fill="#1d4ed8" stroke="#1d4ed8" stroke-width="2"/>
<text x="450" y="137.5" text-anchor="middle" fill="#fff" font-size="23.6" font-weight="700">训练类报障</text>
<rect x="900" y="108" width="820" height="44" rx="10" fill="#047857" stroke="#047857" stroke-width="2"/>
<text x="1310" y="137.5" text-anchor="middle" fill="#fff" font-size="23.6" font-weight="700">推理类报障</text>
<rect x="40" y="168" width="820" height="108" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.2"/>
<rect x="40" y="168" width="8" height="108" rx="4" fill="#2563eb"/>
<text x="62" y="194" fill="#2563eb" font-size="20.1" font-weight="700">Pending / 起不来</text>
<text x="62" y="218" fill="#334155" font-size="16.5">看：Pod events / PodGroup / quota / 镜像 / PVC</text>
<text x="62" y="240" fill="#334155" font-size="16.5">根因：配额不足·gang没满足·taint·镜像·PVC</text>
<text x="62" y="262" fill="#334155" font-size="16.5">→ 平台侧 90% 直接处理</text>
<rect x="40" y="292" width="820" height="108" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2.2"/>
<rect x="40" y="292" width="8" height="108" rx="4" fill="#d97706"/>
<text x="62" y="318" fill="#d97706" font-size="20.1" font-weight="700">卡死不动</text>
<text x="62" y="342" fill="#334155" font-size="16.5">看：rank0 NCCL超时 / rendezvous / PS / DataLoader</text>
<text x="62" y="364" fill="#334155" font-size="16.5">判：等对端=gang/发现层；网络=平台；通信配置=业务</text>
<text x="62" y="386" fill="#334155" font-size="16.5">→ 网络存储平台修，配置/数据甩业务</text>
<rect x="40" y="416" width="820" height="108" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2.2"/>
<rect x="40" y="416" width="8" height="108" rx="4" fill="#dc2626"/>
<text x="62" y="442" fill="#dc2626" font-size="20.1" font-weight="700">OOM</text>
<text x="62" y="466" fill="#334155" font-size="16.5">先分：CUDA OOM(显存,调batch/精度)</text>
<text x="62" y="488" fill="#334155" font-size="16.5">       vs K8s OOMKill(内存,调limit) — 别混</text>
<text x="62" y="510" fill="#334155" font-size="16.5">看：显存曲线 / 容器内存 limit</text>
<rect x="40" y="540" width="820" height="86" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2.2"/>
<rect x="40" y="540" width="8" height="86" rx="4" fill="#d97706"/>
<text x="62" y="566" fill="#d97706" font-size="20.1" font-weight="700">变慢 / GPU 利用率低</text>
<text x="62" y="590" fill="#334155" font-size="16.5">先判：等数据 / 等通信 / 慢节点 straggler</text>
<text x="62" y="612" fill="#334155" font-size="16.5">看：利用率vs等待·各rank进度·带宽·RDMA·DataLoader</text>
<rect x="900" y="168" width="820" height="86" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2.2"/>
<rect x="900" y="168" width="8" height="86" rx="4" fill="#d97706"/>
<text x="922" y="194" fill="#d97706" font-size="20.1" font-weight="700">加载失败 / 起不来</text>
<text x="922" y="218" fill="#334155" font-size="16.5">看：启动日志·模型格式/版本·依赖·显存·路径</text>
<text x="922" y="240" fill="#334155" font-size="16.5">判：格式/依赖=业务；显存/镜像/存储=平台</text>
<rect x="900" y="270" width="820" height="86" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2.2"/>
<rect x="900" y="270" width="8" height="86" rx="4" fill="#d97706"/>
<text x="922" y="296" fill="#d97706" font-size="20.1" font-weight="700">延迟高 / 超时</text>
<text x="922" y="320" fill="#334155" font-size="16.5">先做延迟分解：排队 / 计算 / 预处理 / 网络</text>
<text x="922" y="342" fill="#334155" font-size="16.5">排队长→并发batch；计算长→模型；预处理长→CPU</text>
<rect x="900" y="372" width="820" height="86" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.2"/>
<rect x="900" y="372" width="8" height="86" rx="4" fill="#2563eb"/>
<text x="922" y="398" fill="#2563eb" font-size="20.1" font-weight="700">利用率低但还慢</text>
<text x="922" y="422" fill="#334155" font-size="16.5">多为：batch没打满 / 并发不足 / 预处理卡CPU</text>
<text x="922" y="444" fill="#334155" font-size="16.5">→ 别盲目加卡，先查 batch 和并发</text>
<rect x="900" y="474" width="820" height="86" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2.2"/>
<rect x="900" y="474" width="8" height="86" rx="4" fill="#dc2626"/>
<text x="922" y="500" fill="#dc2626" font-size="20.1" font-weight="700">吞吐上不去 / 推理OOM</text>
<text x="922" y="524" fill="#334155" font-size="16.5">吞吐：batching没开/实例少/(LLM)KV受限</text>
<text x="922" y="546" fill="#334155" font-size="16.5">OOM：模型大·batch大·(LLM)KV cache爆 → 限/分页</text>
<rect x="40" y="870" width="1680" height="118" rx="12" fill="#0f172a"/>
<text x="64" y="902" fill="#fff" font-size="21.2" font-weight="700">黄金判断点</text>
<text x="64" y="932" fill="#e2e8f0" font-size="17.7">• 训练显存≈推理几倍 → 训练 OOM 更常见</text>
<text x="624" y="932" fill="#e2e8f0" font-size="17.7">• CUDA OOM(显存) ≠ K8s OOMKill(内存)</text>
<text x="1184" y="932" fill="#e2e8f0" font-size="17.7">• GPU 利用率低 ≠ GPU 不够 → 先查 batch/并发/预处理</text>
<text x="64" y="962" fill="#e2e8f0" font-size="17.7">• 训练卡死先看发现/通信层(NCCL/rendezvous)，不是算力</text>
<text x="624" y="962" fill="#e2e8f0" font-size="17.7">• 推理慢先做延迟分解，不是先看模型</text>
<text x="1184" y="962" fill="#e2e8f0" font-size="17.7">• 业务不懂框架 → 给报障模板+指定日志/指标+最小验证</text>
</svg>