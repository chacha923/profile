<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="960" height="650">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
.title { font-size: 25px; font-weight: 700; fill: #111827; }
.subtitle { font-size: 13px; fill: #6b7280; }
.label { font-size: 14px; font-weight: 650; fill: #111827; }
.small { font-size: 12px; fill: #6b7280; }
.tiny { font-size: 11px; fill: #6b7280; }
.lane { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; }
</style>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ea580c"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
<marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0f766e"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6b7280"/></marker>
</defs>
<rect width="960" height="650" fill="#ffffff"/>
<text x="480.0" y="34" text-anchor="middle" class="title">生命周期与状态一致性治理</text>
<text x="480.0" y="57" text-anchor="middle" class="subtitle">server 处理期望状态，watcher / Sync 回写真状态，Job 承接长任务</text>
<rect x="55" y="110" width="145" height="58" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
<text x="127.5" y="131.0" text-anchor="middle" class="label">用户动作</text>
<text x="127.5" y="152.0" text-anchor="middle" class="small">创建 / 扩缩容 / 停止</text>
<rect x="225" y="110" width="145" height="58" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
<text x="297.5" y="131.0" text-anchor="middle" class="label">server</text>
<text x="297.5" y="152.0" text-anchor="middle" class="small">鉴权 / 校验 / 编排</text>
<rect x="395" y="110" width="145" height="58" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="467.5" y="131.0" text-anchor="middle" class="label">期望状态</text>
<text x="467.5" y="152.0" text-anchor="middle" class="small">DB / metadata</text>
<rect x="565" y="110" width="145" height="58" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="637.5" y="131.0" text-anchor="middle" class="label">Runtime 执行</text>
<text x="637.5" y="152.0" text-anchor="middle" class="small">K8s / 第三方平台</text>
<rect x="735" y="110" width="145" height="58" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="807.5" y="131.0" text-anchor="middle" class="label">真实状态</text>
<text x="807.5" y="152.0" text-anchor="middle" class="small">Pod / Job / 服务实例</text>
<line x1="200" y1="139" x2="225" y2="139" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
<line x1="370" y1="139" x2="395" y2="139" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
<line x1="540" y1="139" x2="565" y2="139" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
<line x1="710" y1="139" x2="735" y2="139" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
<rect x="55" y="230" width="370" height="140" rx="10" fill="#faf5ff" fill-opacity="0.45" stroke="#e9d5ff" stroke-width="1.3" stroke-dasharray="7 5"/>
<text x="69" y="252" class="lane" fill="#9333ea">EVENT DRIVEN</text>
<rect x="85" y="273" width="140" height="54" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
<text x="155.0" y="292.0" text-anchor="middle" class="label">watcher</text>
<text x="155.0" y="313.0" text-anchor="middle" class="small">TFJob / Job / Pod</text>
<text x="155.0" y="327.0" text-anchor="middle" class="small">事件</text>
<rect x="255" y="273" width="140" height="54" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
<text x="325.0" y="292.0" text-anchor="middle" class="label">快速回写</text>
<text x="325.0" y="313.0" text-anchor="middle" class="small">及时状态更新</text>
<line x1="225" y1="300" x2="255" y2="300" stroke="#9333ea" stroke-width="2.2" marker-end="url(#arrow-purple)"/>
<rect x="535" y="230" width="370" height="140" rx="10" fill="#f0fdfa" fill-opacity="0.45" stroke="#99f6e4" stroke-width="1.3" stroke-dasharray="7 5"/>
<text x="549" y="252" class="lane" fill="#0f766e">PERIODIC COMPENSATION</text>
<rect x="565" y="273" width="140" height="54" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" filter="url(#shadow)"/>
<text x="635.0" y="292.0" text-anchor="middle" class="label">Sync</text>
<text x="635.0" y="313.0" text-anchor="middle" class="small">定时查询</text>
