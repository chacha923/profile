<line x1="705" y1="300" x2="735" y2="300" stroke="#0f766e" stroke-width="2.2" marker-end="url(#arrow-teal)"/>
<path d="M805 168 V220 Q805 236 790 236 H155 V273" fill="none" stroke="#9333ea" stroke-width="2.2" marker-end="url(#arrow-purple)" stroke-dasharray="6 4"/>
<rect x="424" y="221" width="92" height="20" rx="10" fill="#ffffff" opacity="0.92"/>
<text x="470" y="236" text-anchor="middle" class="tiny">事件</text>
<path d="M805 168 V220 Q805 236 790 236 H635 V273" fill="none" stroke="#0f766e" stroke-width="2.2" marker-end="url(#arrow-teal)" stroke-dasharray="6 4"/>
<rect x="674" y="221" width="92" height="20" rx="10" fill="#ffffff" opacity="0.92"/>
<text x="720" y="236" text-anchor="middle" class="tiny">巡检</text>
<rect x="55" y="420" width="850" height="108" rx="10" fill="#fff7ed" fill-opacity="0.45" stroke="#fed7aa" stroke-width="1.3" stroke-dasharray="7 5"/>
<text x="69" y="442" class="lane" fill="#ea580c">LONG RUNNING TASKS</text>
<rect x="95" y="455" width="165" height="48" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="177.5" y="471.0" text-anchor="middle" class="label">Kubernetes Job</text>
<text x="177.5" y="492.0" text-anchor="middle" class="small">模型下载 / 制品处理</text>
<rect x="330" y="455" width="165" height="48" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="412.5" y="471.0" text-anchor="middle" class="label">Pod 日志</text>
<text x="412.5" y="492.0" text-anchor="middle" class="small">失败定位</text>
<rect x="565" y="455" width="165" height="48" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="647.5" y="471.0" text-anchor="middle" class="label">最终收敛</text>
<text x="647.5" y="492.0" text-anchor="middle" class="small">平台状态可见</text>
<line x1="260" y1="479" x2="330" y2="479" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
<line x1="495" y1="479" x2="565" y2="479" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
<path d="M635 327 V405 Q635 420 620 420 H180 V455" fill="none" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
<rect x="359" y="405" width="92" height="20" rx="10" fill="#ffffff" opacity="0.92"/>
<text x="405" y="420" text-anchor="middle" class="tiny">长任务异步</text>
<rect x="96" y="570" width="180" height="34" rx="17.0" fill="#fef2f2" stroke="#fecaca" stroke-width="1.2"/>
<text x="186.0" y="592.0" text-anchor="middle" class="small" font-weight="650" fill="#dc2626">API 返回不等于任务完成</text>
<rect x="320" y="570" width="170" height="34" rx="17.0" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2"/>
<text x="405.0" y="592.0" text-anchor="middle" class="small" font-weight="650" fill="#9333ea">watcher 保证及时性</text>
<rect x="535" y="570" width="170" height="34" rx="17.0" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.2"/>
<text x="620.0" y="592.0" text-anchor="middle" class="small" font-weight="650" fill="#0f766e">Sync 保证补偿</text>
<rect x="750" y="570" width="145" height="34" rx="17.0" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
<text x="822.5" y="592.0" text-anchor="middle" class="small" font-weight="650" fill="#16a34a">最终一致性</text>
<line x1="26" y1="610" x2="56" y2="610" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<text x="64" y="614" class="tiny">期望状态</text>
<line x1="26" y1="628" x2="56" y2="628" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
<text x="64" y="632" class="tiny">事件回写</text>
<line x1="26" y1="646" x2="56" y2="646" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow-teal)"/>
<text x="64" y="650" class="tiny">定时补偿</text>
<line x1="26" y1="664" x2="56" y2="664" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
<text x="64" y="668" class="tiny">长任务执行</text>
</svg>