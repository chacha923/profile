<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620">
<style>text{font-family:Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif}.title{font-size:28px;font-weight:700;fill:#111827}.sub{font-size:14px;fill:#6b7280}.h{font-size:16px;font-weight:700;fill:#111827}.s{font-size:12px;fill:#4b5563}</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker></defs>
<rect width="1100" height="620" fill="#ffffff"/>
<text x="550" y="42" text-anchor="middle" class="title">LLM 服务慢请求排障路径</text>
<text x="550" y="68" text-anchor="middle" class="sub">Pod Running 只是起点，必须继续拆模型加载、TTFT、TPOT、队列和 KV Cache</text>
<g>
<rect x="45" y="170" width="130" height="80" rx="12" fill="#fef2f2" stroke="#fecaca"/><text x="110" y="202" text-anchor="middle" class="h">症状</text><text x="110" y="228" text-anchor="middle" class="s">请求慢 / 超时</text>
<rect x="205" y="170" width="130" height="80" rx="12" fill="#fff7ed" stroke="#fed7aa"/><text x="270" y="202" text-anchor="middle" class="h">状态</text><text x="270" y="228" text-anchor="middle" class="s">Pod vs ModelReady</text>
<rect x="365" y="170" width="130" height="80" rx="12" fill="#eff6ff" stroke="#bfdbfe"/><text x="430" y="202" text-anchor="middle" class="h">日志</text><text x="430" y="228" text-anchor="middle" class="s">加载 / warmup</text>
<rect x="525" y="170" width="130" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/><text x="590" y="202" text-anchor="middle" class="h">指标</text><text x="590" y="228" text-anchor="middle" class="s">TTFT / TPOT</text>
<rect x="685" y="170" width="130" height="80" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/><text x="750" y="202" text-anchor="middle" class="h">资源</text><text x="750" y="228" text-anchor="middle" class="s">显存 / KV</text>
<rect x="845" y="170" width="130" height="80" rx="12" fill="#ecfeff" stroke="#a5f3fc"/><text x="910" y="202" text-anchor="middle" class="h">优化</text><text x="910" y="228" text-anchor="middle" class="s">缓存 / 参数 / 扩容</text>
</g>
<line x1="175" y1="210" x2="205" y2="210" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)"/>
<line x1="335" y1="210" x2="365" y2="210" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)"/>
<line x1="495" y1="210" x2="525" y2="210" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)"/>
<line x1="655" y1="210" x2="685" y2="210" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)"/>
<line x1="815" y1="210" x2="845" y2="210" stroke="#64748b" stroke-width="2.5" marker-end="url(#a)"/>
<rect x="150" y="365" width="800" height="94" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="550" y="400" text-anchor="middle" class="h">判断口径</text>
<text x="550" y="426" text-anchor="middle" class="s">TTFT 高：prefill / 排队 / 冷启动；TPOT 高：decode / GPU 负载 / KV Cache</text>
</svg>
