<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 900" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="2000" height="900" fill="#ffffff"/>
<text x="50" y="58" fill="#0f172a" font-size="34" font-weight="700">ZeRO / FSDP 显存分片：拿通信换显存</text>
<text x="50" y="98" fill="#64748b" font-size="20">P=参数  G=梯度  OS=优化器状态(Adam)。底色块=每卡存全量，分片块=只存 1/N</text>
<rect x="70" y="140" width="380" height="170" rx="13" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-width="3"/>
<text x="94" y="190" fill="#dc2626" font-size="24" font-weight="700">基线 DP</text>
<text x="94" y="226" fill="#334155" font-size="19">P / G / OS 全量复制 N 份</text>
<rect x="480" y="164" width="320" height="46" rx="8" fill="#dc2626" fill-opacity="0.28" stroke="#dc2626" stroke-width="2"/>
<text x="494" y="194" fill="#1f2937" font-size="18" font-weight="700">P 全量 ×4卡</text>
<rect x="480" y="216" width="320" height="46" rx="8" fill="#dc2626" fill-opacity="0.28" stroke="#dc2626" stroke-width="2"/>
<text x="494" y="246" fill="#1f2937" font-size="18" font-weight="700">G 全量 ×4卡</text>
<rect x="480" y="268" width="320" height="46" rx="8" fill="#dc2626" fill-opacity="0.28" stroke="#dc2626" stroke-width="2"/>
<text x="494" y="298" fill="#1f2937" font-size="18" font-weight="700">OS 全量 ×4卡</text>
<text x="1020" y="231" fill="#dc2626" font-size="19" font-weight="700">显存浪费最大</text>
<rect x="70" y="334" width="380" height="170" rx="13" fill="#ea580c" fill-opacity="0.10" stroke="#ea580c" stroke-width="3"/>
<text x="94" y="384" fill="#ea580c" font-size="24" font-weight="700">ZeRO-1</text>
<text x="94" y="420" fill="#334155" font-size="19">切 OS（优化器状态，显存大头）</text>
<rect x="480" y="358" width="320" height="46" rx="8" fill="#ea580c" fill-opacity="0.28" stroke="#ea580c" stroke-width="2"/>
<text x="494" y="388" fill="#1f2937" font-size="18" font-weight="700">P 全量 ×4卡</text>
<rect x="480" y="410" width="320" height="46" rx="8" fill="#ea580c" fill-opacity="0.28" stroke="#ea580c" stroke-width="2"/>
<text x="494" y="440" fill="#1f2937" font-size="18" font-weight="700">G 全量 ×4卡</text>
<rect x="480.0" y="462" width="76.0" height="46" rx="6" fill="#ea580c" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="560.0" y="462" width="76.0" height="46" rx="6" fill="#ea580c" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="640.0" y="462" width="76.0" height="46" rx="6" fill="#ea580c" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="720.0" y="462" width="76.0" height="46" rx="6" fill="#ea580c" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<text x="818" y="492" fill="#1f2937" font-size="18" font-weight="700">OS 分片(各1/4)</text>
<text x="1020" y="425" fill="#ea580c" font-size="19" font-weight="700">先省优化器状态、通信小幅增</text>
<rect x="70" y="528" width="380" height="170" rx="13" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="3"/>
<text x="94" y="578" fill="#d97706" font-size="24" font-weight="700">ZeRO-2</text>
<text x="94" y="614" fill="#334155" font-size="19">再切 G（梯度）</text>
<rect x="480" y="552" width="320" height="46" rx="8" fill="#d97706" fill-opacity="0.28" stroke="#d97706" stroke-width="2"/>
<text x="494" y="582" fill="#1f2937" font-size="18" font-weight="700">P 全量 ×4卡</text>
<rect x="480.0" y="604" width="76.0" height="46" rx="6" fill="#d97706" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="560.0" y="604" width="76.0" height="46" rx="6" fill="#d97706" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="640.0" y="604" width="76.0" height="46" rx="6" fill="#d97706" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="720.0" y="604" width="76.0" height="46" rx="6" fill="#d97706" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<text x="818" y="634" fill="#1f2937" font-size="18" font-weight="700">G 分片(各1/4)</text>
<rect x="480.0" y="656" width="76.0" height="46" rx="6" fill="#d97706" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="560.0" y="656" width="76.0" height="46" rx="6" fill="#d97706" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="640.0" y="656" width="76.0" height="46" rx="6" fill="#d97706" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="720.0" y="656" width="76.0" height="46" rx="6" fill="#d97706" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<text x="818" y="686" fill="#1f2937" font-size="18" font-weight="700">OS 分片(各1/4)</text>
<text x="1020" y="619" fill="#d97706" font-size="19" font-weight="700">ReduceScatter 规约到分片</text>
<rect x="70" y="722" width="380" height="170" rx="13" fill="#059669" fill-opacity="0.10" stroke="#059669" stroke-width="3"/>
<text x="94" y="772" fill="#059669" font-size="24" font-weight="700">ZeRO-3 / FSDP</text>
<text x="94" y="808" fill="#334155" font-size="19">再切 P（参数），用时 AllGather</text>
<rect x="480.0" y="746" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="560.0" y="746" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="640.0" y="746" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="720.0" y="746" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<text x="818" y="776" fill="#1f2937" font-size="18" font-weight="700">P 分片(各1/4)</text>
<rect x="480.0" y="798" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="560.0" y="798" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="640.0" y="798" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="720.0" y="798" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<text x="818" y="828" fill="#1f2937" font-size="18" font-weight="700">G 分片(各1/4)</text>
<rect x="480.0" y="850" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="560.0" y="850" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="640.0" y="850" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<rect x="720.0" y="850" width="76.0" height="46" rx="6" fill="#059669" fill-opacity="0.5" stroke="#fff" stroke-width="2"/>
<text x="818" y="880" fill="#1f2937" font-size="18" font-weight="700">OS 分片(各1/4)</text>
<text x="1020" y="813" fill="#059669" font-size="19" font-weight="700">最省显存、通信最重</text>
</svg>