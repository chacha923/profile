<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960" width="1600" height="960">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
</marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
</marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
</marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
</marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
</marker>
<marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
</marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
</marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.14"/>
</filter>
</defs>
<rect width="1600" height="960" fill="#ffffff"/>
<text x="60" y="62" fill="#111827" font-size="30" font-weight="800">SAI 承接 PyTorchJob 的场景映射</text>
<text x="60" y="96" fill="#475569" font-size="17">从 TFJob 真实经验迁移到 PyTorch 分布式训练治理</text>
<rect x="80" y="160" width="380" height="240" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="80" y="160" width="380" height="8" rx="4" fill="#2563eb"/>
<text x="270.0" y="196" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">TFJob 主力经验</text>
<text x="102" y="228" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 训练任务托管</text>
<text x="102" y="253" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• NodePool/资源规格</text>
<text x="102" y="278" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• TensorBoard/日志/NAS</text>
<text x="102" y="303" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• watcher 状态同步</text>
<text x="102" y="328" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• Pending/OOM/PVC 排查</text>
<rect x="610" y="160" width="380" height="240" rx="10" fill="#faf5ff" stroke="#9333ea" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="610" y="160" width="380" height="8" rx="4" fill="#9333ea"/>
<text x="800.0" y="196" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">PyTorchJob 补齐对象</text>
<text x="632" y="228" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• Master/Worker rank</text>
<text x="632" y="253" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• rendezvous/torchrun</text>
<text x="632" y="278" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• NCCL/RDMA</text>
<text x="632" y="303" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• elasticPolicy</text>
<text x="632" y="328" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• checkpoint shards</text>
<rect x="1140" y="160" width="380" height="240" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="1140" y="160" width="380" height="8" rx="4" fill="#16a34a"/>
<text x="1330.0" y="196" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">LLM/多模态训练</text>
<text x="1162" y="228" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• DDP/FSDP/DeepSpeed</text>
<text x="1162" y="253" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• LoRA/SFT</text>
<text x="1162" y="278" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 大模型 checkpoint</text>
<text x="1162" y="303" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 评测与发布门禁</text>
<path d="M 460 280 L 610 280" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
<rect x="500.0" y="254.0" width="70" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="535.0" y="272.0" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">迁移</text>
<path d="M 990 280 L 1140 280" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
<rect x="1030.0" y="254.0" width="70" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="1065.0" y="272.0" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">演进</text>
<rect x="160" y="555" width="330" height="190" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="160" y="555" width="330" height="8" rx="4" fill="#16a34a"/>
<text x="325.0" y="591" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">能安全说</text>
<text x="182" y="623" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 我做过 SAI/TFJob 平台治理</text>
<text x="182" y="648" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 能把资源/状态/观测迁移到 PyTorchJob</text>
<text x="182" y="673" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 能按症状排查 rank/NCCL/GPU</text>
<rect x="635" y="555" width="330" height="190" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="635" y="555" width="330" height="8" rx="4" fill="#ea580c"/>
<text x="800.0" y="591" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">谨慎表达</text>
<text x="657" y="623" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• PyTorchJob 是相邻承接/演进方向</text>
<text x="657" y="648" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• NCCL/FSDP/DeepSpeed 是理解和排查</text>
<text x="657" y="673" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• PAI 可以作为执行面</text>
<rect x="1110" y="555" width="330" height="190" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="1110" y="555" width="330" height="8" rx="4" fill="#dc2626"/>
<text x="1275.0" y="591" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">不能夸大</text>
<text x="1132" y="623" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 不说自研 GPU Scheduler</text>
<text x="1132" y="648" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 不说深度调 NCCL 内核</text>
<text x="1132" y="673" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 不说负责过生产 LLM SRE</text>
<text x="800" y="875" fill="#475569" font-size="18" font-weight="800" text-anchor="middle">面试落点：平台 SRE 负责把 PyTorch 分布式训练变成可提交、可排队、可观测、可恢复、可复盘的工作负载。</text>
</svg>