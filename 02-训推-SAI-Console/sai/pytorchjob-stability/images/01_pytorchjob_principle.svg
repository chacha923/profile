<text x="182" y="498" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• MASTER_ADDR/PORT</text>
<text x="182" y="523" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 完成/失败信号常从 rank0 收敛</text>
<rect x="620" y="405" width="360" height="170" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="620" y="405" width="360" height="8" rx="4" fill="#16a34a"/>
<text x="800.0" y="441" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">Worker Pods</text>
<text x="642" y="473" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 同构 ranks</text>
<text x="642" y="498" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• requests/limits nvidia.com/gpu</text>
<text x="642" y="523" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• nodeSelector/tolerations/affinity</text>
<rect x="1080" y="405" width="360" height="170" rx="10" fill="#ffffff" stroke="#9333ea" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="1080" y="405" width="360" height="8" rx="4" fill="#9333ea"/>
<text x="1260.0" y="441" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">Service / Rendezvous</text>
<text x="1102" y="473" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• rank 发现</text>
<text x="1102" y="498" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 端口可达</text>
<text x="1102" y="523" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• elastic 时 min/max 重集合</text>
<path d="M 1250 280 L 800 405" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
<rect x="965.0" y="316.5" width="120" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="1025.0" y="334.5" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">schedule</text>
<path d="M 520 490 L 620 490" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
<rect x="502.5" y="464.0" width="135" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="570.0" y="482.0" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">all ranks</text>
<path d="M 980 490 L 1080 490" fill="none" stroke="#9333ea" stroke-width="2.2" marker-end="url(#arrow-purple)"/>
<rect x="955.0" y="464.0" width="150" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="1030.0" y="482.0" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">rendezvous</text>
<rect x="160" y="710" width="360" height="130" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="160" y="710" width="360" height="8" rx="4" fill="#dc2626"/>
