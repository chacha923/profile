<text x="1272" y="218" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• Kueue/Volcano</text>
<text x="1272" y="243" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• quota/gang</text>
<text x="1272" y="268" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• suspend/admit</text>
<path d="M 370 215 L 460 215" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
<rect x="370.0" y="189.0" width="90" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="415.0" y="207.0" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">create</text>
<path d="M 770 215 L 860 215" fill="none" stroke="#9333ea" stroke-width="2.2" marker-end="url(#arrow-purple)"/>
<rect x="777.5" y="189.0" width="75" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="815.0" y="207.0" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">watch</text>
<path d="M 1170 215 L 1250 215" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
<rect x="1172.5" y="189.0" width="75" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="1210.0" y="207.0" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">admit</text>
