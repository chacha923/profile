<feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.14"/>
</filter>
</defs>
<rect width="1600" height="960" fill="#ffffff"/>
<text x="60" y="62" fill="#111827" font-size="30" font-weight="800">PyTorchJob 运行原理与 SRE 观测边界</text>
<text x="60" y="96" fill="#475569" font-size="17">从 SAI 控制面到底层 GPU/NCCL 的责任分层</text>
<rect x="60" y="150" width="310" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="60" y="150" width="310" height="8" rx="4" fill="#2563eb"/>
<text x="215.0" y="186" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">SAI 控制面</text>
<text x="82" y="218" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 表单/模板</text>
<text x="82" y="243" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• NodePool/配额</text>
<text x="82" y="268" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 提交与状态同步</text>
<rect x="460" y="150" width="310" height="130" rx="10" fill="#faf5ff" stroke="#9333ea" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="460" y="150" width="310" height="8" rx="4" fill="#9333ea"/>
<text x="615.0" y="186" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">PyTorchJob CRD</text>
<text x="482" y="218" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• runPolicy</text>
<text x="482" y="243" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• Master/Worker</text>
<text x="482" y="268" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• elasticPolicy</text>
<rect x="860" y="150" width="310" height="130" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="860" y="150" width="310" height="8" rx="4" fill="#ea580c"/>
<text x="1015.0" y="186" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">Training Operator</text>
<text x="882" y="218" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• reconcile</text>
<text x="882" y="243" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 创建 Pods/Services</text>
<text x="882" y="268" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 更新 conditions</text>
<rect x="1250" y="150" width="290" height="130" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6" filter="url(#shadow)"/>
