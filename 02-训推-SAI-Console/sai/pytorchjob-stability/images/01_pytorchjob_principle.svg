<text x="182" y="778" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• NVIDIA/厂商 GPU 插件</text>
<text x="182" y="803" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 显存/卡数/故障 XID</text>
<text x="182" y="828" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 驱动/CUDA/NCCL 版本</text>
<rect x="620" y="710" width="360" height="130" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="620" y="710" width="360" height="8" rx="4" fill="#0891b2"/>
<text x="800.0" y="746" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">通信与拓扑</text>
<text x="642" y="778" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• NVLink/PCIe/IB/RDMA</text>
<text x="642" y="803" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• NCCL all-reduce</text>
<text x="642" y="828" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 同 rack/同 RDMA 域</text>
<rect x="1080" y="710" width="360" height="130" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="1080" y="710" width="360" height="8" rx="4" fill="#ea580c"/>
<text x="1260.0" y="746" fill="#111827" font-size="18" font-weight="800" text-anchor="middle">存储与 Checkpoint</text>
<text x="1102" y="778" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• NAS/OSS/PVC</text>
<text x="1102" y="803" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• checkpoint 保存/恢复</text>
<text x="1102" y="828" fill="#475569" font-size="14" font-weight="400" text-anchor="start">• 日志与 TensorBoard</text>
<path d="M 340 575 L 340 710" fill="none" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arrow-red)"/>
<rect x="298.0" y="688" width="84" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="340" y="706" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">device</text>
<path d="M 800 575 L 800 710" fill="none" stroke="#0891b2" stroke-width="2.2" marker-end="url(#arrow-teal)"/>
<rect x="760.0" y="688" width="80" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="800" y="706" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">NCCL</text>
<path d="M 1260 575 L 1260 710" fill="none" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
<rect x="1220.0" y="688" width="80" height="24" rx="6" fill="#ffffff" opacity="0.96"/>
<text x="1260" y="706" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">state</text>
<text x="800" y="910" fill="#475569" font-size="17" font-weight="700" text-anchor="middle">SRE 观测要把 CRD 状态、Pod/Event、GPU 指标、rank 日志、checkpoint 统一到一个 Job 视角。</text>
</svg>