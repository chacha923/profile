<rect x="1505" y="545" width="9" height="125" rx="4" fill="#d97706"/>
<text x="1795.0" y="581" fill="#0f172a" font-size="23" font-weight="800" text-anchor="middle">推理引擎内核</text>
<text x="1529" y="617" fill="#334155" font-size="19" font-weight="400" text-anchor="start">PagedAttention、continuous batching、TRT engine</text>
<rect x="1505" y="690" width="580" height="125" rx="14" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
<rect x="1505" y="690" width="9" height="125" rx="4" fill="#d97706"/>
<text x="1795.0" y="726" fill="#0f172a" font-size="23" font-weight="800" text-anchor="middle">大模型效果</text>
<text x="1529" y="762" fill="#334155" font-size="19" font-weight="400" text-anchor="start">评测集、偏好对齐、LLM-as-Judge 偏差</text>
<path d="M 720,510 L 760,510" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)"/>
<path d="M 1420,510 L 1460,510" fill="none" stroke="#d97706" stroke-width="3" marker-end="url(#arrow-orange)"/>
<rect x="70" y="920" width="2050" height="160" rx="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2.2"/>
<text x="110" y="965" fill="#dc2626" font-size="26" font-weight="900" text-anchor="start">面试红线</text>
<text x="110" y="1005" fill="#334155" font-size="22" font-weight="700" text-anchor="start">不能说：我负责过 LLM 服务 SRE / 自研 PyTorch 训练框架 / 自研 vLLM 或 TensorRT-LLM / 做过大模型效果闭环收益。</text>
<text x="110" y="1045" fill="#334155" font-size="22" font-weight="700" text-anchor="start">可以说：我做的是 SAI/PAI/TFJob 的平台治理经验，正在按 PyTorch 和 LLM 生态做对标，能讲清如果演进该补哪些对象、状态和排障抓手。</text>
