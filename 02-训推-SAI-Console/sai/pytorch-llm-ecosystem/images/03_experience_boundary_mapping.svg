<text x="110" y="112" fill="#334155" font-size="18" font-weight="700" text-anchor="start">真实生产经验</text>
<rect x="330" y="94" width="28" height="20" rx="4" fill="#059669"/>
<text x="370" y="112" fill="#334155" font-size="18" font-weight="700" text-anchor="start">相邻经验/可迁移</text>
