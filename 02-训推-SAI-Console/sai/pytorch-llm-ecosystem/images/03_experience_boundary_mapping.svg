<rect x="1505" y="255" width="9" height="125" rx="4" fill="#d97706"/>
<text x="1795.0" y="291" fill="#0f172a" font-size="23" font-weight="800" text-anchor="middle">PyTorch内核</text>
<text x="1529" y="327" fill="#334155" font-size="19" font-weight="400" text-anchor="start">autograd、Dynamo/Inductor、算子优化</text>
