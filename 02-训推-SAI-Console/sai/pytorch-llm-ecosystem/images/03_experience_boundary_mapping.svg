<rect x="1505" y="400" width="9" height="125" rx="4" fill="#d97706"/>
<text x="1795.0" y="436" fill="#0f172a" font-size="23" font-weight="800" text-anchor="middle">分布式算法</text>
<text x="1529" y="472" fill="#334155" font-size="19" font-weight="400" text-anchor="start">FSDP/ZeRO/PP/TP 的实现细节</text>
