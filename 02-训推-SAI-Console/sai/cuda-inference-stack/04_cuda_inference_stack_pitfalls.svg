<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2160 1396" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="2160" height="1396" fill="#ffffff"/>
<text x="50" y="64" fill="#0f172a" font-size="34" font-weight="700">Triton Inference Server + CUDA 必踩坑与保障</text>
<text x="50" y="104" fill="#64748b" font-size="19">绿=我线上真碰过（相邻经验）；蓝=用 CUDA 基本绕不开的社区通病（我能排查，非亲历事故）</text>
<rect x="50" y="135" width="26" height="26" rx="5" fill="#059669"/>
<text x="84" y="156" fill="#334155" font-size="18">真碰过</text>
<rect x="210" y="135" width="26" height="26" rx="5" fill="#2563eb"/>
<text x="244" y="156" fill="#334155" font-size="18">社区通病 / 能排查</text>
<rect x="50" y="200" width="1010" height="250" rx="14" fill="#059669" fill-opacity="0.07" stroke="#059669" stroke-width="3"/>
<rect x="959" y="218" width="80" height="34" rx="9" fill="#059669"/>
<text x="971" y="242" fill="#ffffff" font-size="18" font-weight="700">真碰过</text>
<text x="78" y="252" fill="#059669" font-size="23" font-weight="700">版本 / 驱动不匹配</text>
<text x="78" y="292" fill="#475569" font-size="19" font-weight="700">现象：</text>
<text x="160" y="292" fill="#334155" font-size="19">Triton 容器或模型加载失败；driver insufficient、backend/engine 版</text>
<text x="160" y="320" fill="#334155" font-size="19">本不符</text>
<text x="78" y="356" fill="#475569" font-size="19" font-weight="700">排查/兜底：</text>
<text x="200" y="356" fill="#334155" font-size="19">比对镜像 CUDA vs 宿主 driver 上限、TRT engine 版本与架构</text>
<text x="78" y="384" fill="#334155" font-size="19">；镜像基线+准入拦截+灰度可回滚</text>
<rect x="1100" y="200" width="1010" height="250" rx="14" fill="#2563eb" fill-opacity="0.07" stroke="#2563eb" stroke-width="3"/>
<rect x="1990" y="218" width="99" height="34" rx="9" fill="#2563eb"/>
<text x="2002" y="242" fill="#ffffff" font-size="18" font-weight="700">社区通病</text>
<text x="1128" y="252" fill="#2563eb" font-size="23" font-weight="700">异步错误报告误导</text>
<text x="1128" y="292" fill="#475569" font-size="19" font-weight="700">现象：</text>
<text x="1210" y="292" fill="#334155" font-size="19">CUDA kernel 异步执行，报错栈不在真正出错处，排查被带偏</text>
<text x="1128" y="328" fill="#475569" font-size="19" font-weight="700">排查/兜底：</text>
<text x="1250" y="328" fill="#334155" font-size="19">排障时设 CUDA_LAUNCH_BLOCKING=1 拿真实出错点；生产默认关闭（</text>
<text x="1128" y="356" fill="#334155" font-size="19">同步影响性能）</text>
<rect x="50" y="484" width="1010" height="250" rx="14" fill="#2563eb" fill-opacity="0.07" stroke="#2563eb" stroke-width="3"/>
<rect x="940" y="502" width="99" height="34" rx="9" fill="#2563eb"/>
<text x="952" y="526" fill="#ffffff" font-size="18" font-weight="700">社区通病</text>
<text x="78" y="536" fill="#2563eb" font-size="23" font-weight="700">Sticky error 致进程挂</text>
<text x="78" y="576" fill="#475569" font-size="19" font-weight="700">现象：</text>
<text x="160" y="576" fill="#334155" font-size="19">illegal address / device assert 后 context 损坏，后</text>
<text x="160" y="604" fill="#334155" font-size="19">续 CUDA API 全失败、清不掉</text>
<text x="78" y="640" fill="#475569" font-size="19" font-weight="700">排查/兜底：</text>
<text x="200" y="640" fill="#334155" font-size="19">识别 sticky 类错误→进程级重启自愈（健康检查兜底）→反复触发的卡隔离驱逐</text>
<rect x="1100" y="484" width="1010" height="250" rx="14" fill="#2563eb" fill-opacity="0.07" stroke="#2563eb" stroke-width="3"/>
<rect x="1990" y="502" width="99" height="34" rx="9" fill="#2563eb"/>
<text x="2002" y="526" fill="#ffffff" font-size="18" font-weight="700">社区通病</text>
<text x="1128" y="536" fill="#2563eb" font-size="23" font-weight="700">显存 OOM 与碎片</text>
<text x="1128" y="576" fill="#475569" font-size="19" font-weight="700">现象：</text>
<text x="1210" y="576" fill="#334155" font-size="19">多模型/instance_group/高并发打爆显存；memory pool 不够报 CNMEM_OUT_OF_MEMORY</text>
<text x="1128" y="612" fill="#475569" font-size="19" font-weight="700">排查/兜底：</text>
<text x="1250" y="612" fill="#334155" font-size="19">控 instance/并发、调 memory pool、限 max batch/len、</text>
<text x="1128" y="640" fill="#334155" font-size="19">评估碎片、隔离同卡邻居</text>
<rect x="50" y="768" width="1010" height="250" rx="14" fill="#2563eb" fill-opacity="0.07" stroke="#2563eb" stroke-width="3"/>
<rect x="940" y="786" width="99" height="34" rx="9" fill="#2563eb"/>
<text x="952" y="810" fill="#ffffff" font-size="18" font-weight="700">社区通病</text>
<text x="78" y="820" fill="#2563eb" font-size="23" font-weight="700">显存卸载后不释放</text>
<text x="78" y="860" fill="#475569" font-size="19" font-weight="700">现象：</text>
<text x="160" y="860" fill="#334155" font-size="19">卸载模型/请求结束后显存不归还，长期累积像泄漏</text>
<text x="78" y="896" fill="#475569" font-size="19" font-weight="700">排查/兜底：</text>
<text x="200" y="896" fill="#334155" font-size="19">监控显存随加载/卸载曲线、进程级回收、巡检僵尸占用</text>
<rect x="1100" y="768" width="1010" height="250" rx="14" fill="#2563eb" fill-opacity="0.07" stroke="#2563eb" stroke-width="3"/>
<rect x="1990" y="786" width="99" height="34" rx="9" fill="#2563eb"/>
<text x="2002" y="810" fill="#ffffff" font-size="18" font-weight="700">社区通病</text>
<text x="1128" y="820" fill="#2563eb" font-size="23" font-weight="700">device ordering 错位</text>
<text x="1128" y="860" fill="#475569" font-size="19" font-weight="700">现象：</text>
<text x="1210" y="860" fill="#334155" font-size="19">CUDA_VISIBLE_DEVICES 与 nvidia-smi 序号不一致，起在错误 GPU 或</text>
<text x="1210" y="888" fill="#334155" font-size="19">挤同卡</text>
<text x="1128" y="924" fill="#475569" font-size="19" font-weight="700">排查/兜底：</text>
<text x="1250" y="924" fill="#334155" font-size="19">设 CUDA_DEVICE_ORDER=PCI_BUS_ID 统一、调度显式绑定、核</text>
<text x="1128" y="952" fill="#334155" font-size="19">对落卡</text>
<rect x="50" y="1052" width="1010" height="250" rx="14" fill="#2563eb" fill-opacity="0.07" stroke="#2563eb" stroke-width="3"/>
<rect x="940" y="1070" width="99" height="34" rx="9" fill="#2563eb"/>
<text x="952" y="1094" fill="#ffffff" font-size="18" font-weight="700">社区通病</text>
<text x="78" y="1104" fill="#2563eb" font-size="23" font-weight="700">TensorRT engine 错配</text>
<text x="78" y="1144" fill="#475569" font-size="19" font-weight="700">现象：</text>
<text x="160" y="1144" fill="#334155" font-size="19">engine 跨 TRT 版本/跨 GPU 架构不可用，换卡或升级后加载失败</text>
<text x="78" y="1180" fill="#475569" font-size="19" font-weight="700">排查/兜底：</text>
<text x="200" y="1180" fill="#334155" font-size="19">engine 按「架构+TRT 版本」管理、按卡型分池调度、换硬件重编</text>
</svg>