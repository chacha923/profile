<rect x="80" y="678" width="980" height="150" rx="14" fill="#0891b2" fill-opacity="0.10" stroke="#0891b2" stroke-width="3"/>
<text x="114" y="736" fill="#0891b2" font-size="27" font-weight="700">CUDA Runtime + Toolkit</text>
<text x="114" y="786" fill="#334155" font-size="20">libcudart.so · nvcc —— 随镜像/应用走（平时说的“CUDA 中间层”）</text>
