<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1326" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1480" height="1326" fill="#ffffff"/>
<defs><marker id="ar" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11" fill="none" stroke="#94a3b8" stroke-width="2"/></marker></defs>
<text x="50" y="70" fill="#0f172a" font-size="34" font-weight="700">CUDA 在生成式推理栈中的分层定位（自底向上）</text>
<text x="50" y="112" fill="#64748b" font-size="20">上层框架不直接操作 GPU；计算下发经 Runtime→Driver→GPU，K8s 只调度资源</text>
<rect x="80" y="150" width="980" height="150" rx="14" fill="#059669" fill-opacity="0.10" stroke="#059669" stroke-width="3"/>
<text x="114" y="208" fill="#059669" font-size="27" font-weight="700">K8s 编排层</text>
<text x="114" y="258" fill="#334155" font-size="20">device plugin（暴露 nvidia.com/gpu，只调度不计算） · nvidia-container-toolkit（注入宿主驱动）</text>
<rect x="1090" y="180" width="340" height="90" rx="12" fill="#059669" fill-opacity="0.12" stroke="#059669" stroke-width="2.4"/>
<text x="1112" y="223" fill="#059669" font-size="19" font-weight="700">真实经验：</text>
<text x="1112" y="255" fill="#059669" font-size="19">调度/透传/版本兼容</text>
