<text x="114" y="560" fill="#d97706" font-size="27" font-weight="700">库层</text>
<text x="114" y="610" fill="#334155" font-size="20">cuDNN · cuBLAS（算子/GEMM）  |  NCCL（多卡通信）  |  TensorRT（推理图优化）</text>
<rect x="1090" y="532" width="340" height="90" rx="12" fill="#d97706" fill-opacity="0.12" stroke="#d97706" stroke-width="2.4"/>
<text x="1112" y="575" fill="#d97706" font-size="19" font-weight="700"></text>
<text x="1112" y="607" fill="#d97706" font-size="19">理论对标内核 + 真实排障入口</text>
