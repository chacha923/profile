<rect x="80" y="326" width="980" height="150" rx="14" fill="#2563eb" fill-opacity="0.10" stroke="#2563eb" stroke-width="3"/>
<text x="114" y="384" fill="#2563eb" font-size="27" font-weight="700">框架层</text>
<text x="114" y="434" fill="#334155" font-size="20">PyTorch / vLLM / TensorRT-LLM / SGLang —— 不直接操作 GPU</text>
<rect x="1090" y="356" width="340" height="90" rx="12" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="2.4"/>
<text x="1112" y="399" fill="#2563eb" font-size="19" font-weight="700">相邻经验：</text>
