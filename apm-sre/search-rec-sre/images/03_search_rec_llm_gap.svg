<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 820" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1320" height="820" fill="#ffffff"/>
<text x="40" y="52" fill="#0f172a" font-size="24" font-weight="700">大模型为什么在搜推难替代精排（约束 → 务实落地）</text>
<rect x="40" y="110" width="1240" height="92" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2.4"/>
<text x="660" y="162.5" text-anchor="middle" fill="#334155" font-size="18" font-weight="700">延迟预算：  精排几十ms打分上千候选·大模型上百ms·量级对不上</text>
<rect x="40" y="110" width="9" height="92" rx="4" fill="#dc2626"/>
<rect x="40" y="216" width="1240" height="92" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="2.4"/>
<text x="660" y="268.5" text-anchor="middle" fill="#334155" font-size="18" font-weight="700">成本 / ROI：  搜推超高QPS·每请求过大模型算力成本高·ROI 不成立</text>
<rect x="40" y="216" width="9" height="92" rx="4" fill="#ea580c"/>
<rect x="40" y="322" width="1240" height="92" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="2.4"/>
<text x="660" y="374.5" text-anchor="middle" fill="#334155" font-size="18" font-weight="700">增量 / 实时更新：  搜推靠小时级特征+模型更新跟数据·大模型重训慢</text>
<rect x="40" y="322" width="9" height="92" rx="4" fill="#d97706"/>
<rect x="40" y="428" width="1240" height="92" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2.4"/>
<text x="660" y="480.5" text-anchor="middle" fill="#334155" font-size="18" font-weight="700">特征体系：  海量稀疏ID/交叉特征 vs 大模型文本语义范式·迁移成本高</text>
<rect x="40" y="428" width="9" height="92" rx="4" fill="#0891b2"/>
<rect x="40" y="534" width="1240" height="92" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2.4"/>
<text x="660" y="586.5" text-anchor="middle" fill="#334155" font-size="18" font-weight="700">可解释 / 可控：  搜推要业务规则/打散/合规可控·大模型黑盒难控</text>
<rect x="40" y="534" width="9" height="92" rx="4" fill="#7c3aed"/>
<rect x="40" y="648" width="1240" height="96" rx="12" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
<text x="660" y="687.0" text-anchor="middle" fill="#e2e8f0" font-size="19" font-weight="700">务实落地：大模型在搜推多为「辅助」而非「替代」</text>
<text x="660" y="719.0" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="400">语义向量召回 · 内容理解 · 冷启动 · 生成式补充  —  不端到端取代精排</text>
</svg>