  <ellipse cx="172" cy="134" rx="80" ry="14" fill="#dbeafe" stroke="#bfdbfe"/>
  <text x="172" y="158" text-anchor="middle" class="node-title">CMDB MySQL</text>
  <text x="172" y="178" text-anchor="middle" class="node-sub">spring.datasource.cmdb</text>

  <rect x="335" y="118" width="184" height="78" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="427" y="144" text-anchor="middle" class="node-title">category_* 资源表</text>
  <text x="427" y="164" text-anchor="middle" class="node-sub">application / ecs / rds</text>
  <text x="427" y="182" text-anchor="middle" class="node-sub">redis / domain / mq</text>

  <rect x="618" y="118" width="184" height="78" rx="8" fill="#ffffff" stroke="#d1d5db"/>
