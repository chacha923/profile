  <text x="640" y="360" text-anchor="middle" class="arrow-label">leader 部门补齐</text>

  <rect x="80" y="410" width="190" height="34" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="175" y="432" text-anchor="middle" class="small">手动入口：/api/sync/category/*</text>
  <path d="M175 410 L175 390" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)"/>

  <rect x="32" y="494" width="1136" height="158" rx="10" fill="#f0fdfa" stroke="#ccfbf1" stroke-dasharray="7,4"/>
  <text x="48" y="518" class="lane">REAL-TIME ALERT PATH</text>

  <rect x="80" y="552" width="166" height="58" rx="8" fill="#ffffff" stroke="#d1d5db"/>
