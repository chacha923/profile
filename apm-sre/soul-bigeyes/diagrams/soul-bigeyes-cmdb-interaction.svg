  <text x="163" y="596" text-anchor="middle" class="node-sub">填充 owner / dept</text>

  <rect x="330" y="552" width="154" height="58" rx="23" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="407" y="576" text-anchor="middle" class="node-title">RocketMQ</text>
  <text x="407" y="596" text-anchor="middle" class="node-sub">AlertEventMqMessage</text>

  <rect x="568" y="552" width="166" height="58" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="651" y="576" text-anchor="middle" class="node-title">schedule</text>
  <text x="651" y="596" text-anchor="middle" class="node-sub">聚合 / 通知 / 落库</text>

  <rect x="818" y="552" width="190" height="58" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="913" y="576" text-anchor="middle" class="node-title">Piper / 飞书</text>
  <text x="913" y="596" text-anchor="middle" class="node-sub">发送与交互回调</text>

  <rect x="1040" y="538" width="82" height="88" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <text x="1081" y="572" text-anchor="middle" class="node-title">CMDB</text>
  <text x="1081" y="592" text-anchor="middle" class="node-sub">不在</text>
  <text x="1081" y="610" text-anchor="middle" class="node-sub">实时链路</text>
  <line x1="1052" y1="548" x2="1110" y2="620" stroke="#dc2626" stroke-width="2"/>
  <line x1="1110" y1="548" x2="1052" y2="620" stroke="#dc2626" stroke-width="2"/>

  <path d="M246 581 L330 581" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M484 581 L568 581" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M734 581 L818 581" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M995 581 L1040 581" stroke="#dc2626" stroke-width="2" fill="none" stroke-dasharray="6,5"/>
  <text x="288" y="568" text-anchor="middle" class="arrow-label">MQ 消息</text>
  <text x="526" y="568" text-anchor="middle" class="arrow-label">消费</text>
  <text x="776" y="568" text-anchor="middle" class="arrow-label">推送</text>

  <rect x="32" y="682" width="1136" height="50" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <line x1="52" y1="704" x2="90" y2="704" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="100" y="708" class="small">CMDB 只读查询</text>
  <line x1="220" y1="704" x2="258" y2="704" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="268" y="708" class="small">同步触发</text>
  <line x1="380" y1="704" x2="418" y2="704" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="428" y="708" class="small">Bigeyes 本地数据/实时告警流</text>
  <line x1="650" y1="704" x2="688" y2="704" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,5"/>
  <text x="698" y="708" class="small">非实时依赖边界</text>
  <text x="850" y="708" class="small">结论：admin 拉 CMDB 缓存资源；schedule 实时链路不查 CMDB。</text>
