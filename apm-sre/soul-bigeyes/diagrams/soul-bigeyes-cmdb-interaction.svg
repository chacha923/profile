  <text x="741" y="350" text-anchor="middle" class="node-title">Bigeyes MySQL</text>
  <text x="741" y="370" text-anchor="middle" class="node-sub">category_local</text>
  <text x="741" y="388" text-anchor="middle" class="node-sub">本地资源缓存</text>

  <rect x="920" y="318" width="190" height="72" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="1015" y="344" text-anchor="middle" class="node-title">AlarmCategory API</text>
