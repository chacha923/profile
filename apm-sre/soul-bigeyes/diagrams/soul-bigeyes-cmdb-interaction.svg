  <path d="M550 354 L652 354" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M830 354 L920 354" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M447 318 C500 250, 850 232, 997 196" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M710 196 C690 286, 590 400, 550 428" stroke="#2563eb" stroke-width="1.8" fill="none" stroke-dasharray="6,5" marker-end="url(#arrow-blue)"/>
  <path d="M447 412 L447 390" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <text x="307" y="342" text-anchor="middle" class="arrow-label">触发</text>
  <text x="600" y="342" text-anchor="middle" class="arrow-label">upsert</text>
  <text x="875" y="342" text-anchor="middle" class="arrow-label">查询</text>
