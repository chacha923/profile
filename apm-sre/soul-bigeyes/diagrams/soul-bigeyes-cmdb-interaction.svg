  <text x="997" y="164" text-anchor="middle" class="node-sub">CmdbCategoryMapper</text>
  <text x="997" y="182" text-anchor="middle" class="node-sub">CmdbUserMapper</text>

  <path d="M252 158 L335 158" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M519 158 L618 158" stroke="#2563eb" stroke-width="2" fill="none" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
  <path d="M802 158 L890 158" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
