  <rect x="344" y="412" width="206" height="34" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="447" y="434" text-anchor="middle" class="small">AdminUserCacheUtil：leader 部门缓存</text>

  <path d="M652 320 C652 304, 830 304, 830 320 L830 390 C830 406, 652 406, 652 390 Z" fill="#ffffff" stroke="#d1d5db"/>
