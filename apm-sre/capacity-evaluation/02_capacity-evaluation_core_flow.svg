<path d="M 1326.5,200.0 C 1326.5,290.0 132.5,290.0 132.5,200.0" fill="none" stroke="#475569" stroke-width="2.4" stroke-dasharray="6,5" marker-end="url(#ah)"/>
<text x="750.0" y="315.0" text-anchor="middle" fill="#475569" font-size="15" font-weight="600">反馈复盘 → 修正基线与阈值（持续闭环）</text>
<text x="750.0" y="360.0" text-anchor="middle" fill="#ea580c" font-size="16" font-weight="700">推理场景找瓶颈优先看：GPU 显存（KV Cache）与排队延迟，而非只看 QPS / CPU</text>
<text x="750.0" y="442.0" text-anchor="middle" fill="#475569" font-size="14" font-weight="600">纯理论对标，无直接项目落地经验；「压测定上限」为方法论环节</text>
