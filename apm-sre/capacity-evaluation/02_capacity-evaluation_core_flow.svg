<text x="1127.5" y="145.0" text-anchor="middle" fill="#059669" font-size="16" font-weight="700">执行扩缩/配额</text>
<line x1="1220.0" y1="160.0" x2="1234.0" y2="160.0" stroke="#475569" stroke-width="2.4" marker-end="url(#ah)"/>
<rect x="1234.0" y="120.0" width="185.0" height="80.0" rx="9" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
