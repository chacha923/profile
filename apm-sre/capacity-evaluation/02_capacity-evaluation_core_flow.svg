<text x="530.5" y="145.0" text-anchor="middle" fill="#ea580c" font-size="16" font-weight="700">压测定上限</text>
<line x1="623.0" y1="160.0" x2="637.0" y2="160.0" stroke="#475569" stroke-width="2.4" marker-end="url(#ah)"/>
<rect x="637.0" y="120.0" width="185.0" height="80.0" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="729.5" y="145.0" text-anchor="middle" fill="#7c3aed" font-size="16" font-weight="700">算水位/瓶颈</text>
<line x1="822.0" y1="160.0" x2="836.0" y2="160.0" stroke="#475569" stroke-width="2.4" marker-end="url(#ah)"/>
<rect x="836.0" y="120.0" width="185.0" height="80.0" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="928.5" y="145.0" text-anchor="middle" fill="#7c3aed" font-size="16" font-weight="700">出容量结论</text>
<line x1="1021.0" y1="160.0" x2="1035.0" y2="160.0" stroke="#475569" stroke-width="2.4" marker-end="url(#ah)"/>
