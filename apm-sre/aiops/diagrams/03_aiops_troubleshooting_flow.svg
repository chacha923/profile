<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" width="980" height="720">
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 23px; font-weight: 700; fill: #111827; }
    .sub { font-size: 13px; fill: #6b7280; }
    .h { font-size: 14px; font-weight: 700; fill: #111827; }
    .t { font-size: 12px; fill: #374151; }
    .s { font-size: 11px; fill: #6b7280; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; ry: 8; }
    .diamond { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .blue { fill: #eff6ff; stroke: #93c5fd; }
    .green { fill: #ecfdf5; stroke: #86efac; }
    .amber { fill: #fffbeb; stroke: #fcd34d; }
    .violet { fill: #f5f3ff; stroke: #c4b5fd; }
    .red { fill: #fef2f2; stroke: #fca5a5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="980" height="720" fill="#ffffff"/>
  <text x="490" y="42" text-anchor="middle" class="title">AIOps 分析不准时的排查路径</text>
  <text x="490" y="70" text-anchor="middle" class="sub">先查输入和实体，再查工具证据，最后查推理约束、评估和安全边界</text>

  <rect x="390" y="105" width="200" height="58" class="box blue"/>
  <text x="490" y="132" text-anchor="middle" class="h">分析结果异常</text>
  <text x="490" y="151" text-anchor="middle" class="s">无结论 / 误判 / 泛泛建议</text>

  <polygon points="490,205 610,265 490,325 370,265" class="diamond"/>
  <text x="490" y="258" text-anchor="middle" class="h">告警输入稳定吗</text>
  <text x="490" y="278" text-anchor="middle" class="s">字段 / 时间 / 规则 / 对象</text>

  <rect x="85" y="232" width="220" height="70" class="box red"/>
  <text x="195" y="262" text-anchor="middle" class="h">修数据契约</text>
  <text x="195" y="284" text-anchor="middle" class="t">统一告警 schema</text>

  <polygon points="490,365 610,425 490,485 370,425" class="diamond"/>
  <text x="490" y="418" text-anchor="middle" class="h">实体上下文完整吗</text>
  <text x="490" y="438" text-anchor="middle" class="s">服务 / 实例 / 拓扑 / owner</text>

  <rect x="85" y="392" width="220" height="70" class="box amber"/>
  <text x="195" y="422" text-anchor="middle" class="h">修实体映射</text>
  <text x="195" y="444" text-anchor="middle" class="t">补齐拓扑和归属关系</text>

  <polygon points="490,525 610,585 490,645 370,585" class="diamond"/>
  <text x="490" y="578" text-anchor="middle" class="h">证据足够且一致吗</text>
  <text x="490" y="598" text-anchor="middle" class="s">指标 / 日志 / 事件 / 变更</text>

  <rect x="675" y="392" width="220" height="70" class="box violet"/>
  <text x="785" y="422" text-anchor="middle" class="h">修工具取证</text>
  <text x="785" y="444" text-anchor="middle" class="t">超时、空结果、权限、脱敏</text>

  <rect x="675" y="552" width="220" height="70" class="box green"/>
  <text x="785" y="582" text-anchor="middle" class="h">修推理和评估</text>
  <text x="785" y="604" text-anchor="middle" class="t">反证、Unknown、回放评测</text>

  <rect x="330" y="665" width="320" height="38" class="box blue"/>
  <text x="490" y="689" text-anchor="middle" class="h">人工复核后回灌 Skill 和 Benchmark</text>

  <path d="M490 163 L490 205" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M370 265 L305 265" stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arrow-red)"/>
  <text x="338" y="254" text-anchor="middle" class="s">否</text>
  <path d="M490 325 L490 365" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text x="508" y="350" class="s">是</text>
  <path d="M370 425 L305 425" stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arrow-red)"/>
  <text x="338" y="414" text-anchor="middle" class="s">否</text>
  <path d="M610 425 L675 425" stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arrow-red)"/>
  <text x="642" y="414" text-anchor="middle" class="s">工具异常</text>
  <path d="M490 485 L490 525" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text x="508" y="510" class="s">是</text>
  <path d="M610 585 L675 585" stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arrow-red)"/>
  <text x="642" y="574" text-anchor="middle" class="s">不足</text>
  <path d="M490 645 L490 665" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text x="508" y="660" class="s">足够</text>
</svg>
