<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 660" width="1080" height="660">
  <style>
    text { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .sub { font-size: 13px; fill: #6b7280; }
    .h { font-size: 15px; font-weight: 700; fill: #111827; }
    .t { font-size: 12.5px; fill: #374151; }
    .s { font-size: 11.5px; fill: #6b7280; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .green { fill: #ecfdf5; stroke: #86efac; }
    .blue { fill: #eff6ff; stroke: #93c5fd; }
    .amber { fill: #fffbeb; stroke: #fcd34d; }
    .cyan { fill: #ecfeff; stroke: #67e8f9; }
    .violet { fill: #f5f3ff; stroke: #c4b5fd; }
  </style>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1080" height="660" fill="#ffffff"/>
  <text x="540" y="42" text-anchor="middle" class="title">多 Agent 协作 + MCP 工具生态</text>
  <text x="540" y="70" text-anchor="middle" class="sub">从单体 RCA Agent 走向"编排者 + 专项子 Agent + 标准化工具协议"</text>

  <rect x="410" y="100" width="260" height="80" rx="8" class="box violet"/>
  <text x="540" y="130" text-anchor="middle" class="h">Orchestrator（编排）</text>
  <text x="540" y="153" text-anchor="middle" class="t">任务拆解 / 调度 / 汇总</text>
  <text x="540" y="172" text-anchor="middle" class="s">规划 + 仲裁子 Agent 结论</text>

  <rect x="60" y="240" width="200" height="90" rx="8" class="box blue"/>
  <text x="160" y="270" text-anchor="middle" class="h">指标 Agent</text>
  <text x="160" y="293" text-anchor="middle" class="t">异常检测/多维定位</text>
  <text x="160" y="313" text-anchor="middle" class="s">Prometheus 专项</text>

  <rect x="290" y="240" width="200" height="90" rx="8" class="box green"/>
  <text x="390" y="270" text-anchor="middle" class="h">日志 Agent</text>
  <text x="390" y="293" text-anchor="middle" class="t">模板/错误聚合</text>
  <text x="390" y="313" text-anchor="middle" class="s">OTel Logs 专项</text>

  <rect x="520" y="240" width="200" height="90" rx="8" class="box amber"/>
  <text x="620" y="270" text-anchor="middle" class="h">链路 Agent</text>
  <text x="620" y="293" text-anchor="middle" class="t">上下游/长尾归因</text>
  <text x="620" y="313" text-anchor="middle" class="s">Trace 专项</text>

  <rect x="750" y="240" width="200" height="90" rx="8" class="box cyan"/>
  <text x="850" y="270" text-anchor="middle" class="h">变更/知识 Agent</text>
  <text x="850" y="293" text-anchor="middle" class="t">变更关联/SOP 检索</text>
  <text x="850" y="313" text-anchor="middle" class="s">CMDB + RAG 专项</text>

  <path d="M480 180 L200 240" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M510 180 L410 240" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M570 180 L610 240" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M600 180 L840 240" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="80" y="385" width="920" height="100" rx="8" class="box blue"/>
  <text x="110" y="413" class="h">MCP（Model Context Protocol）：工具接入标准化</text>
  <text x="110" y="438" class="s">· 把"指标查询、日志查询、Trace 查询、变更查询、知识检索"做成标准 MCP Server，任何 Agent/模型即插即用</text>
  <text x="110" y="460" class="s">· 解决 N 个 Agent × M 个系统的 N×M 适配爆炸，统一鉴权、限流、审计、脱敏</text>
  <text x="110" y="480" class="s">· 工具与编排解耦：换模型、加子 Agent 不用重写工具集成</text>

  <rect x="80" y="505" width="445" height="130" rx="8" class="box green"/>
  <text x="110" y="533" class="h">收益</text>
  <text x="110" y="558" class="s">· 专项 Agent 上下文更聚焦，幻觉更少</text>
  <text x="110" y="580" class="s">· 可并行取证，缩短复杂 RCA 耗时</text>
  <text x="110" y="602" class="s">· 工具生态可复用、可治理</text>
  <text x="110" y="624" class="s">· 子 Agent 可独立评估和迭代</text>

  <rect x="555" y="505" width="445" height="130" rx="8" class="box amber"/>
  <text x="585" y="533" class="h">代价与边界（面试要点）</text>
  <text x="585" y="558" class="s">· 多 Agent 引入协调/上下文传递/成本上升</text>
  <text x="585" y="580" class="s">· 结论冲突需要编排者仲裁，不能简单投票</text>
  <text x="585" y="602" class="s">· 不是越多 Agent 越好，先单体跑通再拆</text>
  <text x="585" y="624" class="s">· MCP 工具权限要默认只读 + 审计</text>
</svg>
