<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000">
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif;
    }
    .title { fill: #111827; font-size: 28px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 14px; }
    .lane { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.2; stroke-dasharray: 7 5; }
    .lane-label { fill: #374151; font-size: 13px; font-weight: 700; }
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .node-title { fill: #111827; font-size: 16px; font-weight: 700; }
    .node-text { fill: #4b5563; font-size: 12px; }
    .note { fill: #6b7280; font-size: 11px; }
    .badge-text { fill: #ffffff; font-size: 12px; font-weight: 700; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .red { fill: #fef2f2; stroke: #fecaca; }
    .teal { fill: #f0fdfa; stroke: #99f6e4; }
    .arrow-blue { fill: none; stroke: #2563eb; stroke-width: 2; marker-end: url(#arrow-blue); }
    .arrow-green { fill: none; stroke: #16a34a; stroke-width: 2; marker-end: url(#arrow-green); }
    .arrow-red { fill: none; stroke: #dc2626; stroke-width: 2; marker-end: url(#arrow-red); }
    .arrow-purple { fill: none; stroke: #9333ea; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow-purple); }
    .arrow-gray { fill: none; stroke: #6b7280; stroke-width: 1.7; stroke-dasharray: 6 5; marker-end: url(#arrow-gray); }
  </style>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1200" height="1000" fill="#ffffff"/>

  <text class="title" x="48" y="52">soda-pepsi 业务架构图</text>
  <text class="subtitle" x="48" y="78">模块拆解视角：Webserver 控制入口、Service/DAO 领域能力、Scheduler 调度控制、Worker 执行数据面、Alarm 运维闭环</text>

  <!-- Layer 1 -->
  <rect class="lane" x="40" y="110" width="1120" height="135" rx="8"/>
  <text class="lane-label" x="60" y="134">入口与控制面</text>

  <g transform="translate(75,155)">
    <rect class="node blue" x="0" y="0" width="170" height="65" rx="8"/>
    <circle cx="28" cy="32" r="18" fill="#2563eb"/>
    <text class="badge-text" x="28" y="36" text-anchor="middle">User</text>
    <text class="node-title" x="58" y="26">用户 / 外部系统</text>
    <text class="node-text" x="58" y="48">前端、OpenAPI、Webhook</text>
  </g>

  <g transform="translate(315,143)">
    <rect class="node green" x="0" y="0" width="250" height="90" rx="8"/>
    <circle cx="32" cy="42" r="20" fill="#16a34a"/>
    <text class="badge-text" x="32" y="46" text-anchor="middle">WEB</text>
    <text class="node-title" x="66" y="28">soda-pepsi-webserver</text>
    <text class="node-text" x="66" y="52">REST API、作业管理、任务运维</text>
    <text class="node-text" x="66" y="72">队列、权限、DAG、搜索、OpenAPI</text>
  </g>

  <g transform="translate(645,143)">
    <rect class="node purple" x="0" y="0" width="215" height="90" rx="8"/>
    <circle cx="32" cy="42" r="20" fill="#9333ea"/>
    <text class="badge-text" x="32" y="46" text-anchor="middle">Gov</text>
    <text class="node-title" x="66" y="28">变更与准入治理</text>
    <text class="node-text" x="66" y="52">GitLab MR、SQL Scan</text>
    <text class="node-text" x="66" y="72">审批、权限、Hive 表检查</text>
  </g>

  <g transform="translate(925,155)">
    <rect class="node red" x="0" y="0" width="170" height="65" rx="8"/>
    <circle cx="28" cy="32" r="18" fill="#dc2626"/>
    <text class="badge-text" x="28" y="36" text-anchor="middle">Ops</text>
    <text class="node-title" x="58" y="26">运营通知</text>
    <text class="node-text" x="58" y="48">飞书、值班、审批回调</text>
  </g>

  <path class="arrow-blue" d="M245 187 L315 187"/>
  <path class="arrow-purple" d="M565 187 L645 187"/>
  <path class="arrow-red" d="M860 187 L925 187"/>

  <!-- Layer 2 -->
  <rect class="lane" x="40" y="285" width="1120" height="160" rx="8"/>
  <text class="lane-label" x="60" y="309">领域服务与公共协议层</text>

  <g transform="translate(115,335)">
    <rect class="node teal" x="0" y="0" width="245" height="78" rx="8"/>
    <circle cx="30" cy="38" r="20" fill="#0d9488"/>
    <text class="badge-text" x="30" y="42" text-anchor="middle">SVC</text>
    <text class="node-title" x="64" y="28">soda-pepsi-service</text>
    <text class="node-text" x="64" y="51">Job / Task / Alarm / Queue</text>
    <text class="node-text" x="64" y="68">跨模块领域服务封装</text>
  </g>

  <g transform="translate(470,335)">
    <rect class="node orange" x="0" y="0" width="235" height="78" rx="8"/>
    <circle cx="30" cy="38" r="20" fill="#ea580c"/>
    <text class="badge-text" x="30" y="42" text-anchor="middle">DAO</text>
    <text class="node-title" x="64" y="28">soda-pepsi-dao</text>
    <text class="node-text" x="64" y="51">MyBatis-Plus、Entity、Mapper</text>
    <text class="node-text" x="64" y="68">持久化访问边界</text>
  </g>

  <g transform="translate(815,335)">
    <rect class="node purple" x="0" y="0" width="250" height="78" rx="8"/>
    <circle cx="30" cy="38" r="20" fill="#7c3aed"/>
    <text class="badge-text" x="30" y="42" text-anchor="middle">COM</text>
    <text class="node-title" x="64" y="28">soda-pepsi-common</text>
    <text class="node-text" x="64" y="51">状态枚举、TaskExecuteContext</text>
    <text class="node-text" x="64" y="68">API、注册中心、Yarn/OBS 工具</text>
  </g>

  <path class="arrow-blue" d="M440 233 C390 270 270 292 238 335"/>
  <path class="arrow-green" d="M360 374 L470 374"/>
  <path class="arrow-gray" d="M815 374 C755 374 750 374 705 374"/>

  <!-- Layer 3 -->
  <rect class="lane" x="40" y="485" width="1120" height="175" rx="8"/>
  <text class="lane-label" x="60" y="509">Scheduler 调度控制面</text>

  <g transform="translate(75,535)">
    <rect class="node blue" x="0" y="0" width="205" height="88" rx="8"/>
    <circle cx="30" cy="42" r="20" fill="#2563eb"/>
    <text class="badge-text" x="30" y="46" text-anchor="middle">SCH</text>
    <text class="node-title" x="64" y="27">soda-pepsi-scheduler</text>
    <text class="node-text" x="64" y="50">Quartz、DAG、依赖判断</text>
    <text class="node-text" x="64" y="69">任务恢复、重试恢复</text>
  </g>

  <g transform="translate(360,535)">
    <rect class="node blue" x="0" y="0" width="205" height="88" rx="8"/>
    <circle cx="30" cy="42" r="20" fill="#2563eb"/>
    <text class="badge-text" x="30" y="46" text-anchor="middle">Q</text>
    <text class="node-title" x="64" y="27">调度队列</text>
    <text class="node-text" x="64" y="50">workgroupQueues</text>
    <text class="node-text" x="64" y="69">emergency / shethon</text>
  </g>

  <g transform="translate(645,535)">
    <rect class="node blue" x="0" y="0" width="205" height="88" rx="8"/>
    <circle cx="30" cy="42" r="20" fill="#2563eb"/>
    <text class="badge-text" x="30" y="46" text-anchor="middle">RM</text>
    <text class="node-title" x="64" y="27">ResourceManager</text>
    <text class="node-text" x="64" y="50">Worker 心跳、黑名单</text>
    <text class="node-text" x="64" y="69">负载、内存、工作组并行度</text>
  </g>

  <g transform="translate(930,535)">
    <rect class="node green" x="0" y="0" width="185" height="88" rx="8"/>
    <circle cx="30" cy="42" r="20" fill="#16a34a"/>
    <text class="badge-text" x="30" y="46" text-anchor="middle">TS</text>
    <text class="node-title" x="64" y="27">TaskStateService</text>
    <text class="node-text" x="64" y="50">状态合并、终态保护</text>
    <text class="node-text" x="64" y="69">告警、重试、Failover</text>
  </g>

  <path class="arrow-blue" d="M280 579 L360 579"/>
  <path class="arrow-blue" d="M565 579 L645 579"/>
  <path class="arrow-green" d="M850 579 L930 579"/>
  <path class="arrow-green" d="M575 413 C575 455 178 485 178 535"/>

  <!-- Layer 4 -->
  <rect class="lane" x="40" y="700" width="1120" height="125" rx="8"/>
  <text class="lane-label" x="60" y="724">Worker 执行数据面与告警面</text>

  <g transform="translate(100,745)">
    <rect class="node orange" x="0" y="0" width="240" height="58" rx="8"/>
    <circle cx="28" cy="29" r="18" fill="#ea580c"/>
    <text class="badge-text" x="28" y="33" text-anchor="middle">W</text>
    <text class="node-title" x="58" y="24">soda-pepsi-worker</text>
    <text class="node-text" x="58" y="45">接收 dispatch、排队、执行、回报状态</text>
  </g>

  <g transform="translate(405,745)">
    <rect class="node orange" x="0" y="0" width="300" height="72" rx="8"/>
    <circle cx="28" cy="29" r="18" fill="#f97316"/>
    <text class="badge-text" x="28" y="33" text-anchor="middle">EX</text>
    <text class="node-title" x="58" y="24">TaskExecutor / Engine</text>
    <text class="node-text" x="58" y="45">Shell、Python、Spark、Hive</text>
    <text class="node-text" x="58" y="63">DataX、SeaTunnel、K8S launcher</text>
  </g>

  <g transform="translate(750,745)">
    <rect class="node red" x="0" y="0" width="250" height="58" rx="8"/>
    <circle cx="28" cy="29" r="18" fill="#dc2626"/>
    <text class="badge-text" x="28" y="33" text-anchor="middle">AL</text>
    <text class="node-title" x="58" y="24">soda-pepsi-alarm</text>
    <text class="node-text" x="58" y="45">失败、超时、升级、值班、恢复</text>
  </g>

  <path class="arrow-blue" d="M738 623 C720 685 315 700 260 745"/>
  <path class="arrow-blue" d="M340 774 L405 774"/>
  <path class="arrow-green" d="M675 774 C730 710 965 700 1018 623"/>
  <path class="arrow-red" d="M1022 623 C1000 685 930 715 875 745"/>

  <!-- Layer 5 -->
  <rect class="lane" x="40" y="850" width="1120" height="105" rx="8"/>
  <text class="lane-label" x="60" y="878">基础设施与外部系统</text>

  <g transform="translate(105,890)">
    <ellipse cx="35" cy="12" rx="34" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
    <rect x="1" y="12" width="68" height="22" fill="#eff6ff"/>
    <line x1="1" y1="12" x2="1" y2="34" stroke="#93c5fd" stroke-width="1.4"/>
    <line x1="69" y1="12" x2="69" y2="34" stroke="#93c5fd" stroke-width="1.4"/>
    <ellipse cx="35" cy="34" rx="34" ry="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.4"/>
    <text class="note" x="35" y="29" text-anchor="middle">MySQL</text>
  </g>

  <g transform="translate(235,895)">
    <rect class="node green" x="0" y="0" width="88" height="34" rx="8"/>
    <text class="note" x="44" y="22" text-anchor="middle">OBS 日志</text>
  </g>

  <g transform="translate(365,895)">
    <rect class="node purple" x="0" y="0" width="112" height="34" rx="8"/>
    <text class="note" x="56" y="22" text-anchor="middle">Elasticsearch</text>
  </g>

  <g transform="translate(520,895)">
    <rect class="node purple" x="0" y="0" width="88" height="34" rx="8"/>
    <text class="note" x="44" y="22" text-anchor="middle">Zookeeper</text>
  </g>

  <g transform="translate(650,895)">
    <rect class="node orange" x="0" y="0" width="110" height="34" rx="8"/>
    <text class="note" x="55" y="22" text-anchor="middle">Yarn / MRS</text>
  </g>

  <g transform="translate(805,895)">
    <rect class="node blue" x="0" y="0" width="88" height="34" rx="8"/>
    <text class="note" x="44" y="22" text-anchor="middle">K8S</text>
  </g>

  <g transform="translate(935,895)">
    <rect class="node red" x="0" y="0" width="88" height="34" rx="8"/>
    <text class="note" x="44" y="22" text-anchor="middle">GitLab</text>
  </g>

  <g transform="translate(1060,895)">
    <rect class="node red" x="0" y="0" width="70" height="34" rx="8"/>
    <text class="note" x="35" y="22" text-anchor="middle">Feishu</text>
  </g>

  <path class="arrow-green" d="M588 413 C500 450 78 455 78 680 C78 815 105 870 140 890"/>
  <path class="arrow-green" d="M540 803 C515 846 350 878 279 895"/>
  <path class="arrow-purple" d="M564 895 C520 775 178 682 178 623"/>
  <path class="arrow-blue" d="M540 803 C600 845 680 870 705 895"/>
  <path class="arrow-blue" d="M575 803 C650 845 820 870 849 895"/>
  <path class="arrow-purple" d="M752 188 C870 255 950 760 979 895"/>
  <path class="arrow-red" d="M875 803 C930 850 1035 870 1095 895"/>

  <!-- Legend -->
  <g transform="translate(48,978)">
    <line x1="0" y1="0" x2="32" y2="0" class="arrow-blue"/>
    <text class="note" x="42" y="4">主调用 / dispatch</text>
    <line x1="160" y1="0" x2="192" y2="0" class="arrow-green"/>
    <text class="note" x="202" y="4">状态 / 数据 / 持久化</text>
    <line x1="350" y1="0" x2="382" y2="0" class="arrow-red"/>
    <text class="note" x="392" y="4">告警 / 通知</text>
    <line x1="505" y1="0" x2="537" y2="0" class="arrow-purple"/>
    <text class="note" x="547" y="4">治理 / 注册 / 选主</text>
  </g>
</svg>
