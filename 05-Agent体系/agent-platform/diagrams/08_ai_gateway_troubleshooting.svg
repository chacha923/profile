  <path d="M 580,256 L 580,320 L 600,320 L 600,390" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 920,256 L 920,320 L 940,320 L 940,390" stroke="#ea580c" stroke-width="2.2" fill="none" marker-end="url(#arrow-orange)"/>
