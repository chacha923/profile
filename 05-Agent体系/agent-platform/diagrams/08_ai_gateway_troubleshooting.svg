  <text x="260.0" y="415" text-anchor="middle" class="label">关键指标</text>
  <text x="260.0" y="438" text-anchor="middle" class="sub">input/output/cached token</text>
  <text x="260.0" y="456" text-anchor="middle" class="sub">total_cost / 429</text>
  <rect x="500" y="390" width="200" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="600.0" y="415" text-anchor="middle" class="label">关键标签</text>
  <text x="600.0" y="438" text-anchor="middle" class="sub">ai_service / model</text>
  <text x="600.0" y="456" text-anchor="middle" class="sub">consumer / route</text>
