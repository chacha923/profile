<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2040 1010">
<style>text{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',Helvetica,Arial,sans-serif;}</style>
<defs><marker id="ab" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto"><polygon points="0 0,12 5,0 10" fill="#64748b"/></marker></defs>
<rect width="2040" height="1010" fill="#ffffff"/>
<text x="1020.0" y="52.0" font-size="34" fill="#111827" text-anchor="middle" font-weight="700">Soul Sandbox 体系 0 → 1 分阶段建设路线</text>
<text x="1020.0" y="90.0" font-size="20" fill="#6b7280" text-anchor="middle" font-weight="400">先跑通 → 再隔离 → 再提速 → 再治理 → 再自治；每阶段可独立交付、可灰度、可回退</text>
<rect x="42.0" y="130" width="372" height="660" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
<rect x="42.0" y="130" width="372" height="58" rx="14" fill="#2563eb"/>
<rect x="42.0" y="172" width="372" height="16" fill="#2563eb"/>
<text x="228.0" y="168.0" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="700">P0 跑通闭环</text>
<text x="60.0" y="228.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">在 Hermes 容器上抽统一 Sandbox 控</text>
<text x="60.0" y="258.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">制面 API（Create/Exec/Destroy）</text>
<text x="60.0" y="288.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">，moss/soulclaw 下沉到这层。安全</text>
<text x="60.0" y="318.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">兜底：出站默认拒绝、不可信代码</text>
<text x="60.0" y="348.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">gating 到 P1。控制面从第一天按高</text>
<text x="60.0" y="378.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">并发设计（幂等/限流）。</text>
<rect x="56.0" y="560" width="344" height="96" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="5,4"/>
<text x="228.0" y="586.0" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="700">出口标准</text>
<text x="228.0" y="610.0" font-size="17" fill="#374151" text-anchor="middle" font-weight="400">统一 API 跑通 编排→执行→回收；出站默</text>
<text x="228.0" y="633.0" font-size="17" fill="#374151" text-anchor="middle" font-weight="400">认拒绝</text>
<rect x="56.0" y="698" width="344" height="76" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
<text x="228.0" y="726.0" font-size="16" fill="#15803d" text-anchor="middle" font-weight="700">真实经验平移</text>
<text x="228.0" y="752.0" font-size="18" fill="#374151" text-anchor="middle" font-weight="400">复用 SAE 控制面拆分</text>
<line x1="416.0" y1="159" x2="434.0" y2="159" stroke="#64748b" stroke-width="3" marker-end="url(#ab)"/>
<rect x="438.0" y="130" width="372" height="660" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
<rect x="438.0" y="130" width="372" height="58" rx="14" fill="#16a34a"/>
<rect x="438.0" y="172" width="372" height="16" fill="#16a34a"/>
<text x="624.0" y="168.0" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="700">P1 补强隔离</text>
<text x="456.0" y="228.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">隔离做成可插拔 RuntimeClass：</text>
<text x="456.0" y="258.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">gVisor / Kata 复用生态、改动小；</text>
<text x="456.0" y="288.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">跑不可信任意代码评估 Firecracker</text>
<text x="456.0" y="318.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">microVM。</text>
<rect x="452.0" y="560" width="344" height="96" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.4" stroke-dasharray="5,4"/>
<text x="624.0" y="586.0" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="700">出口标准</text>
<text x="624.0" y="610.0" font-size="17" fill="#374151" text-anchor="middle" font-weight="400">高危落强隔离，可灰度、可回退到普通容</text>
<text x="624.0" y="633.0" font-size="17" fill="#374151" text-anchor="middle" font-weight="400">器</text>
<rect x="452.0" y="698" width="344" height="76" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
<text x="624.0" y="726.0" font-size="16" fill="#15803d" text-anchor="middle" font-weight="700">真实经验平移</text>
<text x="624.0" y="752.0" font-size="18" fill="#374151" text-anchor="middle" font-weight="400">复用 SAI 多云 Runtime 抽象</text>
<line x1="812.0" y1="159" x2="830.0" y2="159" stroke="#64748b" stroke-width="3" marker-end="url(#ab)"/>
<rect x="834.0" y="130" width="372" height="660" rx="14" fill="#fffbeb" stroke="#ca8a04" stroke-width="2.5"/>
<rect x="834.0" y="130" width="372" height="58" rx="14" fill="#ca8a04"/>
<rect x="834.0" y="172" width="372" height="16" fill="#ca8a04"/>
<text x="1020.0" y="168.0" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="700">P2 冷启动提速</text>
<text x="852.0" y="228.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">镜像预热 + Lazy</text>
<text x="852.0" y="258.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">Pull（nydus/stargz）→ Pool →</text>
<text x="852.0" y="288.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">Snapshot，按瓶颈分层组合，不全上</text>
<text x="852.0" y="318.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">。</text>
<rect x="848.0" y="560" width="344" height="96" rx="8" fill="#ffffff" stroke="#ca8a04" stroke-width="1.4" stroke-dasharray="5,4"/>
<text x="1020.0" y="586.0" font-size="16" fill="#ca8a04" text-anchor="middle" font-weight="700">出口标准</text>
<text x="1020.0" y="610.0" font-size="17" fill="#374151" text-anchor="middle" font-weight="400">常用运行环境冷启动达成目标 SLO</text>
<rect x="848.0" y="698" width="344" height="76" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
<text x="1020.0" y="726.0" font-size="16" fill="#15803d" text-anchor="middle" font-weight="700">真实经验平移</text>
<text x="1020.0" y="752.0" font-size="18" fill="#374151" text-anchor="middle" font-weight="400">复用 SAE 镜像分发链路</text>
<line x1="1208.0" y1="159" x2="1226.0" y2="159" stroke="#64748b" stroke-width="3" marker-end="url(#ab)"/>
<rect x="1230.0" y="130" width="372" height="660" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
<rect x="1230.0" y="130" width="372" height="58" rx="14" fill="#dc2626"/>
<rect x="1230.0" y="172" width="372" height="16" fill="#dc2626"/>
<text x="1416.0" y="168.0" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="700">P3 治理+安全+硬化</text>
<text x="1248.0" y="228.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">Quota / FairShare / 快速回收 / 计</text>
<text x="1248.0" y="258.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">费；出站白名单、禁特权、seccomp</text>
<text x="1248.0" y="288.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">、密钥隔离；控制面扛涌浪、状态对</text>
<text x="1248.0" y="318.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">账防泄漏；生命周期 Event 状态机 +</text>
<text x="1248.0" y="348.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">可解释回写。</text>
<rect x="1244.0" y="560" width="344" height="96" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="5,4"/>
<text x="1416.0" y="586.0" font-size="16" fill="#dc2626" text-anchor="middle" font-weight="700">出口标准</text>
<text x="1416.0" y="610.0" font-size="17" fill="#374151" text-anchor="middle" font-weight="400">单租户不拖垮全局，无泄漏，控制面不雪</text>
<text x="1416.0" y="633.0" font-size="17" fill="#374151" text-anchor="middle" font-weight="400">崩</text>
<rect x="1244.0" y="698" width="344" height="76" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
<text x="1416.0" y="726.0" font-size="16" fill="#15803d" text-anchor="middle" font-weight="700">真实经验平移</text>
<text x="1416.0" y="752.0" font-size="18" fill="#374151" text-anchor="middle" font-weight="400">复用 Bigeyes Event 状态机</text>
<line x1="1604.0" y1="159" x2="1622.0" y2="159" stroke="#64748b" stroke-width="3" marker-end="url(#ab)"/>
<rect x="1626.0" y="130" width="372" height="660" rx="14" fill="#faf5ff" stroke="#9333ea" stroke-width="2.5"/>
<rect x="1626.0" y="130" width="372" height="58" rx="14" fill="#9333ea"/>
<rect x="1626.0" y="172" width="372" height="16" fill="#9333ea"/>
<text x="1812.0" y="168.0" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="700">P4 会话+自治</text>
<text x="1644.0" y="228.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">Sleep / Resume 会话语义；Agent</text>
<text x="1644.0" y="258.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">自主编排「创建→快照→唤醒→销毁」</text>
<text x="1644.0" y="288.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">，但动作受控（权限/审计/配额/边</text>
<text x="1644.0" y="318.0" font-size="20" fill="#374151" text-anchor="start" font-weight="400">界不丢）。</text>
<rect x="1640.0" y="560" width="344" height="96" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="1.4" stroke-dasharray="5,4"/>
<text x="1812.0" y="586.0" font-size="16" fill="#9333ea" text-anchor="middle" font-weight="700">出口标准</text>
<text x="1812.0" y="610.0" font-size="17" fill="#374151" text-anchor="middle" font-weight="400">多轮会话保状态防残留，自治受控有配额</text>
<text x="1812.0" y="633.0" font-size="17" fill="#374151" text-anchor="middle" font-weight="400">兜底</text>
<rect x="1640.0" y="698" width="344" height="76" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
<text x="1812.0" y="726.0" font-size="16" fill="#15803d" text-anchor="middle" font-weight="700">真实经验平移</text>
<text x="1812.0" y="752.0" font-size="18" fill="#374151" text-anchor="middle" font-weight="400">复用受控自治理念</text>
<text x="1020.0" y="836.0" font-size="19" fill="#4b5563" text-anchor="middle" font-weight="400">现状盘点：moss-compose / soulclaw = 编排+大脑，Hermes = 现在的「手」（普通容器）；缺 强隔离 / 秒级生命周期 / 会话语义 / 多租户治理 / 可观测</text>
<rect x="400.0" y="862" width="1240" height="84" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="1.6"/>
<text x="1020.0" y="896.0" font-size="20" fill="#334155" text-anchor="middle" font-weight="700">核心判断：不要一上来全套 Firecracker；先复用 K8s 生态再谈自建</text>
<text x="1020.0" y="924.0" font-size="17" fill="#6b7280" text-anchor="middle" font-weight="400">把 sandbox 当一种特殊 Runtime 平台来建 —— 隔离运行时是对标知识，平台工程是真实经验</text>
</svg>