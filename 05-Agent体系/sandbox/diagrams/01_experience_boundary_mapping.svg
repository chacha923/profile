  <text x="810" y="410" font-size="13" fill="#374151" text-anchor="middle" font-weight="600">Sandbox Pool</text>
  <text x="810" y="432" font-size="11" fill="#6b7280" text-anchor="middle" font-weight="400">预热池</text>
  <rect x="680" y="465" width="260" height="70" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="810" y="495" font-size="13" fill="#374151" text-anchor="middle" font-weight="600">Snapshot / Restore</text>
  <text x="810" y="517" font-size="11" fill="#6b7280" text-anchor="middle" font-weight="400">秒级恢复</text>
