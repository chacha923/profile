  <line x1="604" y1="326" x2="656" y2="326" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>
  <line x1="50" y1="588" x2="84" y2="588" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="92" y="592" font-size="12" fill="#6b7280" text-anchor="start" font-weight="400">真实生产经验（可平移）</text>
  <line x1="320" y1="588" x2="354" y2="588" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>
  <text x="362" y="592" font-size="12" fill="#6b7280" text-anchor="start" font-weight="400">理论对标（无实操）</text>
