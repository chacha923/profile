  <text x="500" y="296" font-size="13" fill="#111827" text-anchor="middle" font-weight="600">同一类工程问题</text>
  <text x="500" y="320" font-size="11" fill="#6b7280" text-anchor="middle" font-weight="400">生命周期 / 状态同步</text>
  <text x="500" y="340" font-size="11" fill="#6b7280" text-anchor="middle" font-weight="400">调度 / Event 治理</text>
  <text x="500" y="366" font-size="12" fill="#15803d" text-anchor="middle" font-weight="600">→ 可迁移理解</text>
