<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 830" width="1460" height="830">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="1460" height="830" fill="#ffffff"/>
<text x="70" y="56" fill="#111827" font-size="34" font-weight="700" text-anchor="start">自定义 Scheduler 插件开发与 Pending 排障路径</text>
<text x="70" y="90" fill="#6b7280" font-size="21" font-weight="400" text-anchor="start">适合本地开发第一天使用：先确认插件是否被加载，再确认是否影响了调度决策，最后看版本/RBAC/回滚。</text>
<rect x="80" y="150" width="280" height="175" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
<text x="102" y="184" fill="#111827" font-size="24" font-weight="700" text-anchor="start">Pod schedulerName</text>
<text x="102" y="218" fill="#374151" font-size="19" font-weight="400" text-anchor="start">不指定时走</text>
<text x="102" y="246" fill="#374151" font-size="19" font-weight="400" text-anchor="start">default-scheduler</text>
<text x="102" y="274" fill="#374151" font-size="19" font-weight="400" text-anchor="start">多 profile 看</text>
<text x="102" y="302" fill="#374151" font-size="19" font-weight="400" text-anchor="start">profile.schedulerName</text>
<rect x="420" y="150" width="280" height="175" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
<text x="442" y="184" fill="#111827" font-size="24" font-weight="700" text-anchor="start">scheduler 是否运行</text>
<text x="442" y="218" fill="#374151" font-size="19" font-weight="400" text-anchor="start">kube-system Pod</text>
<text x="442" y="246" fill="#374151" font-size="19" font-weight="400" text-anchor="start">Running</text>
<text x="442" y="274" fill="#374151" font-size="19" font-weight="400" text-anchor="start">leader election /</text>
<text x="442" y="302" fill="#374151" font-size="19" font-weight="400" text-anchor="start">healthz 正常</text>
<rect x="760" y="150" width="280" height="175" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
<text x="782" y="184" fill="#111827" font-size="24" font-weight="700" text-anchor="start">配置启用插件</text>
<text x="782" y="218" fill="#374151" font-size="19" font-weight="400" text-anchor="start">plugins.score/filter.enabled</text>
<text x="782" y="246" fill="#374151" font-size="19" font-weight="400" text-anchor="start">pluginConfig.name</text>
<text x="782" y="274" fill="#374151" font-size="19" font-weight="400" text-anchor="start">与 Name() 一致</text>
<rect x="1100" y="150" width="280" height="175" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
<text x="1122" y="184" fill="#111827" font-size="24" font-weight="700" text-anchor="start">二进制注册插件</text>
<text x="1122" y="218" fill="#374151" font-size="19" font-weight="400" text-anchor="start">app.WithPlugin(Name,</text>
<text x="1122" y="246" fill="#374151" font-size="19" font-weight="400" text-anchor="start">New)</text>
<text x="1122" y="274" fill="#374151" font-size="19" font-weight="400" text-anchor="start">镜像是新构建版本</text>
<rect x="80" y="430" width="280" height="175" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
<text x="102" y="464" fill="#111827" font-size="24" font-weight="700" text-anchor="start">看 Pod Events</text>
<text x="102" y="498" fill="#374151" font-size="19" font-weight="400" text-anchor="start">FailedScheduling</text>
<text x="102" y="526" fill="#374151" font-size="19" font-weight="400" text-anchor="start">原因</text>
<text x="102" y="554" fill="#374151" font-size="19" font-weight="400" text-anchor="start">插件返回的 status</text>
<text x="102" y="582" fill="#374151" font-size="19" font-weight="400" text-anchor="start">message</text>
<rect x="420" y="430" width="280" height="175" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
<text x="442" y="464" fill="#111827" font-size="24" font-weight="700" text-anchor="start">看 scheduler 日志</text>
<text x="442" y="498" fill="#374151" font-size="19" font-weight="400" text-anchor="start">-v=4 起步</text>
<text x="442" y="526" fill="#374151" font-size="19" font-weight="400" text-anchor="start">确认 Score/Filter</text>
<text x="442" y="554" fill="#374151" font-size="19" font-weight="400" text-anchor="start">被调用</text>
<rect x="760" y="430" width="280" height="175" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
<text x="782" y="464" fill="#111827" font-size="24" font-weight="700" text-anchor="start">看权限与缓存</text>
<text x="782" y="498" fill="#374151" font-size="19" font-weight="400" text-anchor="start">system:kube-scheduler</text>
<text x="782" y="526" fill="#374151" font-size="19" font-weight="400" text-anchor="start">RBAC</text>
<text x="782" y="554" fill="#374151" font-size="19" font-weight="400" text-anchor="start">额外 CRD informer</text>
<text x="782" y="582" fill="#374151" font-size="19" font-weight="400" text-anchor="start">list/watch 权限</text>
<rect x="1100" y="430" width="280" height="175" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
<text x="1122" y="464" fill="#111827" font-size="24" font-weight="700" text-anchor="start">看版本与回滚</text>
<text x="1122" y="498" fill="#374151" font-size="19" font-weight="400" text-anchor="start">K8s minor 强绑定</text>
<text x="1122" y="526" fill="#374151" font-size="19" font-weight="400" text-anchor="start">保留</text>
<text x="1122" y="554" fill="#374151" font-size="19" font-weight="400" text-anchor="start">default-scheduler</text>
<text x="1122" y="582" fill="#374151" font-size="19" font-weight="400" text-anchor="start">/ 灰度 profile</text>
<path d="M 360,235 C 390.0,235 390.0,235 420,235" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<path d="M 700,235 C 730.0,235 730.0,235 760,235" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<path d="M 1040,235 C 1070.0,235 1070.0,235 1100,235" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<path d="M 1240,325 C 1240.0,325 1240.0,430 1240,430" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<path d="M 1100,520 C 1070.0,520 1070.0,520 1040,520" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<path d="M 760,520 C 730.0,520 730.0,520 700,520" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<path d="M 420,520 C 390.0,520 390.0,520 360,520" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="80" y="690" width="1300" height="95" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
<text x="110" y="733" fill="#15803d" font-size="25" font-weight="700" text-anchor="start">最小可回滚上线策略</text>
<text x="110" y="766" fill="#374151" font-size="21" font-weight="400" text-anchor="start">先作为第二 scheduler + 只让测试 namespace 的 Pod 指定 schedulerName；确认无误后再考虑替换默认 scheduler。</text>
</svg>
