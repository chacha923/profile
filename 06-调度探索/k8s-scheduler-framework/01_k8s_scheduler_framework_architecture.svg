<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1540 840" width="1540" height="840">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="1540" height="840" fill="#ffffff"/>
<text x="80" y="58" fill="#111827" font-size="34" font-weight="700" text-anchor="start">Kubernetes Scheduler Framework 二开接入架构</text>
<text x="80" y="92" fill="#6b7280" font-size="21" font-weight="400" text-anchor="start">图中区分：真实生产经验 = 平台/ACK/SAI 调度意图；理论对标对象 = 自定义 kube-scheduler 插件二开。</text>
<rect x="60" y="130" width="560" height="610" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="2" stroke-dasharray="10 7"/>
<text x="86" y="166" fill="#15803d" font-size="25" font-weight="700" text-anchor="start">真实生产经验：平台侧资源治理</text>
<rect x="105" y="205" width="445" height="130" rx="10" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
<text x="127" y="239" fill="#111827" font-size="24" font-weight="700" text-anchor="start">平台 / 控制面</text>
<text x="127" y="273" fill="#374151" font-size="19" font-weight="400" text-anchor="start">生成 PodSpec</text>
<text x="127" y="301" fill="#374151" font-size="19" font-weight="400" text-anchor="start">nodeSelector / tolerations /</text>
<text x="127" y="329" fill="#374151" font-size="19" font-weight="400" text-anchor="start">resources</text>
<text x="127" y="357" fill="#374151" font-size="19" font-weight="400" text-anchor="start">必要时指定 schedulerName</text>
<rect x="105" y="385" width="445" height="125" rx="10" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
<text x="127" y="419" fill="#111827" font-size="24" font-weight="700" text-anchor="start">Kubernetes API Server</text>
<text x="127" y="453" fill="#374151" font-size="19" font-weight="400" text-anchor="start">接收 Pod / ConfigMap / RBAC</text>
<text x="127" y="481" fill="#374151" font-size="19" font-weight="400" text-anchor="start">记录 Events 与 Binding</text>
<rect x="105" y="565" width="445" height="120" rx="10" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
<text x="127" y="599" fill="#111827" font-size="24" font-weight="700" text-anchor="start">业务 Pod / 训练任务</text>
<text x="127" y="633" fill="#374151" font-size="19" font-weight="400" text-anchor="start">真实落地经验：SAI/ACK 调度能力接入</text>
<text x="127" y="661" fill="#374151" font-size="19" font-weight="400" text-anchor="start">不是自建 Scheduler 生产经验</text>
<rect x="690" y="130" width="780" height="610" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
<text x="716" y="166" fill="#1d4ed8" font-size="25" font-weight="700" text-anchor="start">理论对标对象：Scheduler Framework 二开</text>
<rect x="730" y="205" width="285" height="150" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
<text x="752" y="239" fill="#111827" font-size="24" font-weight="700" text-anchor="start">自定义 scheduler</text>
<text x="752" y="273" fill="#374151" font-size="19" font-weight="400" text-anchor="start">复用</text>
<text x="752" y="301" fill="#374151" font-size="19" font-weight="400" text-anchor="start">kube-scheduler</text>
<text x="752" y="329" fill="#374151" font-size="19" font-weight="400" text-anchor="start">main</text>
<text x="752" y="357" fill="#374151" font-size="19" font-weight="400" text-anchor="start">app.WithPlugin 注</text>
<text x="752" y="385" fill="#374151" font-size="19" font-weight="400" text-anchor="start">册</text>
<text x="752" y="413" fill="#374151" font-size="19" font-weight="400" text-anchor="start">镜像版本绑定 K8s</text>
<text x="752" y="441" fill="#374151" font-size="19" font-weight="400" text-anchor="start">minor</text>
<rect x="1090" y="205" width="300" height="150" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
<text x="1112" y="239" fill="#111827" font-size="24" font-weight="700" text-anchor="start">Plugin Registry</text>
<text x="1112" y="273" fill="#374151" font-size="19" font-weight="400" text-anchor="start">Name + Factory</text>
<text x="1112" y="301" fill="#374151" font-size="19" font-weight="400" text-anchor="start">按 Profile 启用</text>
<text x="1112" y="329" fill="#374151" font-size="19" font-weight="400" text-anchor="start">args 解析</text>
<rect x="730" y="410" width="285" height="185" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
<text x="752" y="444" fill="#111827" font-size="24" font-weight="700" text-anchor="start">Extension Points</text>
<text x="752" y="478" fill="#374151" font-size="19" font-weight="400" text-anchor="start">PreFilter /</text>
<text x="752" y="506" fill="#374151" font-size="19" font-weight="400" text-anchor="start">Filter</text>
<text x="752" y="534" fill="#374151" font-size="19" font-weight="400" text-anchor="start">PreScore / Score</text>
<text x="752" y="562" fill="#374151" font-size="19" font-weight="400" text-anchor="start">Reserve / Permit</text>
<text x="752" y="590" fill="#374151" font-size="19" font-weight="400" text-anchor="start">PreBind / Bind</text>
<rect x="1090" y="410" width="300" height="185" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
<text x="1112" y="444" fill="#111827" font-size="24" font-weight="700" text-anchor="start">调度结果</text>
<text x="1112" y="478" fill="#374151" font-size="19" font-weight="400" text-anchor="start">Filter 决定能不能放</text>
<text x="1112" y="506" fill="#374151" font-size="19" font-weight="400" text-anchor="start">Score 决定更适合放哪</text>
<text x="1112" y="534" fill="#374151" font-size="19" font-weight="400" text-anchor="start">里</text>
<text x="1112" y="562" fill="#374151" font-size="19" font-weight="400" text-anchor="start">Bind 写入 nodeName</text>
<rect x="730" y="620" width="660" height="120" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="2"/>
<text x="752" y="654" fill="#92400e" font-size="24" font-weight="700" text-anchor="start">开发第一目标</text>
<text x="752" y="688" fill="#374151" font-size="19" font-weight="400" text-anchor="start">先写 Score/Filter 插件</text>
<text x="752" y="716" fill="#374151" font-size="19" font-weight="400" text-anchor="start">跑通本地 schedulerName + Event + 日志闭环</text>
<path d="M 550,270 C 640.0,270 640.0,270 730,270" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<text x="640.0" y="260.0" fill="#2563eb" font-size="18" font-weight="600" text-anchor="middle">PodSpec</text>
<path d="M 1015,280 C 1052.5,280 1052.5,280 1090,280" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<text x="1052.5" y="270.0" fill="#2563eb" font-size="18" font-weight="600" text-anchor="middle">注册</text>
<path d="M 873,355 C 873.0,355 873.0,410 873,410" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<path d="M 1015,500 C 1052.5,500 1052.5,500 1090,500" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<text x="1052.5" y="490.0" fill="#2563eb" font-size="18" font-weight="600" text-anchor="middle">候选节点</text>
<path d="M 1240,410 C 1240.0,410 1240.0,355 1240,355" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-green)"/>
<path d="M 730,500 C 640.0,500 640.0,448 550,448" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-green)"/>
<text x="640.0" y="464.0" fill="#16a34a" font-size="18" font-weight="600" text-anchor="middle">watch/cache</text>
<path d="M 1240,600 C 895.0,600 895.0,610 550,610" fill="none" stroke="#9333ea" stroke-width="3" marker-end="url(#arrow-purple)"/>
<text x="895.0" y="595.0" fill="#9333ea" font-size="18" font-weight="600" text-anchor="middle">bind / event</text>
</svg>
