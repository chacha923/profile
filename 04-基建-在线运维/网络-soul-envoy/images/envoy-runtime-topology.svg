    <text x="214" y="411" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">DP</text>
    <text class="label" x="238" y="412">envoy-default-eg</text>
    <text class="small" x="238" y="434">主 HTTP/HTTPS 数据面，34 副本</text>
    <text class="small" x="238" y="451">真正承接入口流量</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="555" y="382" width="260" height="80" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
    <circle cx="579" cy="406" r="14" fill="#ccfbf1" stroke="#5eead4" stroke-width="1"/>
    <text x="579" y="411" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">DP</text>
    <text class="label" x="603" y="412">envoy-soul-auth-rpc</text>
    <text class="small" x="603" y="434">RPC/Auth 数据面，2 副本</text>
    <text class="small" x="603" y="451">专用 Envoy 数据面</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="875" y="382" width="205" height="80" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="899" cy="406" r="14" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="899" y="411" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">T</text>
    <text class="label" x="923" y="412">envoy-test</text>
