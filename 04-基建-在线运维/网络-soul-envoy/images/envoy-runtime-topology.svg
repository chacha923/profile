    <text class="small" x="923" y="451">默认不算主链路</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="210" y="532" width="260" height="64" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <circle cx="234" cy="556" r="14" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="234" y="561" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">BE</text>
    <text class="label" x="258" y="562">业务后端 Service / Pod</text>
    <text class="small" x="258" y="584">HTTP/HTTPS upstream</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="555" y="532" width="260" height="64" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <circle cx="579" cy="556" r="14" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="579" y="561" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">BE</text>
    <text class="label" x="603" y="562">RPC/Auth 后端</text>
    <text class="small" x="603" y="584">Dubbo / Auth / 内部服务</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="850" y="532" width="280" height="64" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="874" cy="556" r="14" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="874" y="561" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">0</text>
    <text class="label" x="898" y="562">prod-soul-gateway-auth-server-dt</text>
    <text class="small" x="898" y="584">Auth 服务 0/0</text>
    <text class="small" x="898" y="601">当前不承接流量</text>
  </g>
  <line x1="280" y1="146" x2="295" y2="232" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <line x1="400" y1="146" x2="305" y2="232" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <line x1="610" y1="146" x2="810" y2="232" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <rect x="325.0" y="188" width="54" height="20" rx="5" fill="#fff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="352" y="202" text-anchor="middle">watch</text>
  <rect x="678.0" y="188" width="54" height="20" rx="5" fill="#fff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="705" y="202" text-anchor="middle">watch</text>
  <line x1="295" y1="304" x2="345" y2="382" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <rect x="293.0" y="334" width="54" height="20" rx="5" fill="#fff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="320" y="348" text-anchor="middle">xDS</text>
  <line x1="830" y1="304" x2="685" y2="382" stroke="#9333ea" stroke-width="2.4" marker-end="url(#arrow-purple)"/>
  <rect x="731.0" y="334" width="54" height="20" rx="5" fill="#fff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="758" y="348" text-anchor="middle">xDS</text>
  <line x1="162" y1="421" x2="190" y2="421" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <rect x="149.0" y="388" width="54" height="20" rx="5" fill="#fff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="176" y="402" text-anchor="middle">流量</text>
  <line x1="345" y1="462" x2="345" y2="532" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="307.0" y="490" width="76" height="20" rx="5" fill="#fff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="345" y="504" text-anchor="middle">upstream</text>
  <line x1="685" y1="462" x2="685" y2="532" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="647.0" y="490" width="76" height="20" rx="5" fill="#fff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="685" y="504" text-anchor="middle">upstream</text>
  <path d="M 977 462 C 982 500 970 515 990 532" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <rect x="978.0" y="491" width="54" height="20" rx="5" fill="#fff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="1005" y="505" text-anchor="middle">非主链路</text>
  <g transform="translate(58,690)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/><text class="tiny" x="44" y="4">主流量 / 主 xDS</text>
    <line x1="160" y1="0" x2="194" y2="0" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/><text class="tiny" x="204" y="4">RPC/Auth xDS</text>
    <line x1="340" y1="0" x2="374" y2="0" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/><text class="tiny" x="384" y="4">控制/监听</text>
    <line x1="500" y1="0" x2="534" y2="0" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/><text class="tiny" x="544" y="4">排查时默认排除</text>
  </g>
</svg>