<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .label { font-size: 15px; font-weight: 700; }
    .small { font-size: 12px; fill: #4b5563; }
    .tiny { font-size: 11px; fill: #6b7280; }
    .lane-title { font-size: 13px; font-weight: 700; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#111827" flood-opacity="0.10"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#ffffff"/>
  <text class="title" x="600" y="42" text-anchor="middle">Soul Envoy Gateway 运行拓扑</text>
  <text class="subtitle" x="600" y="66" text-anchor="middle">面试先讲清楚：控制面生成 xDS，数据面 Envoy 真正承接流量；主 HTTP/HTTPS 和 RPC/Auth 是两条链路。</text>
  <rect x="40" y="95" width="1120" height="92" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <text class="lane-title" x="60" y="119">配置资源</text>
  <rect x="40" y="205" width="1120" height="92" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <text class="lane-title" x="60" y="229">控制面</text>
  <rect x="40" y="350" width="1120" height="92" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <text class="lane-title" x="60" y="374">数据面</text>
  <rect x="40" y="505" width="1120" height="92" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <text class="lane-title" x="60" y="529">后端依赖</text>
  <g filter="url(#shadow)">
    <rect x="100" y="122" width="180" height="48" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="124" cy="146" r="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="124" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">G</text>
    <text class="label" x="148" y="152">Gateway / HTTPRoute</text>
    <text class="small" x="148" y="174">入口、域名、路由</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="310" y="122" width="180" height="48" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <circle cx="334" cy="146" r="14" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="334" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">S</text>
    <text class="label" x="358" y="152">Service / EndpointSlice</text>
    <text class="small" x="358" y="174">后端实例与端口</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="122" width="180" height="48" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
    <circle cx="544" cy="146" r="14" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="544" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">R</text>
    <text class="label" x="568" y="152">Http2Rpc / Auth 配置</text>
    <text class="small" x="568" y="174">RPC 转码与鉴权</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="170" y="232" width="250" height="72" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="194" cy="256" r="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="194" y="261" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">CP</text>
    <text class="label" x="218" y="262">envoy-gateway</text>
    <text class="small" x="218" y="284">主控制面，2 副本</text>
    <text class="small" x="218" y="301">watch 配置并下发 xDS</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="690" y="232" width="280" height="72" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
    <circle cx="714" cy="256" r="14" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="714" y="261" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">CP</text>
    <text class="label" x="738" y="262">prod-envoy-gateway-rpc</text>
    <text class="small" x="738" y="284">RPC/Auth 控制面</text>
    <text class="small" x="738" y="301">对应 envoy-gateway-rpc 模式</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="390" width="92" height="62" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <circle cx="94" cy="414" r="14" fill="#fed7aa" stroke="#fdba74" stroke-width="1"/>
    <text x="94" y="419" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">U</text>
