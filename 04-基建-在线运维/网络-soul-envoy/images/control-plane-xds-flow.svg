  <line x1="490" y1="174" x2="540" y2="174" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="481.0" y="142" width="68" height="20" rx="5" fill="#ffffff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="515" y="156" text-anchor="middle">enqueue</text>
  <line x1="730" y1="174" x2="780" y2="174" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="713.0" y="142" width="84" height="20" rx="5" fill="#ffffff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="755" y="156" text-anchor="middle">translate</text>
  <path d="M 875 218 L 875 260 L 635 260 L 635 320" fill="none" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="725.0" y="238" width="60" height="20" rx="5" fill="#ffffff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="755" y="252" text-anchor="middle">xDS 资源</text>
  <line x1="730" y1="365" x2="780" y2="365" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="728.0" y="333" width="54" height="20" rx="5" fill="#ffffff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="755" y="347" text-anchor="middle">store</text>
  <path d="M 970 365 L 1005 365 L 1005 380 L 1055 380" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="981.0" y="333" width="54" height="20" rx="5" fill="#ffffff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="1008" y="347" text-anchor="middle">ADS</text>
  <path d="M 635 410 L 635 455 L 1075 455 L 1075 380" fill="none" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)" stroke-dasharray="5 4"/>
  <rect x="823.0" y="433" width="54" height="20" rx="5" fill="#ffffff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="850" y="447" text-anchor="middle">push</text>
  <path d="M 635 218 L 635 275 L 395 275 L 395 320" fill="none" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)" stroke-dasharray="5 4"/>
  <rect x="477.0" y="253" width="76" height="20" rx="5" fill="#ffffff" opacity="0.96" stroke="#e5e7eb"/>
  <text class="tiny" x="515" y="267" text-anchor="middle">创建/更新数据面</text>
  <line x1="155" y1="218" x2="155" y2="510" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <line x1="395" y1="410" x2="395" y2="510" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <line x1="635" y1="410" x2="635" y2="510" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <line x1="875" y1="410" x2="875" y2="510" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <line x1="1055" y1="380" x2="1055" y2="510" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow-gray)" stroke-dasharray="5 4"/>
  <g transform="translate(58,650)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/><text class="tiny" x="44" y="4">控制触发</text>
    <line x1="130" y1="0" x2="164" y2="0" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/><text class="tiny" x="174" y="4">配置翻译</text>
    <line x1="270" y1="0" x2="304" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/><text class="tiny" x="314" y="4">xDS 下发</text>
    <line x1="410" y1="0" x2="444" y2="0" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow-green)"/><text class="tiny" x="454" y="4">增量推送</text>
  </g>
</svg>