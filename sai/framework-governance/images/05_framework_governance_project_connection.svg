<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 720" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1480" height="720" fill="#f8fafc"/>
<text x="40" y="52" fill="#0f172a" font-size="24" font-weight="700">平台侧治理面与三框架的安全连接（措辞分层）</text>
<rect x="540" y="300" width="400" height="120" rx="14" fill="#1e293b" stroke="#1e293b" stroke-width="2"/>
<text x="740" y="340.0" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">PaaS 作业治理面</text>
<text x="740" y="366.0" text-anchor="middle" fill="#fff" font-size="16" font-weight="400">统一提交·gang·quota·状态机·TTL</text>
<text x="740" y="392.0" text-anchor="middle" fill="#fff" font-size="16" font-weight="400">(不是统一/联邦调度器)</text>
<rect x="40" y="140" width="420" height="130" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
<text x="250" y="181.0" text-anchor="middle" fill="#334155" font-size="17" font-weight="700">TFJob  ·  实践型</text>
<text x="250" y="211.0" text-anchor="middle" fill="#334155" font-size="16" font-weight="400">主力承接 + 潮汐/待退调度</text>
<text x="250" y="241.0" text-anchor="middle" fill="#334155" font-size="16" font-weight="400">静态·画像清晰·可重试·回退成本低</text>
<defs><marker id="ah2563eb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker></defs>
<path d="M 462,205 L 540,360" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#ah2563eb)"/>
<rect x="40" y="330" width="420" height="130" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
<text x="250" y="371.0" text-anchor="middle" fill="#334155" font-size="17" font-weight="700">PyTorchJob  ·  了解型</text>
<text x="250" y="401.0" text-anchor="middle" fill="#334155" font-size="16" font-weight="400">数字分身多模态承接在平台</text>
<text x="250" y="431.0" text-anchor="middle" fill="#334155" font-size="16" font-weight="400">懂治理差异·不深 NCCL/rendezvous</text>
<defs><marker id="ahdc2626" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<path d="M 462,395 L 540,360" stroke="#dc2626" stroke-width="2.4" fill="none" marker-end="url(#ahdc2626)"/>
<rect x="40" y="520" width="420" height="130" rx="12" fill="#ffffff" stroke="#059669" stroke-width="2"/>
<text x="250" y="561.0" text-anchor="middle" fill="#334155" font-size="17" font-weight="700">Ray  ·  对标型</text>
<text x="250" y="591.0" text-anchor="middle" fill="#334155" font-size="16" font-weight="400">少量负载</text>
<text x="250" y="621.0" text-anchor="middle" fill="#334155" font-size="16" font-weight="400">懂双层调度/Head 单点·未大规模运维</text>
<defs><marker id="ah059669" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#059669"/></marker></defs>
<path d="M 462,585 L 540,360" stroke="#059669" stroke-width="2.4" fill="none" marker-end="url(#ah059669)"/>
<rect x="980" y="260" width="460" height="200" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
<text x="1010" y="300" fill="#0f172a" font-size="17" font-weight="700">措辞边界（不能说的话）</text>
<text x="1010" y="335" fill="#dc2626" font-size="15">× 不声称自研统一/联邦调度器</text>
<text x="1010" y="361" fill="#dc2626" font-size="15">× 不声称深度调优 NCCL</text>
<text x="1010" y="387" fill="#dc2626" font-size="15">× 不声称大规模生产运维 Ray</text>
<text x="1010" y="413" fill="#dc2626" font-size="15">× 不把数字分身训练说成我主导实现</text>
<text x="1010" y="439" fill="#059669" font-size="15">√ 我负责平台侧承接与治理差异</text>
</svg>