<text x="570" y="643.0" text-anchor="middle" fill="#fff" font-size="16" font-weight="400">Pod Running 但任务已死</text>
<rect x="736" y="524" width="464" height="94" rx="8" fill="#faf5ff" stroke="#ea580c" stroke-width="1.5"/>
<text x="748" y="548" fill="#ea580c" font-size="13" font-weight="700">假设</text>
<text x="748" y="570" fill="#334155" font-size="12.5">假设：只采了 Pod phase，没采框架内部信号</text>
<rect x="1216" y="524" width="464" height="94" rx="8" fill="#eff6ff" stroke="#ea580c" stroke-width="1.5"/>
<text x="1228" y="548" fill="#ea580c" font-size="13" font-weight="700">验证</text>
<text x="1228" y="570" fill="#334155" font-size="12.5">验证：PyTorch rank 退出码 / Ray </text>
<text x="1228" y="588" fill="#334155" font-size="12.5">job status / TFJob conditi</text>
<text x="1228" y="606" fill="#334155" font-size="12.5">on</text>
<rect x="736" y="630" width="464" height="94" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
<text x="748" y="654" fill="#ea580c" font-size="13" font-weight="700">判据</text>
<text x="748" y="676" fill="#334155" font-size="12.5">判据：框架内部信号与 Pod phase 不一致</text>
<rect x="1216" y="630" width="464" height="94" rx="8" fill="#ecfdf5" stroke="#ea580c" stroke-width="1.5"/>
<text x="1228" y="654" fill="#ea580c" font-size="13" font-weight="700">结论</text>
<text x="1228" y="676" fill="#334155" font-size="12.5">结论：完成判定接框架信号源，纠正统一状态机</text>
<defs><marker id="ah94a3b8" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
<path d="M 340,125 L 408,840" stroke="#94a3b8" stroke-width="2.0" fill="none" marker-end="url(#ah94a3b8)"/>
<rect x="420" y="740" width="300" height="200" rx="12" fill="#dc2626" stroke="#dc2626" stroke-width="2"/>
<text x="570" y="833.0" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">症状</text>
<text x="570" y="859.0" text-anchor="middle" fill="#fff" font-size="16" font-weight="400">反复失败抖动</text>
<rect x="736" y="740" width="464" height="94" rx="8" fill="#faf5ff" stroke="#dc2626" stroke-width="1.5"/>
<text x="748" y="764" fill="#dc2626" font-size="13" font-weight="700">假设</text>
<text x="748" y="786" fill="#334155" font-size="12.5">假设：无脑重试无退避；PyTorch 一 worke</text>
<text x="748" y="804" fill="#334155" font-size="12.5">r 反复挂触发整体重启；Ray Head 在不稳定节</text>
<text x="748" y="822" fill="#334155" font-size="12.5">点</text>
<rect x="1216" y="740" width="464" height="94" rx="8" fill="#eff6ff" stroke="#dc2626" stroke-width="1.5"/>
<text x="1228" y="764" fill="#dc2626" font-size="13" font-weight="700">验证</text>
<text x="1228" y="786" fill="#334155" font-size="12.5">验证：失败次数曲线 + 失败角色分布 + Head </text>
<text x="1228" y="804" fill="#334155" font-size="12.5">节点稳定性</text>
<rect x="736" y="846" width="464" height="94" rx="8" fill="#fff7ed" stroke="#dc2626" stroke-width="1.5"/>
<text x="748" y="870" fill="#dc2626" font-size="13" font-weight="700">判据</text>
<text x="748" y="892" fill="#334155" font-size="12.5">判据：失败是否集中在某角色/某节点</text>
<rect x="1216" y="846" width="464" height="94" rx="8" fill="#ecfdf5" stroke="#dc2626" stroke-width="1.5"/>
<text x="1228" y="870" fill="#dc2626" font-size="13" font-weight="700">结论</text>
<text x="1228" y="892" fill="#334155" font-size="12.5">结论：按失败粒度退避熔断；Head/PS 上稳定节点</text>
<text x="1228" y="910" fill="#334155" font-size="12.5">避待退/Spot</text>
