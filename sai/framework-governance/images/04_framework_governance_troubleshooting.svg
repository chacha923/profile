<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1720 980" font-family="-apple-system, PingFang SC, Microsoft YaHei, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1720" height="980" fill="#f8fafc"/>
<text x="40" y="52" fill="#0f172a" font-size="24" font-weight="700">三框架统一作业排障决策树</text>
<rect x="40" y="90" width="300" height="70" rx="12" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
<text x="190" y="120.0" text-anchor="middle" fill="#fff" font-size="19" font-weight="700">作业异常</text>
<text x="190" y="144.0" text-anchor="middle" fill="#fff" font-size="18" font-weight="400">先判：卡在哪一层？</text>
<defs><marker id="ah94a3b8" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
<path d="M 340,125 L 408,192" stroke="#94a3b8" stroke-width="2.0" fill="none" marker-end="url(#ah94a3b8)"/>
<rect x="420" y="92" width="300" height="200" rx="12" fill="#7c3aed" stroke="#7c3aed" stroke-width="2"/>
<text x="570" y="185.0" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">症状</text>
<text x="570" y="211.0" text-anchor="middle" fill="#fff" font-size="16" font-weight="400">一直 Pending/起不来</text>
<rect x="736" y="92" width="464" height="94" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="748" y="116" fill="#7c3aed" font-size="13" font-weight="700">假设</text>
<text x="748" y="138" fill="#334155" font-size="12.5">假设：gang 没满足 / 配额不足 / 拓扑约束太</text>
<text x="748" y="156" fill="#334155" font-size="12.5">严</text>
<rect x="1216" y="92" width="464" height="94" rx="8" fill="#eff6ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="1228" y="116" fill="#7c3aed" font-size="13" font-weight="700">验证</text>
<text x="1228" y="138" fill="#334155" font-size="12.5">验证：PodGroup 状态 + 未调度 Pod e</text>
<text x="1228" y="156" fill="#334155" font-size="12.5">vents + quota 余量</text>
<rect x="736" y="198" width="464" height="94" rx="8" fill="#fff7ed" stroke="#7c3aed" stroke-width="1.5"/>
<text x="748" y="222" fill="#7c3aed" font-size="13" font-weight="700">判据</text>
<text x="748" y="244" fill="#334155" font-size="12.5">判据：部分角色 Running、部分 Pending</text>
<text x="748" y="262" fill="#334155" font-size="12.5"> = gang 没生效</text>
<rect x="1216" y="198" width="464" height="94" rx="8" fill="#ecfdf5" stroke="#7c3aed" stroke-width="1.5"/>
<text x="1228" y="222" fill="#7c3aed" font-size="13" font-weight="700">结论</text>
<text x="1228" y="244" fill="#334155" font-size="12.5">结论：补 gang / 放宽硬约束；Ray 看 he</text>
<text x="1228" y="262" fill="#334155" font-size="12.5">ad+min worker</text>
<defs><marker id="ah94a3b8" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
<path d="M 340,125 L 408,408" stroke="#94a3b8" stroke-width="2.0" fill="none" marker-end="url(#ah94a3b8)"/>
<rect x="420" y="308" width="300" height="200" rx="12" fill="#2563eb" stroke="#2563eb" stroke-width="2"/>
<text x="570" y="401.0" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">症状</text>
<text x="570" y="427.0" text-anchor="middle" fill="#fff" font-size="16" font-weight="400">起来了但卡死不前进</text>
<rect x="736" y="308" width="464" height="94" rx="8" fill="#faf5ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="748" y="332" fill="#2563eb" font-size="13" font-weight="700">假设</text>
<text x="748" y="354" fill="#334155" font-size="12.5">假设：PyTorch 卡 rendezvous/NC</text>
<text x="748" y="372" fill="#334155" font-size="12.5">CL；TFJob 连不上 PS；Ray 注册不上 G</text>
<text x="748" y="390" fill="#334155" font-size="12.5">CS</text>
<rect x="1216" y="308" width="464" height="94" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="1228" y="332" fill="#2563eb" font-size="13" font-weight="700">验证</text>
<text x="1228" y="354" fill="#334155" font-size="12.5">验证：rank0/Master rendezvous</text>
<text x="1228" y="372" fill="#334155" font-size="12.5"> 等待 &amp; NCCL 超时；Worker→PS；Wo</text>
<text x="1228" y="390" fill="#334155" font-size="12.5">rker→GCS</text>
<rect x="736" y="414" width="464" height="94" rx="8" fill="#fff7ed" stroke="#2563eb" stroke-width="1.5"/>
<text x="748" y="438" fill="#2563eb" font-size="13" font-weight="700">判据</text>
<text x="748" y="460" fill="#334155" font-size="12.5">判据：卡在握手 ≠ 卡在计算（发现层 vs 计算层）</text>
<rect x="1216" y="414" width="464" height="94" rx="8" fill="#ecfdf5" stroke="#2563eb" stroke-width="1.5"/>
<text x="1228" y="438" fill="#2563eb" font-size="13" font-weight="700">结论</text>
<text x="1228" y="460" fill="#334155" font-size="12.5">结论：修发现层(后端可达·MASTER/head 先</text>
<text x="1228" y="478" fill="#334155" font-size="12.5">就绪)+拓扑亲和</text>
<defs><marker id="ah94a3b8" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
