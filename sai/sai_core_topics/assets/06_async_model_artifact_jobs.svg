<rect x="110" y="543" width="150" height="34" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" filter="url(#shadow)"/>
<text x="185.0" y="552.0" text-anchor="middle" class="label">状态查询</text>
<text x="185.0" y="573.0" text-anchor="middle" class="small">Job / Pod / DB</text>
<rect x="330" y="543" width="150" height="34" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" filter="url(#shadow)"/>
<text x="405.0" y="552.0" text-anchor="middle" class="label">日志排障</text>
<text x="405.0" y="573.0" text-anchor="middle" class="small">Pod log</text>
<rect x="550" y="543" width="150" height="34" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" filter="url(#shadow)"/>
<text x="625.0" y="552.0" text-anchor="middle" class="label">失败重试</text>
<text x="625.0" y="573.0" text-anchor="middle" class="small">删旧 Job / 重建</text>
<rect x="770" y="543" width="110" height="34" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" filter="url(#shadow)"/>
<text x="825.0" y="552.0" text-anchor="middle" class="label">不阻塞 API</text>
<text x="825.0" y="573.0" text-anchor="middle" class="small">短链路</text>
<path d="M820 304 V507 Q820 522 805 522 H185 V543" fill="none" stroke="#0f766e" stroke-width="2.2" marker-end="url(#arrow-teal)" stroke-dasharray="6 4"/>
<rect x="454" y="509" width="92" height="20" rx="10" fill="#ffffff" opacity="0.92"/>
<text x="500" y="524" text-anchor="middle" class="tiny">状态回写</text>
<line x1="26" y1="610" x2="56" y2="610" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<text x="64" y="614" class="tiny">请求编排</text>
<line x1="26" y1="628" x2="56" y2="628" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
<text x="64" y="632" class="tiny">Job 执行</text>
<line x1="26" y1="646" x2="56" y2="646" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
<text x="64" y="650" class="tiny">模型落盘</text>
<line x1="26" y1="664" x2="56" y2="664" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow-teal)"/>
<text x="64" y="668" class="tiny">观测重试</text>
</svg>