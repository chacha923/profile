<ellipse cx="185" cy="426" rx="72.5" ry="13" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<rect x="112.5" y="426" width="145" height="42" fill="#f0fdf4" stroke="none"/>
<line x1="112.5" y1="426" x2="112.5" y2="468" stroke="#bbf7d0" stroke-width="1.5"/>
<line x1="257.5" y1="426" x2="257.5" y2="468" stroke="#bbf7d0" stroke-width="1.5"/>
<ellipse cx="185" cy="468" rx="72.5" ry="13" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="185" y="449.0" text-anchor="middle" class="label">PVC / NAS</text>
<text x="185" y="467.0" text-anchor="middle" class="small">统一模型盘</text>
<rect x="395" y="416" width="160" height="48" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="475.0" y="432.0" text-anchor="middle" class="label">固定目录</text>
<text x="475.0" y="453.0" text-anchor="middle" class="small">workspace /</text>
<text x="475.0" y="467.0" text-anchor="middle" class="small">subPath</text>
<rect x="635" y="416" width="160" height="48" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="715.0" y="432.0" text-anchor="middle" class="label">训练 / 推理复用</text>
<text x="715.0" y="453.0" text-anchor="middle" class="small">TFJob / Serving</text>
<path d="M405 304 V375 Q405 390 390 390 H185 V426" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
<rect x="244" y="377" width="92" height="20" rx="10" fill="#ffffff" opacity="0.92"/>
<text x="290" y="392" text-anchor="middle" class="tiny">模型落盘</text>
<line x1="257" y1="445" x2="315" y2="445" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
<line x1="555" y1="440" x2="635" y2="440" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
<rect x="553.0" y="419.0" width="84" height="20" rx="10" fill="#ffffff" opacity="0.92"/>
<text x="595.0" y="434.0" text-anchor="middle" class="tiny">挂载</text>
<rect x="45" y="520" width="870" height="70" rx="10" fill="#f0fdfa" fill-opacity="0.45" stroke="#99f6e4" stroke-width="1.3" stroke-dasharray="7 5"/>
