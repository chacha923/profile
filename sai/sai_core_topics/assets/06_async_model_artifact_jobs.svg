<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="960" height="650">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
.title { font-size: 25px; font-weight: 700; fill: #111827; }
.subtitle { font-size: 13px; fill: #6b7280; }
.label { font-size: 14px; font-weight: 650; fill: #111827; }
.small { font-size: 12px; fill: #6b7280; }
.tiny { font-size: 11px; fill: #6b7280; }
.lane { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; }
</style>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ea580c"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
<marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0f766e"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6b7280"/></marker>
</defs>
<rect width="960" height="650" fill="#ffffff"/>
<text x="480.0" y="34" text-anchor="middle" class="title">长耗时任务异步化：模型下载与制品处理</text>
<text x="480.0" y="57" text-anchor="middle" class="subtitle">控制面只负责编排，Kubernetes Job 承接下载、落盘、日志和重试</text>
<rect x="45" y="85" width="870" height="78" rx="10" fill="#eff6ff" fill-opacity="0.45" stroke="#bfdbfe" stroke-width="1.3" stroke-dasharray="7 5"/>
<text x="59" y="107" class="lane" fill="#2563eb">REQUEST</text>
<rect x="85" y="110" width="150" height="42" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
<text x="160.0" y="123.0" text-anchor="middle" class="label">下载请求</text>
<text x="160.0" y="144.0" text-anchor="middle" class="small">HF / OSS / HTTP</text>
<rect x="305" y="110" width="150" height="42" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
<text x="380.0" y="123.0" text-anchor="middle" class="label">server</text>
<text x="380.0" y="144.0" text-anchor="middle" class="small">校验 / 任务记录</text>
<rect x="525" y="110" width="150" height="42" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="123.0" text-anchor="middle" class="label">model_job</text>
<text x="600.0" y="144.0" text-anchor="middle" class="small">状态 / 重试 / 错误</text>
<line x1="235" y1="131" x2="305" y2="131" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
<rect x="228.0" y="110.0" width="84" height="20" rx="10" fill="#ffffff" opacity="0.92"/>
<text x="270.0" y="125.0" text-anchor="middle" class="tiny">提交</text>
<line x1="455" y1="131" x2="525" y2="131" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
<rect x="448.0" y="110.0" width="84" height="20" rx="10" fill="#ffffff" opacity="0.92"/>
<text x="490.0" y="125.0" text-anchor="middle" class="tiny">落库</text>
<rect x="45" y="215" width="870" height="115" rx="10" fill="#fff7ed" fill-opacity="0.45" stroke="#fed7aa" stroke-width="1.3" stroke-dasharray="7 5"/>
<text x="59" y="237" class="lane" fill="#ea580c">KUBERNETES JOB RUNTIME</text>
<rect x="90" y="252" width="160" height="52" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="170.0" y="270.0" text-anchor="middle" class="label">batch/v1 Job</text>
<text x="170.0" y="291.0" text-anchor="middle" class="small">独立执行</text>
<rect x="325" y="252" width="160" height="52" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="405.0" y="270.0" text-anchor="middle" class="label">下载容器</text>
<text x="405.0" y="291.0" text-anchor="middle" class="small">hfd / aria2 / curl</text>
<rect x="560" y="252" width="160" height="52" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="640.0" y="270.0" text-anchor="middle" class="label">Pod 日志</text>
<text x="640.0" y="291.0" text-anchor="middle" class="small">进度 / 失败原因</text>
<rect x="765" y="252" width="110" height="52" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="820.0" y="270.0" text-anchor="middle" class="label">退出码</text>
<text x="820.0" y="291.0" text-anchor="middle" class="small">成功 / 失败</text>
<path d="M600 152 V200 Q600 215 585 215 H170 V252" fill="none" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
<rect x="334" y="202" width="92" height="20" rx="10" fill="#ffffff" opacity="0.92"/>
<text x="380" y="217" text-anchor="middle" class="tiny">创建 Job</text>
<line x1="250" y1="278" x2="325" y2="278" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
<line x1="485" y1="278" x2="560" y2="278" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
<line x1="720" y1="278" x2="765" y2="278" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
<rect x="45" y="390" width="870" height="88" rx="10" fill="#f0fdf4" fill-opacity="0.45" stroke="#bbf7d0" stroke-width="1.3" stroke-dasharray="7 5"/>
