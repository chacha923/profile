<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" width="1100" height="660">
<style>text{font-family:Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif}.title{font-size:28px;font-weight:700;fill:#111827}.sub{font-size:14px;fill:#6b7280}.h{font-size:16px;font-weight:700;fill:#111827}.s{font-size:12px;fill:#4b5563}</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker></defs>
<rect width="1100" height="660" fill="#ffffff"/>
<text x="550" y="42" text-anchor="middle" class="title">与 SAI 项目的安全连接</text>
<text x="550" y="68" text-anchor="middle" class="sub">不夸大成完整 LLM 平台，而是说明已有控制面如何演进</text>
<rect x="90" y="145" width="330" height="360" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
<text x="255" y="180" text-anchor="middle" class="h">SAI 已有基础</text>
<text x="130" y="225" class="s">训练任务托管</text>
<text x="130" y="260" class="s">资源规格 / 镜像 / 存储</text>
<text x="130" y="295" class="s">Provider / 多集群</text>
<text x="130" y="330" class="s">日志事件 / 生命周期</text>
<text x="130" y="365" class="s">模型产物管理</text>
<rect x="680" y="145" width="330" height="360" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
<text x="845" y="180" text-anchor="middle" class="h">LLM 演进能力</text>
<text x="720" y="225" class="s">LLMRuntimeProvider</text>
<text x="720" y="260" class="s">ModelCache / 节点缓存</text>
<text x="720" y="295" class="s">RuntimeReady / Warmup</text>
<text x="720" y="330" class="s">TTFT / TPOT / KV Cache</text>
<text x="720" y="365" class="s">LoRA / Tokenizer 版本治理</text>
<line x1="420" y1="325" x2="680" y2="325" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/>
<text x="550" y="302" text-anchor="middle" class="h">演进，不是推倒重来</text>
<rect x="295" y="555" width="510" height="50" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
<text x="550" y="585" text-anchor="middle" class="h">安全表达：控制面经验可复用，LLM 生产能力需要补齐</text>
</svg>
