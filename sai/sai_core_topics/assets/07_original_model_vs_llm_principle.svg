<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" width="1100" height="680">
<style>
text { font-family: Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
.title { font-size: 28px; font-weight: 700; fill: #111827; }
.sub { font-size: 14px; fill: #6b7280; }
.h { font-size: 17px; font-weight: 700; fill: #111827; }
.s { font-size: 13px; fill: #4b5563; }
.lane { font-size: 13px; font-weight: 700; fill: #374151; }
</style>
<defs>
<marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
</defs>
<rect width="1100" height="680" fill="#ffffff"/>
<text x="550" y="40" text-anchor="middle" class="title">传统模型平台到 LLM 平台的差异</text>
<text x="550" y="66" text-anchor="middle" class="sub">控制面能力可复用，推理 Runtime、资源模型和观测体系必须扩展</text>
<rect x="55" y="105" width="455" height="520" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
<rect x="590" y="105" width="455" height="520" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
<text x="282" y="140" text-anchor="middle" class="lane">传统搜广推模型</text>
<text x="818" y="140" text-anchor="middle" class="lane">LLM 模型服务</text>
<g>
<rect x="95" y="175" width="375" height="68" rx="10" fill="#ffffff" stroke="#dbeafe"/>
<text x="125" y="202" class="h">业务链路</text><text x="125" y="226" class="s">召回 / 粗排 / 精排服务内嵌模型或索引</text>
<rect x="95" y="270" width="375" height="68" rx="10" fill="#ffffff" stroke="#dbeafe"/>
<text x="125" y="297" class="h">模型产物</text><text x="125" y="321" class="s">模型文件 / embedding / FAISS / 特征配置</text>
<rect x="95" y="365" width="375" height="68" rx="10" fill="#ffffff" stroke="#dbeafe"/>
<text x="125" y="392" class="h">Runtime</text><text x="125" y="416" class="s">业务服务加载模型，一次 forward 或检索</text>
<rect x="95" y="460" width="375" height="68" rx="10" fill="#ffffff" stroke="#dbeafe"/>
<text x="125" y="487" class="h">资源与观测</text><text x="125" y="511" class="s">QPS / P99 / CPU / 特征读取 / 索引耗时</text>
</g>
<g>
<rect x="630" y="175" width="375" height="68" rx="10" fill="#ffffff" stroke="#dcfce7"/>
<text x="660" y="202" class="h">业务链路</text><text x="660" y="226" class="s">Gateway / OpenAI API / Agent / RAG</text>
<rect x="630" y="270" width="375" height="68" rx="10" fill="#ffffff" stroke="#dcfce7"/>
<text x="660" y="297" class="h">模型产物</text><text x="660" y="321" class="s">Base model / Tokenizer / LoRA / Template</text>
<rect x="630" y="365" width="375" height="68" rx="10" fill="#ffffff" stroke="#dcfce7"/>
<text x="660" y="392" class="h">Runtime</text><text x="660" y="416" class="s">vLLM / TGI / KV Cache / Streaming / Batching</text>
<rect x="630" y="460" width="375" height="68" rx="10" fill="#ffffff" stroke="#dcfce7"/>
<text x="660" y="487" class="h">资源与观测</text><text x="660" y="511" class="s">显存 / TTFT / TPOT / tokens/s / queue wait</text>
</g>
<line x1="510" y1="350" x2="590" y2="350" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
<text x="550" y="335" text-anchor="middle" class="sub">平台演进</text>
<rect x="310" y="575" width="480" height="42" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
<text x="550" y="601" text-anchor="middle" class="h">复用控制面：资源、生命周期、Provider、日志事件、模型产物</text>
</svg>
