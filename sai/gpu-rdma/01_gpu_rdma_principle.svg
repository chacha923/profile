<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" font-family="Helvetica, Arial, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">GPU RDMA 原理模型</text>
  <text x="480" y="64" text-anchor="middle" font-size="13" fill="#6b7280">应用层 - 通信层 - 硬件层 - 网络层 - 远端显存</text>

  <rect x="40" y="100" width="880" height="110" rx="10" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="60" y="126" font-size="13" font-weight="700" fill="#6d28d9">应用 / 框架层</text>
  <rect x="70" y="140" width="180" height="48" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="160" y="169" text-anchor="middle" font-size="13" fill="#111827">PyTorch DDP</text>
  <rect x="280" y="140" width="180" height="48" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="370" y="169" text-anchor="middle" font-size="13" fill="#111827">NCCL AllReduce</text>
  <rect x="490" y="140" width="180" height="48" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="580" y="169" text-anchor="middle" font-size="13" fill="#111827">推理 KV 同步</text>
  <rect x="700" y="140" width="180" height="48" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="790" y="169" text-anchor="middle" font-size="13" fill="#111827">参数分发/聚合</text>

  <rect x="40" y="230" width="880" height="120" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="60" y="256" font-size="13" font-weight="700" fill="#1d4ed8">RDMA / CUDA 通信层</text>
  <rect x="90" y="274" width="220" height="54" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="200" y="304" text-anchor="middle" font-size="13" fill="#111827">libibverbs / QP / CQ</text>
  <rect x="370" y="274" width="220" height="54" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="480" y="304" text-anchor="middle" font-size="13" fill="#111827">nvidia-peermem / MR</text>
  <rect x="650" y="274" width="220" height="54" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="760" y="304" text-anchor="middle" font-size="13" fill="#111827">NCCL NET/IB 传输</text>

  <rect x="40" y="370" width="880" height="150" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="60" y="396" font-size="13" font-weight="700" fill="#15803d">硬件与网络层</text>

  <rect x="80" y="410" width="170" height="54" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="165" y="441" text-anchor="middle" font-size="13" fill="#111827">GPU HBM</text>
  <rect x="300" y="410" width="170" height="54" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="385" y="441" text-anchor="middle" font-size="13" fill="#111827">RNIC A</text>
  <rect x="520" y="410" width="170" height="54" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="605" y="441" text-anchor="middle" font-size="13" fill="#111827">InfiniBand / RoCE</text>
  <rect x="740" y="410" width="140" height="54" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="810" y="441" text-anchor="middle" font-size="13" fill="#111827">远端 GPU</text>

  <path d="M250 437 L300 437" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M470 437 L520 437" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M690 437 L740 437" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="385" y="430" text-anchor="middle" font-size="11" fill="#166534">GPUDirect DMA</text>
  <text x="605" y="430" text-anchor="middle" font-size="11" fill="#166534">RDMA Write/Read</text>

  <path d="M370 188 L370 274" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M580 188 L580 274" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M480 328 L480 410" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="392" y="236" font-size="11" fill="#1d4ed8">集合通信请求</text>
  <text x="505" y="370" font-size="11" fill="#6d28d9">内存注册 + 传输路径选择</text>

  <rect x="40" y="542" width="880" height="54" rx="8" fill="#fafafa" stroke="#e5e7eb"/>
  <text x="60" y="565" font-size="12" fill="#374151">核心链路：应用发起 AllReduce - NCCL 选择 NET/IB - RNIC 直接访问 GPU 显存 - 数据经 RDMA 网络写入远端 GPU</text>
  <text x="60" y="584" font-size="12" fill="#374151">排障关注：peermem 模块、GPU-NIC 拓扑（PIX/PXB/SYS）、NCCL 是否回退 Socket</text>
</svg>