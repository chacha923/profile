<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <rect width="1400" height="860" fill="#f6f8fb"/>
  <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17202a">训推混部原理模型</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="18" fill="#52616f">推理 SLA 是边界，训练是可回收的机会负载</text>

  <rect x="70" y="160" width="360" height="190" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="3"/>
  <text x="105" y="210" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f4e79">推理保底池</text>
  <text x="105" y="252" font-family="Arial, sans-serif" font-size="20" fill="#273746">核心推理服务</text>
  <text x="105" y="286" font-family="Arial, sans-serif" font-size="20" fill="#273746">高 PriorityClass</text>
  <text x="105" y="320" font-family="Arial, sans-serif" font-size="20" fill="#273746">默认拒绝训练</text>

  <rect x="520" y="160" width="360" height="190" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="3"/>
  <text x="555" y="210" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1b5e20">混部机会池</text>
  <text x="555" y="252" font-family="Arial, sans-serif" font-size="20" fill="#273746">低水位放行训练</text>
  <text x="555" y="286" font-family="Arial, sans-serif" font-size="20" fill="#273746">高水位快速回收</text>
  <text x="555" y="320" font-family="Arial, sans-serif" font-size="20" fill="#273746">同节点不同卡优先</text>

  <rect x="970" y="160" width="360" height="190" rx="8" fill="#ffffff" stroke="#8e44ad" stroke-width="3"/>
  <text x="1005" y="210" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#6c3483">训练回退池</text>
  <text x="1005" y="252" font-family="Arial, sans-serif" font-size="20" fill="#273746">承接被抢占训练</text>
  <text x="1005" y="286" font-family="Arial, sans-serif" font-size="20" fill="#273746">队列恢复与重试</text>
  <text x="1005" y="320" font-family="Arial, sans-serif" font-size="20" fill="#273746">避免任务丢进度</text>

  <rect x="250" y="470" width="900" height="260" rx="8" fill="#ffffff" stroke="#566573" stroke-width="3"/>
  <text x="295" y="525" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#2c3e50">混部控制面</text>

  <rect x="310" y="575" width="220" height="90" rx="8" fill="#eef5ff" stroke="#2f80ed" stroke-width="2"/>
  <text x="345" y="626" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f4e79">任务画像</text>
  <text x="345" y="655" font-family="Arial, sans-serif" font-size="16" fill="#273746">checkpoint / retry</text>

  <rect x="590" y="575" width="220" height="90" rx="8" fill="#f1f8e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="625" y="626" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1b5e20">水位控制</text>
  <text x="625" y="655" font-family="Arial, sans-serif" font-size="16" fill="#273746">P99 / 队列 / 错误率</text>

  <rect x="870" y="575" width="220" height="90" rx="8" fill="#f7eef9" stroke="#8e44ad" stroke-width="2"/>
  <text x="905" y="626" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#6c3483">抢占恢复</text>
  <text x="905" y="655" font-family="Arial, sans-serif" font-size="16" fill="#273746">回收 / 回退 / 熔断</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52616f"/>
    </marker>
  </defs>
  <line x1="430" y1="255" x2="520" y2="255" stroke="#52616f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="880" y1="255" x2="970" y2="255" stroke="#52616f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="470" x2="700" y2="365" stroke="#52616f" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="590" y="405" font-family="Arial, sans-serif" font-size="18" fill="#52616f">动态调整可借用配额</text>
</svg>
