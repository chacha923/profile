<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <rect width="1400" height="760" fill="#f7f9fc"/>
  <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17202a">训推混部排障路径</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="18" fill="#52616f">不要只列命令，要按症状、假设、验证、指标、结论、优化、复测推进</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#34495e"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="240" width="150" height="95" rx="8" fill="#ffffff" stroke="#c0392b" stroke-width="3"/>
    <text x="110" y="296" font-size="24" font-weight="700" fill="#922b21">症状</text>
    <text x="92" y="324" font-size="15" fill="#273746">P99 上升</text>

    <rect x="260" y="240" width="150" height="95" rx="8" fill="#ffffff" stroke="#f39c12" stroke-width="3"/>
    <text x="300" y="296" font-size="24" font-weight="700" fill="#8a5a00">假设</text>
    <text x="282" y="324" font-size="15" fill="#273746">资源争用</text>

    <rect x="450" y="240" width="150" height="95" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="3"/>
    <text x="490" y="296" font-size="24" font-weight="700" fill="#1f4e79">验证</text>
    <text x="472" y="324" font-size="15" fill="#273746">共址与事件</text>

    <rect x="640" y="240" width="150" height="95" rx="8" fill="#ffffff" stroke="#566573" stroke-width="3"/>
    <text x="680" y="296" font-size="24" font-weight="700" fill="#2c3e50">指标</text>
    <text x="662" y="324" font-size="15" fill="#273746">GPU/CPU/IO</text>

    <rect x="830" y="240" width="150" height="95" rx="8" fill="#ffffff" stroke="#8e44ad" stroke-width="3"/>
    <text x="870" y="296" font-size="24" font-weight="700" fill="#6c3483">结论</text>
    <text x="852" y="324" font-size="15" fill="#273746">定位瓶颈</text>

    <rect x="1020" y="240" width="150" height="95" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="3"/>
    <text x="1060" y="296" font-size="24" font-weight="700" fill="#1b5e20">优化</text>
    <text x="1042" y="324" font-size="15" fill="#273746">降配额/熔断</text>

    <rect x="1210" y="240" width="150" height="95" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="3"/>
    <text x="1250" y="296" font-size="24" font-weight="700" fill="#1f4e79">复测</text>
    <text x="1232" y="324" font-size="15" fill="#273746">同窗口对比</text>
  </g>
  <line x1="220" y1="288" x2="260" y2="288" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="410" y1="288" x2="450" y2="288" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="288" x2="640" y2="288" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="790" y1="288" x2="830" y2="288" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="980" y1="288" x2="1020" y2="288" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1170" y1="288" x2="1210" y2="288" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="190" y="470" width="1020" height="120" rx="8" fill="#ffffff" stroke="#ccd6dd" stroke-width="2"/>
  <text x="230" y="520" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17202a">关键判断</text>
  <text x="230" y="555" font-family="Arial, sans-serif" font-size="18" fill="#273746">如果 GPU 不异常，继续看 CPU、IO、网络、镜像拉取和 checkpoint 成本</text>
</svg>
