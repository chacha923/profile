<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <rect width="1400" height="820" fill="#f6f8fb"/>
  <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17202a">训推混部与 SAI 项目的安全连接</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="18" fill="#52616f">把技术点连接到训练调度和资源池治理，不夸大成全量生产结果</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="90" y="210" width="260" height="150" rx="8" fill="#ffffff" stroke="#8e44ad" stroke-width="3"/>
  <text x="130" y="265" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#6c3483">SAI 训练调度</text>
  <text x="130" y="305" font-family="Arial, sans-serif" font-size="18" fill="#273746">TFJob 生命周期</text>
  <text x="130" y="335" font-family="Arial, sans-serif" font-size="18" fill="#273746">队列与恢复</text>

  <rect x="90" y="500" width="260" height="150" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="3"/>
  <text x="130" y="555" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f4e79">推理容量治理</text>
  <text x="130" y="595" font-family="Arial, sans-serif" font-size="18" fill="#273746">P99 / 队列</text>
  <text x="130" y="625" font-family="Arial, sans-serif" font-size="18" fill="#273746">保底容量</text>

  <rect x="560" y="330" width="280" height="170" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="3"/>
  <text x="600" y="390" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1b5e20">资源池治理</text>
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="18" fill="#273746">保底池 / 机会池</text>
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="18" fill="#273746">回退池 / 熔断</text>

  <rect x="1050" y="210" width="260" height="150" rx="8" fill="#ffffff" stroke="#566573" stroke-width="3"/>
  <text x="1090" y="265" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#2c3e50">安全表达</text>
  <text x="1090" y="305" font-family="Arial, sans-serif" font-size="18" fill="#273746">可演进方向</text>
  <text x="1090" y="335" font-family="Arial, sans-serif" font-size="18" fill="#273746">不虚构结果</text>

  <rect x="1050" y="500" width="260" height="150" rx="8" fill="#ffffff" stroke="#c0392b" stroke-width="3"/>
  <text x="1090" y="555" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#922b21">不能夸大</text>
  <text x="1090" y="595" font-family="Arial, sans-serif" font-size="18" fill="#273746">不是零影响</text>
  <text x="1090" y="625" font-family="Arial, sans-serif" font-size="18" fill="#273746">不是全任务适配</text>

  <line x1="350" y1="285" x2="560" y2="382" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="350" y1="575" x2="560" y2="448" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="840" y1="382" x2="1050" y2="285" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="840" y1="448" x2="1050" y2="575" stroke="#34495e" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
