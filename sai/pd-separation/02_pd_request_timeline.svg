<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 22px; font-weight: 600; fill: #111827; }
    .head { font-size: 14px; font-weight: 600; fill: #111827; }
    .msg { font-size: 12px; fill: #374151; }
    .note { font-size: 12px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="960" height="620" fill="#ffffff"/>
  <text x="40" y="46" class="title">PD 分离请求时序：从 Prompt 到 Token Stream</text>
  <text x="40" y="74" class="note">这张图用于口述一个请求在 Router、Prefill、KV Transfer、Decode 之间如何流转。</text>

  <g>
    <rect x="45" y="110" width="130" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="110" y="138" text-anchor="middle" class="head">Client</text>
    <rect x="228" y="110" width="130" height="44" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="293" y="138" text-anchor="middle" class="head">Router</text>
    <rect x="411" y="110" width="130" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="476" y="138" text-anchor="middle" class="head">Prefill</text>
    <rect x="594" y="110" width="130" height="44" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="659" y="138" text-anchor="middle" class="head">KV Transfer</text>
    <rect x="777" y="110" width="130" height="44" rx="8" fill="#faf5ff" stroke="#e9d5ff"/>
    <text x="842" y="138" text-anchor="middle" class="head">Decode</text>
  </g>

  <g stroke="#d1d5db" stroke-width="1.4" stroke-dasharray="5 6">
    <line x1="110" y1="154" x2="110" y2="560"/>
    <line x1="293" y1="154" x2="293" y2="560"/>
    <line x1="476" y1="154" x2="476" y2="560"/>
    <line x1="659" y1="154" x2="659" y2="560"/>
    <line x1="842" y1="154" x2="842" y2="560"/>
  </g>

  <path d="M110 205 L293 205" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="128" y="195" class="msg">1. prompt + params</text>

  <path d="M293 255 L476 255" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="312" y="245" class="msg">2. dispatch prefill</text>

  <rect x="448" y="270" width="56" height="78" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="476" y="304" text-anchor="middle" class="msg">计算</text>
  <text x="476" y="326" text-anchor="middle" class="msg">KV</text>

  <path d="M476 372 L659 372" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="500" y="360" class="msg">3. KV cache / metadata</text>

  <path d="M659 425 L842 425" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="686" y="413" class="msg">4. attach KV</text>

  <rect x="814" y="442" width="56" height="82" rx="5" fill="#ede9fe" stroke="#d8b4fe"/>
  <text x="842" y="475" text-anchor="middle" class="msg">逐个</text>
  <text x="842" y="497" text-anchor="middle" class="msg">生成</text>

  <path d="M842 545 C680 585, 310 585, 110 545" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="410" y="586" class="msg">5. token stream back to client</text>

  <rect x="45" y="160" width="150" height="24" rx="4" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="120" y="177" text-anchor="middle" class="note">TTFT 主要覆盖 1-4</text>
  <rect x="756" y="532" width="150" height="24" rx="4" fill="#faf5ff" stroke="#e9d5ff"/>
  <text x="831" y="549" text-anchor="middle" class="note">TPOT 主要覆盖 5</text>
</svg>
