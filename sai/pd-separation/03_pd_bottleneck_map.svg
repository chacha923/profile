<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 22px; font-weight: 600; fill: #111827; }
    .label { font-size: 14px; font-weight: 600; fill: #111827; }
    .sub { font-size: 12px; fill: #4b5563; }
    .tiny { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="960" height="620" fill="#ffffff"/>
  <text x="40" y="46" class="title">PD 分离瓶颈定位图：看现象反推阶段</text>
  <text x="40" y="74" class="sub">面试里不要只说“扩容”，先根据 TTFT、TPOT、KV Transfer、队列和显存判断瓶颈位置。</text>

  <rect x="60" y="135" width="180" height="92" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="150" y="165" text-anchor="middle" class="label">TTFT 升高</text>
  <text x="150" y="190" text-anchor="middle" class="sub">首 token 慢</text>
  <text x="150" y="211" text-anchor="middle" class="tiny">看 prompt / prefill / queue</text>

  <rect x="60" y="285" width="180" height="92" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="150" y="315" text-anchor="middle" class="label">TPOT 升高</text>
  <text x="150" y="340" text-anchor="middle" class="sub">后续 token 慢</text>
  <text x="150" y="361" text-anchor="middle" class="tiny">看 decode / KV / 显存</text>

  <rect x="60" y="435" width="180" height="92" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="150" y="465" text-anchor="middle" class="label">整体 RT 抖动</text>
  <text x="150" y="490" text-anchor="middle" class="sub">吞吐不稳定</text>
  <text x="150" y="511" text-anchor="middle" class="tiny">看路由 / 批处理 / 长请求</text>

  <rect x="390" y="105" width="190" height="120" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="485" y="136" text-anchor="middle" class="label">Prefill 瓶颈</text>
  <text x="485" y="163" text-anchor="middle" class="sub">长 prompt</text>
  <text x="485" y="184" text-anchor="middle" class="sub">prefill queue</text>
  <text x="485" y="205" text-anchor="middle" class="sub">算力不足</text>

  <rect x="390" y="255" width="190" height="120" rx="8" fill="#ede9fe" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="485" y="286" text-anchor="middle" class="label">Decode 瓶颈</text>
  <text x="485" y="313" text-anchor="middle" class="sub">KV Cache 压力</text>
  <text x="485" y="334" text-anchor="middle" class="sub">显存不足</text>
  <text x="485" y="355" text-anchor="middle" class="sub">token batch 不稳</text>

  <rect x="390" y="405" width="190" height="120" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="485" y="436" text-anchor="middle" class="label">Router / Transfer</text>
  <text x="485" y="463" text-anchor="middle" class="sub">KV 传输慢</text>
  <text x="485" y="484" text-anchor="middle" class="sub">路由排队</text>
  <text x="485" y="505" text-anchor="middle" class="sub">跨节点拓扑差</text>

  <rect x="705" y="120" width="190" height="380" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="800" y="153" text-anchor="middle" class="label">优先验证指标</text>
  <text x="730" y="190" class="sub">- prompt tokens 分布</text>
  <text x="730" y="218" class="sub">- prefill queue latency</text>
  <text x="730" y="246" class="sub">- TTFT / TPOT / TPS</text>
  <text x="730" y="274" class="sub">- KV cache usage</text>
  <text x="730" y="302" class="sub">- KV transfer latency</text>
  <text x="730" y="330" class="sub">- GPU util / memory</text>
  <text x="730" y="358" class="sub">- worker restart / OOM</text>
  <text x="730" y="386" class="sub">- router queue / retry</text>
  <text x="730" y="414" class="sub">- batch size / long output</text>
  <text x="730" y="442" class="sub">- network / topology</text>

  <path d="M240 181 L388 165" stroke="#6b7280" stroke-width="1.7" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M240 331 L388 315" stroke="#6b7280" stroke-width="1.7" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M240 481 L388 465" stroke="#6b7280" stroke-width="1.7" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M580 165 L704 250" stroke="#6b7280" stroke-width="1.7" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M580 315 L704 315" stroke="#6b7280" stroke-width="1.7" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M580 465 L704 380" stroke="#6b7280" stroke-width="1.7" fill="none" marker-end="url(#arrow-gray)"/>
</svg>
